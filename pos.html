<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Store POS - Siomai Factory</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,sans-serif}
body{background:#FFF8E1;padding:15px;min-height:100vh}
.container{max-width:480px;margin:auto;background:white;border-radius:20px;padding:20px 20px 220px 20px;box-shadow:0 6px 20px rgba(0,0,0,0.12);border-top:6px solid #D32F2F}
.back-btn{background:#757575;color:white;border:none;padding:10px 18px;border-radius:8px;cursor:pointer;margin-bottom:15px;font-size:13px;font-weight:600}
h2{color:#D32F2F;text-align:center;margin-bottom:8px;font-size:24px}
.cat-btns{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:15px}
.cat-btn{padding:15px 5px;border:none;border-radius:12px;background:linear-gradient(135deg,#FFCC80,#FFB74D);color:#B71C1C;font-weight:800;font-size:12px;cursor:pointer}
.cat-btn.active{background:#D32F2F;color:white}
#products{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:15px}
.prod-card{background:#FFFDF7;border:2px solid #FFCC80;border-radius:12px;padding:12px;text-align:center}
.prod-img{width:100%;height:70px;object-fit:cover;border-radius:8px;margin-bottom:6px;background:#f0f0f0}
.prod-name{font-weight:800;font-size:13px;color:#D32F2F;margin-bottom:4px}
.retail-price{color:#FFEB3B;background:#C62828;font-size:22px;font-weight:900;padding:6px 12px;border-radius:8px;display:inline-block;margin:8px 0}
.add-btn{width:100%;padding:8px;background:linear-gradient(135deg,#2E7D32,#388E3C);color:white;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;margin-top:6px}
.cart-box{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;border-radius:20px 20px 0 0;box-shadow:0 -4px 20px rgba(0,0,0,0.2);border-top:4px solid #D32F2F;max-height:60vh;z-index:1000;background:#FFFDF7}
.cart-box.minimized{max-height:70px;overflow:hidden}
.cart-header{display:flex;align-items:center;justify-content:space-between;padding:15px;background:#D32F2F;color:white;border-radius:20px 20px 0 0;font-weight:800;cursor:pointer}
.cart-badge{background:white;color:#D32F2F;border-radius:50%;width:25px;height:25px;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:13px}
.min-btn{background:rgba(255,255,255,0.3);border:none;color:white;border-radius:50%;width:30px;height:30px;font-size:18px;cursor:pointer;font-weight:800}
.cart-content{padding:15px;max-height:calc(60vh - 70px);overflow-y:auto}
.cart-row{display:flex;align-items:center;gap:6px;padding:8px 0;border-bottom:1px solid #FFE0B2;font-size:12px}
.del-btn{background:#C62828;color:white;border:none;border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:16px;font-weight:bold}
.item-name{flex:1;font-weight:600}
.qty-box{display:flex;align-items:center;gap:4px}
.qty-btn{width:26px;height:26px;border:1.5px solid #ddd;background:white;border-radius:6px;font-weight:700;cursor:pointer}
.qty-input{width:42px;text-align:center;border:1.5px solid #ddd;border-radius:6px;height:26px;font-size:13px}
.item-total{font-weight:800;min-width:75px;text-align:right;color:#D32F2F}
.cart-sum{text-align:right;font-weight:800;color:#D32F2F;font-size:18px;margin:12px 0}
.checkout-btn{width:100%;padding:14px;background:linear-gradient(135deg,#2E7D32,#388E3C);color:white;border:none;border-radius:10px;font-weight:800;font-size:15px;margin-top:10px;cursor:pointer}
.loading{text-align:center;padding:20px;color:#D32F2F;font-weight:700}
.payment-box{border:2px solid #2E7D32;border-radius:15px;padding:15px;background:#F1F8E9;margin-top:12px;display:none}
.payment-title{color:#2E7D32;font-weight:800;font-size:16px;margin-bottom:12px;text-align:center}
.pay-option{margin-bottom:12px;padding:12px;border:2px solid #C8E6C9;border-radius:10px;background:white;cursor:pointer}
.pay-option.selected{border-color:#2E7D32;background:#E8F5E9}
.pay-label{font-weight:700;color:#2E7D32;font-size:14px}
.pay-details{display:none;margin-top:10px;padding-top:10px;border-top:1px dashed #C8E6C9}
.pay-details.show{display:block}
.input-group{margin-bottom:10px}
.input-group label{font-size:12px;font-weight:700;color:#2E7D32;margin-bottom:4px;display:block}
.input-group input{width:100%;padding:10px;border:2px solid #C8E6C9;border-radius:8px;font-size:14px}
.change-amount{font-size:16px;font-weight:800;color:#D32F2F;margin-top:6px}
.small-text{font-size:10px;color:#666;margin-top:4px}
.back-to-cart{background:#757575;color:white;border:none;padding:10px;border-radius:8px;width:100%;margin-bottom:10px;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<div class="container">
<button class="back-btn" onclick="window.location='index.html'">← Back to Menu</button>
<h2>🛒 Store POS</h2>
<p style="text-align:center;font-size:12px;color:#666;margin-bottom:15px">Tap product to add to cart</p>
<div class="cat-btns">
<button class="cat-btn active" onclick="filterCat('all',this)">All</button>
<button class="cat-btn" onclick="filterCat('65s',this)">65's</button>
<button class="cat-btn" onclick="filterCat('30s',this)">30's</button>
<button class="cat-btn" onclick="filterCat('big',this)">Big SIOMAI</button>
<button class="cat-btn" onclick="filterCat('dumplings',this)">Dumplings</button>
<button class="cat-btn" onclick="filterCat('siopao',this)">SIOPAO</button>
<button class="cat-btn" onclick="filterCat('sauce',this)">Sauce</button>
<button class="cat-btn" onclick="filterCat('others',this)">Others</button>
</div>
<div id="products"><div class="loading">Loading products...</div></div>
</div>

<div class="cart-box" id="cartBox">
<div class="cart-header" onclick="toggleCart()">
<div>🛒 Cart <span class="cart-badge" id="cartBadge">0</span></div>
<button class="min-btn" id="minBtn">−</button>
</div>
<div class="cart-content" id="cartContent">
<div id="cartList"><p style="text-align:center;color:#999;padding:30px 0">No items yet</p></div>
<div class="cart-sum" id="cartSum">Total: ₱0.00</div>
<button class="checkout-btn" id="checkoutBtn" onclick="showPayment()">Checkout</button>
<div class="payment-box" id="paymentSection">
<button class="back-to-cart" onclick="backToCart()">← Back to Cart</button>
<div class="payment-title">💳 Payment Method</div>
<div class="pay-option" onclick="selectPayment('cash')">
<label><input type="radio" name="payment" value="cash"> <span class="pay-label">💵 Cash</span></label>
<div class="pay-details" id="cashDetails">
<div class="input-group"><label>Amount Tendered</label><input type="number" id="cashAmount" placeholder="0.00" step="0.01" oninput="calcChange()"></div>
<div class="change-amount" id="changeDisplay">Change: ₱0.00</div>
</div>
</div>
<div class="pay-option" onclick="selectPayment('gcash')">
<label><input type="radio" name="payment" value="gcash"> <span class="pay-label">📱 GCash</span></label>
<div class="pay-details" id="gcashDetails">
<div class="input-group"><label>Reference Number</label><input type="text" id="gcashRef" placeholder="ex: 1234 5678 9012"></div>
<div class="input-group">
<label>Upload Proof</label>
<input type="file" id="gcashProof" accept="image/*">
<small class="small-text">Auto compress ~400px para mabilis</small>
</div>
<div id="gcashPreview" style="margin-top:8px;display:none">
<img id="previewImg" style="max-width:100%;border-radius:8px;border:1px solid #ddd">
<p style="font-size:10px;color:#2E7D32">✓ Compressed</p>
</div>
</div>
</div>
<button class="checkout-btn" onclick="checkout()">Complete Payment</button>
</div>
</div>
</div>

<script>
const firebaseConfig = {
apiKey: "AIzaSyDk3ZbOXuw3PEfJzdt8AI2ueJq5yksfekE",
authDomain: "dhan-siomai-pos-fe1e5.firebaseapp.com",
projectId: "dhan-siomai-pos-fe1e5",
storageBucket: "dhan-siomai-pos-fe1e5.firebasestorage.app",
messagingSenderId: "305932123173",
appId: "1:305932123173:web:f27894a2d5e6e6ab8253cc"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

let products = [];
let cart = [];
let currentCat = 'all';
let selectedPayment = '';
let isMinimized = false;
let compressedGcashFile = null; // bagong variable para sa compressed

function loadProducts(){
db.collection('products').onSnapshot(snap=>{
products = [];
snap.forEach(doc=>{
let data = doc.data();
products.push({
id:doc.id,
name:data.name,
price:Number(data.price) || 0,
vipPrice:Number(data.vipPrice) || 0,
bulkPrice:Number(data.bulkPrice) || 0,
bulkMinQty:Number(data.bulkMinQty) || 0,
stock:Number(data.stock) || 0,
image:data.image,
category:data.category
});
});
renderProducts();
});
}

function renderProducts(){
const grid = document.getElementById('products');
let filtered = currentCat==='all'? products : products.filter(p=>p.category===currentCat);
if(filtered.length===0){
grid.innerHTML = '<p style="text-align:center;color:#999;padding:40px 0">No products yet boss</p>';
return;
}
grid.innerHTML = filtered.map(p=>{
const hasBulk = p.bulkPrice > 0 && p.bulkMinQty > 0;
const bulkInfo = hasBulk? `<p class="bulk-label">Bulk ${p.bulkMinQty}+: ₱${p.bulkPrice.toFixed(2)}</p>` : '';
return `
<div class="prod-card">
${p.image? `<img src="${p.image}" class="prod-img">` : '<div class="prod-img" style="display:flex;align-items:center;justify-content:center;color:#ccc;font-size:11px;">No Image</div>'}
<div class="prod-name">${p.name}</div>
<p>Stock: ${p.stock}</p>
<p class="retail-price">Retail: ₱${p.price.toFixed(2)}</p>
${bulkInfo}
<button class="add-btn" onclick="addToCart('${p.id}')">Add</button>
</div>
`;
}).join('');
}

window.filterCat = (cat,btn)=>{
currentCat = cat;
document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
renderProducts();
}

window.addToCart = (prodId)=>{
const prod = products.find(p=>p.id===prodId);
if(!prod||prod.stock<=0){alert('Out of stock boss!');return}
const existing = cart.find(item=>item.id===prodId);
if(existing){
if(existing.qty>=prod.stock){alert('Max stock reached boss!');return}
existing.qty++;
}else{
cart.push({id:prodId,name:prod.name,price:prod.price,bulkPrice:prod.bulkPrice,bulkMinQty:prod.bulkMinQty,qty:1});
}
renderCart();
if(isMinimized) toggleCart();
}

function renderCart(){
const cartList = document.getElementById('cartList');
const cartBadge = document.getElementById('cartBadge');
const cartSum = document.getElementById('cartSum');
let total = 0;
let count = 0;
if(cart.length===0){
cartList.innerHTML = '<p style="text-align:center;color:#999;padding:30px 0">No items yet</p>';
}else{
let html = '';
cart.forEach((item,i)=>{
let price = item.price;
let isBulk = false;
let priceLabel = '';
const hasBulk = item.bulkPrice > 0 && item.bulkMinQty > 0;
if (hasBulk && item.qty >= item.bulkMinQty) {
price = item.bulkPrice;
isBulk = true;
priceLabel = '<span class="bulk-applied">BULK '+item.bulkMinQty+'+</span>';
}
html += `<div class="cart-row">
<button class="del-btn" onclick="delItem(${i})">×</button>
<div class="item-name">${item.name} ${priceLabel}</div>
<div class="qty-box">
<button class="qty-btn" onclick="updateQty(${i},-1)">-</button>
<input type="number" class="qty-input" value="${item.qty}" oninput="setQty(${i},this.value)">
<button class="qty-btn" onclick="updateQty(${i},1)">+</button>
</div>
<div class="item-total">₱${(price * item.qty).toFixed(2)}</div>
</div>`;
total += price * item.qty;
count += item.qty;
});
cartList.innerHTML = html;
}
cartBadge.textContent = count;
cartSum.textContent = 'Total: ₱' + total.toFixed(2);
calcChange();
}

function updateQty(i,delta){
cart[i].qty += delta;
if(cart[i].qty<=0) cart.splice(i,1);
renderCart();
}

function setQty(i,val){
val = parseInt(val) || 1;
if(val<=0) cart.splice(i,1);
else cart[i].qty = val;
renderCart();
}

function delItem(i){
cart.splice(i,1);
renderCart();
}

window.toggleCart = ()=>{
const cartBox = document.getElementById('cartBox');
const minBtn = document.getElementById('minBtn');
isMinimized = !isMinimized;
if(isMinimized){
cartBox.classList.add('minimized');
minBtn.textContent = '+';
}else{
cartBox.classList.remove('minimized');
minBtn.textContent = '−';
}
}

window.showPayment = ()=>{
if(cart.length===0){alert('Cart is empty boss!');return}
document.getElementById('paymentSection').style.display = 'block';
document.getElementById('checkoutBtn').style.display = 'none';
document.getElementById('paymentSection').scrollIntoView({behavior:'smooth'});
}

window.backToCart = ()=>{
document.getElementById('paymentSection').style.display = 'none';
document.getElementById('checkoutBtn').style.display = 'block';
document.getElementById('cartContent').scrollTop = 0;
}

window.selectPayment = (type)=>{
selectedPayment = type;
document.querySelectorAll('.pay-option').forEach(opt=>opt.classList.remove('selected'));
event.currentTarget.classList.add('selected');
document.querySelectorAll('.pay-details').forEach(d=>d.classList.remove('show'));
document.getElementById(type + 'Details').classList.add('show');

// AUTO COMPRESS pag GCash pinili
if(type === 'gcash'){
document.getElementById('gcashProof').onchange = function(e){
const file = e.target.files[0];
if(!file) return;
compressImage(file, 400, 0.8).then(compressed=>{
compressedGcashFile = compressed;
const reader = new FileReader();
reader.onload = function(e2){
document.getElementById('previewImg').src = e2.target.result;
document.getElementById('gcashPreview').style.display = 'block';
}
reader.readAsDataURL(compressed);
});
}
}
}

function calcChange(){
const total = getTotal();
const cash = Number(document.getElementById('cashAmount').value) || 0;
const change = cash - total;
document.getElementById('changeDisplay').textContent = 'Change: ₱' + (change > 0 ? change.toFixed(2) : '0.00');
}

function getTotal(){
let total = 0;
cart.forEach(item=>{
let price = item.price;
const hasBulk = item.bulkPrice > 0 && item.bulkMinQty > 0;
if (hasBulk && item.qty >= item.bulkMinQty) {
price = item.bulkPrice;
}
total += price * item.qty;
});
return total;
}

// BAGONG FUNCTION: Auto compress image
function compressImage(file, maxWidth=400, quality=0.8){
return new Promise((resolve)=>{
const img = new Image();
const reader = new FileReader();
reader.onload = e => {
img.onload = ()=>{
const canvas = document.createElement('canvas');
let width = img.width;
let height = img.height;
if(width > height){
if(width > maxWidth){
height *= maxWidth / width;
width = maxWidth;
}
} else {
if(height > maxWidth){
width *= maxWidth / height;
height = maxWidth;
}
}
canvas.width = width;
canvas.height = height;
canvas.getContext('2d').drawImage(img, 0, 0, width, height);
canvas.toBlob(blob => resolve(blob), 'image/jpeg', quality);
};
img.src = e.target.result;
};
reader.readAsDataURL(file);
});
}

async function checkout(){
if(!selectedPayment){alert('Pili ka muna payment method boss!');return}
const total = getTotal();

if(selectedPayment === 'cash'){
const cash = Number(document.getElementById('cashAmount').value) || 0;
if(cash < total){alert('Kulang pera boss!');return}
const change = cash - total;
alert(`✓ Payment Complete!\n\nTotal: ₱${total.toFixed(2)}\nMethod: CASH\nCash: ₱${cash.toFixed(2)}\nChange: ₱${change.toFixed(2)}\n\nSalamat boss!`);
resetCart();

} else if(selectedPayment === 'gcash'){
const ref = document.getElementById('gcashRef').value.trim();
if(!ref){alert('Lagay ka GCash Reference Number boss!');return}
if(!compressedGcashFile){alert('Upload ka proof of payment boss!');return}

// UPLOAD COMPRESSED IMAGE
const storageRef = storage.ref('gcash_proofs/' + Date.now() + '_' + ref + '.jpg');
const snapshot = await storageRef.put(compressedGcashFile);
const url = await snapshot.ref.getDownloadURL();
const sizeKB = (compressedGcashFile.size/1024).toFixed(1);

alert(`✓ Payment Complete!\n\nTotal: ₱${total.toFixed(2)}\nMethod: GCASH\nRef: ${ref}\nProof: ${sizeKB}KB compressed\n\nSalamat boss!`);
resetCart();

} else if(selectedPayment === 'bank'){
const ref = document.getElementById('bankRef').value.trim();
if(!ref){alert('Lagay ka Bank + Reference boss!');return}
alert(`✓ Payment Complete!\n\nTotal: ₱${total.toFixed(2)}\nMethod: BANK\n${ref}\n\nSalamat boss!`);
resetCart();
}
}

function resetCart(){
cart = [];
selectedPayment = '';
compressedGcashFile = null;
document.querySelectorAll('.pay-option').forEach(opt=>opt.classList.remove('selected'));
document.querySelectorAll('.pay-details').forEach(d=>d.classList.remove('show'));
document.querySelectorAll('input[type="radio"]').forEach(r=>r.checked=false);
document.getElementById('cashAmount').value = '';
document.getElementById('gcashRef').value = '';
document.getElementById('gcashProof').value = '';
document.getElementById('bankRef').value = '';
document.getElementById('gcashPreview').style.display = 'none';
backToCart();
renderCart();
}

loadProducts();
</script>
</body>
</html>
