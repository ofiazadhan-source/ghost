<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS - DHAN SIOMAI</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif;}
body{background:#FFF8E1;}
.header{background:linear-gradient(135deg, #D32F2F, #B71C1C); color:white; padding:15px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:10;}
.header h1{font-size:18px; font-weight:700;}
.header a{color:#D32F2F; background:#fff; text-decoration:none; font-weight:600; padding:8px 14px; border-radius:8px;}
.container{padding:15px; max-width:1200px; margin:0 auto;}
.grid{display:grid; gap:15px; grid-template-columns:2fr 1fr;}
@media (max-width:768px){.grid{grid-template-columns:1fr;}}
.card{background:white; border-radius:16px; padding:15px; box-shadow:0 3px 10px rgba(0,0,0,0.08);}

/* FIXED PRODUCT GRID */
#productList{
display:grid;
gap:10px;
grid-template-columns:repeat(auto-fill, minmax(140px, 1fr));
padding:10px 0;
}

.product-card{
background:white;
border-radius:12px;
padding:10px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
border:2px solid #FFE0B2;
cursor:pointer;
transition:0.2s;
}
.product-card:active{border-color:#D32F2F; transform:scale(0.97);}

/* FIXED IMAGE - PANTAY NA LAHAT */
.prod-img{
width:100%;
height:120px;
object-fit:cover;
border-radius:8px;
margin-bottom:6px;
background:#f5f5f5;
}

.prod-name{
font-size:13px;
font-weight:600;
margin-bottom:3px;
color:#333;
height:32px;
overflow:hidden;
display:-webkit-box;
-webkit-line-clamp:2;
-webkit-box-orient:vertical;
}

.prod-price{
font-size:15px;
font-weight:700;
color:#D32F2F;
margin-bottom:2px;
}

.prod-stock{
font-size:11px;
color:#666;
}

/* CATEGORY FILTER BUTTONS */
#catFilterPOS{
display:flex;
gap:8px;
margin-bottom:12px;
overflow-x:auto;
padding-bottom:5px;
}
.cat-btn-pos{
padding:7px 12px;
border:2px solid #D32F2F;
background:white;
color:#D32F2F;
border-radius:18px;
font-weight:600;
font-size:12px;
cursor:pointer;
white-space:nowrap;
flex-shrink:0;
}
.cat-btn-pos.active{
background:#D32F2F;
color:white;
}

.cart-item{display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid #FFE0B2;}
.cart-item:last-child{border-bottom:none;}
.cart-info h4{font-size:14px; margin-bottom:2px;}
.cart-info p{font-size:13px; color:#666;}
.qty-controls{display:flex; align-items:center; gap:8px;}
.qty-controls button{width:28px; height:28px; border:none; border-radius:6px; background:#D32F2F; color:white; font-weight:700; cursor:pointer;}
.qty-controls span{font-weight:600; min-width:20px; text-align:center;}
.total-section{margin-top:15px; padding-top:15px; border-top:2px solid #FFE0B2;}
.total-row{display:flex; justify-content:space-between; margin-bottom:8px; font-size:15px;}
.total-row.grand{font-size:20px; font-weight:700; color:#D32F2F;}
.checkout-btn{width:100%; padding:14px; background:linear-gradient(135deg, #4caf50, #66bb6a); color:white; border:none; border-radius:12px; font-size:16px; font-weight:700; cursor:pointer; margin-top:15px;}
.checkout-btn:disabled{background:#ccc; cursor:not-allowed;}
.search-box{width:100%; padding:12px; border:2px solid #FFE0B2; border-radius:10px; margin-bottom:15px; font-size:14px;}
.search-box:focus{outline:none; border-color:#FFC107;}
.loading{text-align:center; padding:40px; color:#666;}

/* Modal */
.modal{display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:100; align-items:center; justify-content:center;}
.modal.active{display:flex;}
.modal-content{background:white; border-radius:16px; padding:20px; width:90%; max-width:400px; max-height:90vh; overflow-y:auto;}
.modal-content h3{margin-bottom:15px; color:#D32F2F;}
.payment-btn{width:100%; padding:12px; margin-bottom:10px; border:none; border-radius:10px; font-weight:600; font-size:15px; cursor:pointer;}
.btn-cash{background:#4caf50; color:white;}
.btn-gcash{background:#0070f3; color:white;}
.input-cash{width:100%; padding:12px; border:2px solid #FFE0B2; border-radius:10px; font-size:16px; margin:10px 0;}
.change-box{background:#E8F5E9; padding:12px; border-radius:10px; text-align:center; margin:10px 0; font-size:18px; font-weight:700; color:#2e7d32;}
.modal-actions{display:flex; gap:10px; margin-top:15px;}
.modal-actions button{flex:1; padding:12px; border:none; border-radius:10px; font-weight:600; cursor:pointer;}
.btn-cancel{background:#f5f5f5; color:#333;}
.btn-confirm{background:#D32F2F; color:white;}
.btn-confirm:disabled{background:#ccc; cursor:not-allowed;}
.proof-preview{max-width:100%; max-height:200px; object-fit:contain; border-radius:10px; margin-top:10px; display:none;}
.payment-summary{background:#FFF3E0; border:2px solid #FFC107; border-radius:10px; padding:12px; margin-top:12px; display:none;}
.payment-summary h4{font-size:14px; color:#E65100; margin-bottom:6px;}
.payment-summary p{font-size:14px; margin-bottom:4px;}
.payment-summary img{width:100%; max-height:150px; object-fit:contain; border-radius:8px; margin-top:8px;}

/* Receipt Modal */
.receipt-content{text-align:center; padding:10px;}
.receipt-content h2{color:#D32F2F; margin-bottom:5px;}
.receipt-content.store-info{font-size:12px; color:#666; margin-bottom:15px;}
.receipt-divider{border-top:1px dashed #999; margin:10px 0;}
.receipt-items{text-align:left; font-size:14px;}
.receipt-item{display:flex; justify-content:space-between; margin-bottom:5px;}
.receipt-total{text-align:right; font-size:16px; font-weight:700; margin-top:10px;}
.receipt-footer{font-size:12px; color:#666; margin-top:15px; text-align:center;}
.print-btn{width:100%; padding:12px; background:#D32F2F; color:white; border:none; border-radius:10px; font-weight:700; font-size:15px; cursor:pointer; margin-top:15px;}
@media print{body *{visibility:hidden;} #receiptPrint, #receiptPrint *{visibility:visible;} #receiptPrint{position:absolute; left:0; top:0; width:100%;}}
</style>
</head>
<body>

<div class="header">
<h1>💻 POS</h1>
<a href="index.html">← Back</a>
</div>

<div class="container">
<div class="grid">
<!-- Products Section -->
<div class="card">
<input type="text" id="searchBox" class="search-box" placeholder="🔍 Search product...">

<!-- CATEGORY FILTER - DAGDAG KO TO -->
<div id="catFilterPOS">
<button onclick="filterCategoryPOS('All')" class="cat-btn-pos active">All</button>
<button onclick="filterCategoryPOS('65\'s')" class="cat-btn-pos">65's</button>
<button onclick="filterCategoryPOS('30\'s')" class="cat-btn-pos">30's</button>
<button onclick="filterCategoryPOS('Big SIOMAI')" class="cat-btn-pos">Big</button>
<button onclick="filterCategoryPOS('Dumplings')" class="cat-btn-pos">Dumplings</button>
<button onclick="filterCategoryPOS('Siopao')" class="cat-btn-pos">Siopao</button>
<button onclick="filterCategoryPOS('Sauce')" class="cat-btn-pos">Sauce</button>
<button onclick="filterCategoryPOS('Others')" class="cat-btn-pos">Others</button>
</div>

<div id="productList" class="product-grid">
<div class="loading">Loading products...</div>
</div>
</div>

<!-- Cart Section -->
<div class="card">
<h3 style="margin-bottom:12px; color:#D32F2F;">🛒 Cart</h3>
<div id="cartList">
<p style="text-align:center; color:#999; padding:20px;">Cart is empty</p>
</div>
<div class="total-section">
<div class="total-row">
<span>Subtotal:</span>
<span id="subtotal">₱0</span>
</div>
<div class="total-row grand">
<span>Total:</span>
<span id="grandTotal">₱0</span>
</div>
</div>
<div class="payment-summary" id="paymentSummary">
<h4>💳 Payment Details</h4>
<p id="summaryMethod"></p>
<p id="summaryReceived"></p>
<p id="summaryChange"></p>
<img id="summaryProof" style="display:none;">
</div>
<button class="checkout-btn" id="checkoutBtn" onclick="openPaymentModal()" disabled>
💰 Checkout
</button>
</div>
</div>
</div>

<!-- Payment Modal -->
<div class="modal" id="paymentModal">
<div class="modal-content">
<h3>💳 Select Payment Method</h3>
<button class="payment-btn btn-cash" onclick="selectPayment('cash')">💵 Cash</button>
<button class="payment-btn btn-gcash" onclick="selectPayment('gcash')">📱 GCash</button>
<div id="cashSection" style="display:none;">
<label style="font-weight:600;">Amount Received:</label>
<input type="number" id="amountReceived" class="input-cash" placeholder="0" inputmode="numeric" oninput="calculateChange()">
<div class="change-box" id="changeBox">Change: ₱0</div>
</div>
<div id="gcashSection" style="display:none;">
<label style="font-weight:600;">Upload Proof of Payment:</label>
<input type="file" id="proofUpload" accept="image/*" capture="environment">
<img id="proofPreview" class="proof-preview">
<p style="font-size:12px; color:#666; margin-top:5px;">Screenshot ng GCash transaction</p>
</div>
<div class="modal-actions">
<button class="btn-cancel" onclick="closePaymentModal()">Cancel</button>
<button class="btn-confirm" id="confirmBtn" onclick="checkout()" disabled>Confirm Payment</button>
</div>
</div>
</div>

<!-- Receipt Modal -->
<div class="modal" id="receiptModal">
<div class="modal-content" id="receiptPrint">
<div class="receipt-content">
<h2>DHAN SIOMAI</h2>
<div class="store-info">
POS Receipt<br>
<span id="receiptDate"></span>
</div>
<div class="receipt-divider"></div>
<div class="receipt-items" id="receiptItems"></div>
<div class="receipt-divider"></div>
<div class="receipt-total">
<div>Total: <span id="receiptTotal">₱0</span></div>
<div id="receiptPayment"></div>
<div id="receiptReceived"></div>
<div id="receiptChange"></div>
</div>
<div class="receipt-footer">
Thank you for purchasing!<br>
Please come again 🙏
</div>
</div>
<button class="print-btn" onclick="printReceipt()">🖨️ Print Receipt</button>
<button class="print-btn" style="background:#666; margin-top:8px;" onclick="closeReceiptModal()">Close</button>
</div>
</div>

<script type="module">
import { db } from './firebase-config.js';
import { collection, doc, addDoc, updateDoc, getDoc, getDocs, onSnapshot, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

let products = [];
let cart = [];
let paymentMethod = '';
let totalAmount = 0;
let proofBase64 = '';
let amountReceived = 0;
let changeAmount = 0;
let lastSale = null;

// Global for filter
let currentCategory = 'All';
let searchKeyword = '';

// Load products live
onSnapshot(collection(db, "dhan-pos-web"), (snapshot) => {
  products = [];
  snapshot.forEach(docSnap => {
    let p = docSnap.data();
    p.id = docSnap.id;
    products.push(p);
  });
  renderProducts(); // WALANG PARAMETER
});

// FIXED Render products with category filter
function renderProducts() {
  const container = document.getElementById('productList');

  let filtered = products.filter(p => {
    const matchSearch = p.name.toLowerCase().includes(searchKeyword.toLowerCase());
    const matchCat = currentCategory === 'All' || p.category === currentCategory;
    return matchSearch && matchCat;
  });

  if(filtered.length === 0) {
    container.innerHTML = '<div class="loading">No products found</div>';
    return;
  }

  container.innerHTML = '';
  filtered.forEach(p => {
    const imgUrl = p.image || 'https://via.placeholder.com/140x120?text=No+Image';
    const stock = p.stock || 0;
    const isOut = stock <= 0;

    container.innerHTML += `
      <div class="product-card" onclick="${isOut? '' : `addToCart('${p.id}')`}"
           style="${isOut? 'opacity:0.5;cursor:not-allowed;' : ''}">
        <img src="${imgUrl}" class="prod-img" alt="${p.name}"
             onerror="this.src='https://via.placeholder.com/140x120?text=No+Image'">
        <div class="prod-name">${p.name}</div>
        <div class="prod-price">₱${p.price || 0}</div>
        <div class="prod-stock">Stock: ${stock}</div>
      </div>
    `;
  });
}

// Category filter function
window.filterCategoryPOS = function(cat) {
  currentCategory = cat;
  document.querySelectorAll('.cat-btn-pos').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  renderProducts();
}

// Search filter - FIXED
document.getElementById('searchBox').addEventListener('input', (e) => {
  searchKeyword = e.target.value.toLowerCase();
  renderProducts();
});

// Add to cart
window.addToCart = function(productId) {
  const product = products.find(p => p.id === productId);
  if(!product) return;
  const existing = cart.find(item => item.id === productId);
  if(existing) {
    if(existing.qty >= product.stock) {
      alert('⚠️ Not enough stock!');
      return;
    }
    existing.qty++;
  } else {
    if(product.stock <= 0) {
      alert('⚠️ Out of stock!');
      return;
    }
    cart.push({ id: product.id, name: product.name, price: product.price || 0, qty: 1, stock: product.stock });
  }
  renderCart();
  resetPaymentSummary();
}

// Remove from cart
window.removeFromCart = function(productId) {
  cart = cart.filter(item => item.id!== productId);
  renderCart();
  resetPaymentSummary();
}

// Update qty
window.updateQty = function(productId, change) {
  const item = cart.find(i => i.id === productId);
  const product = products.find(p => p.id === productId);
  if(!item ||!product) return;
  item.qty += change;
  if(item.qty <= 0) {
    removeFromCart(productId);
    return;
  }
  if(item.qty > product.stock) {
    alert('⚠️ Not enough stock!');
    item.qty = product.stock;
  }
  renderCart();
  resetPaymentSummary();
}

// Render cart
function renderCart() {
  const container = document.getElementById('cartList');
  const checkoutBtn = document.getElementById('checkoutBtn');
  if(cart.length === 0) {
    container.innerHTML = '<p style="text-align:center; color:#999; padding:20px;">Cart is empty</p>';
    checkoutBtn.disabled = true;
  } else {
    container.innerHTML = '';
    cart.forEach(item => {
      container.innerHTML += `
        <div class="cart-item">
          <div class="cart-info">
            <h4>${item.name}</h4>
            <p>₱${item.price} x ${item.qty} = ₱${(item.price * item.qty).toLocaleString()}</p>
          </div>
          <div class="qty-controls">
            <button onclick="updateQty('${item.id}', -1)">-</button>
            <span>${item.qty}</span>
            <button onclick="updateQty('${item.id}', 1)">+</button>
          </div>
        </div>`;
    });
    checkoutBtn.disabled = false;
  }
  updateTotal();
}

// Update total
function updateTotal() {
  totalAmount = 0;
  cart.forEach(item => {
    totalAmount += item.price * item.qty;
  });
  document.getElementById('subtotal').textContent = `₱${totalAmount.toLocaleString()}`;
  document.getElementById('grandTotal').textContent = `₱${totalAmount.toLocaleString()}`;
}

// Reset payment summary
function resetPaymentSummary() {
  document.getElementById('paymentSummary').style.display = 'none';
  paymentMethod = '';
  proofBase64 = '';
  amountReceived = 0;
  changeAmount = 0;
}

// Open payment modal
window.openPaymentModal = function() {
  document.getElementById('paymentModal').classList.add('active');
  paymentMethod = '';
  document.getElementById('cashSection').style.display = 'none';
  document.getElementById('gcashSection').style.display = 'none';
  document.getElementById('confirmBtn').disabled = true;
  proofBase64 = '';
  document.getElementById('proofUpload').value = '';
  document.getElementById('proofPreview').style.display = 'none';
}

// Close modal
window.closePaymentModal = function() {
  document.getElementById('paymentModal').classList.remove('active');
}

// Select payment method
window.selectPayment = function(method) {
  paymentMethod = method;
  if(method === 'cash') {
    document.getElementById('cashSection').style.display = 'block';
    document.getElementById('gcashSection').style.display = 'none';
    document.getElementById('amountReceived').value = '';
    document.getElementById('changeBox').textContent = 'Change: ₱0';
    document.getElementById('amountReceived').focus();
    checkConfirmButton();
  } else {
    document.getElementById('cashSection').style.display = 'none';
    document.getElementById('gcashSection').style.display = 'block';
    checkConfirmButton();
  }
}

// Image compression
async function compressImage(file, maxWidth, quality) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = (event) => {
      const img = new Image();
      img.src = event.target.result;
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let width = img.width;
        let height = img.height;
        if(width > maxWidth) {
          height = (maxWidth / width) * height;
          width = maxWidth;
        }
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      }
    }
  });
}

// Handle proof upload
document.getElementById('proofUpload').onchange = async function(e){
  const file = e.target.files[0];
  if(file){
    proofBase64 = await compressImage(file, 800, 0.7);
    document.getElementById('proofPreview').src = proofBase64;
    document.getElementById('proofPreview').style.display = 'block';
    checkConfirmButton();
  }
}

// Calculate change for cash
window.calculateChange = function() {
  amountReceived = parseFloat(document.getElementById('amountReceived').value) || 0;
  changeAmount = amountReceived - totalAmount;
  document.getElementById('changeBox').textContent = `Change: ₱${changeAmount >= 0? changeAmount.toLocaleString() : 0}`;
  checkConfirmButton();
}

// Check if confirm button should be enabled
function checkConfirmButton() {
  if(paymentMethod === 'cash') {
    document.getElementById('confirmBtn').disabled = amountReceived < totalAmount;
  } else if(paymentMethod === 'gcash') {
    document.getElementById('confirmBtn').disabled =!proofBase64;
  }
}

// Show payment summary sa cart
function showPaymentSummary() {
  document.getElementById('paymentSummary').style.display = 'block';
  document.getElementById('summaryMethod').textContent = `Method: ${paymentMethod.toUpperCase()}`;
  if(paymentMethod === 'cash') {
    document.getElementById('summaryReceived').textContent = `Amount Received: ₱${amountReceived.toLocaleString()}`;
    document.getElementById('summaryChange').textContent = `Change: ₱${changeAmount.toLocaleString()}`;
    document.getElementById('summaryProof').style.display = 'none';
  } else {
    document.getElementById('summaryReceived').textContent = `Amount Paid: ₱${totalAmount.toLocaleString()}`;
    document.getElementById('summaryChange').textContent = 'Change: ₱0';
    if(proofBase64) {
      document.getElementById('summaryProof').src = proofBase64;
      document.getElementById('summaryProof').style.display = 'block';
    }
  }
}

// Show receipt modal
function showReceipt(saleData) {
  const now = new Date();
  document.getElementById('receiptDate').textContent = now.toLocaleString('en-PH');
  let itemsHtml = '';
  saleData.items.forEach(item => {
    itemsHtml += `
      <div class="receipt-item">
        <span>${item.name} x${item.qty}</span>
        <span>₱${(item.price * item.qty).toLocaleString()}</span>
      </div>
    `;
  });
  document.getElementById('receiptItems').innerHTML = itemsHtml;
  document.getElementById('receiptTotal').textContent = `₱${saleData.total.toLocaleString()}`;
  document.getElementById('receiptPayment').textContent = `Payment: ${saleData.paymentMethod.toUpperCase()}`;
  if(saleData.paymentMethod === 'cash') {
    document.getElementById('receiptReceived').textContent = `Cash: ₱${saleData.amountReceived.toLocaleString()}`;
    document.getElementById('receiptChange').textContent = `Change: ₱${saleData.change.toLocaleString()}`;
  } else {
    document.getElementById('receiptReceived').textContent = '';
    document.getElementById('receiptChange').textContent = 'GCash Payment';
  }
  document.getElementById('receiptModal').classList.add('active');
}

window.closeReceiptModal = function() {
  document.getElementById('receiptModal').classList.remove('active');
}

window.printReceipt = function() {
  window.print();
}

// Checkout
window.checkout = async function() {
  if(cart.length === 0 ||!paymentMethod) return;
  if(paymentMethod === 'cash') {
    if(amountReceived < totalAmount) {
      alert('❌ Kulang ang bayad!');
      return;
    }
  }
  if(paymentMethod === 'gcash' &&!proofBase64) {
    alert('❌ Mag-upload muna ng proof of payment!');
    return;
  }
  try {
    const timestamp = new Date();
    const saleData = {
      items: [...cart],
      total: totalAmount,
      paymentMethod: paymentMethod,
      amountReceived: paymentMethod === 'cash'? amountReceived : totalAmount,
      change: changeAmount,
      proofOfPayment: paymentMethod === 'gcash'? proofBase64 : '',
      timestamp: timestamp,
      date: timestamp.toISOString().split('T')[0]
    };
    await addDoc(collection(db, "dhan-sales"), saleData);
    for(let item of cart) {
      await updateDoc(doc(db, "dhan-pos-web", item.id), {
        stock: increment(-item.qty)
      });
    }
    showPaymentSummary();
    showReceipt(saleData);
    setTimeout(() => {
      cart = [];
      renderCart();
      closePaymentModal();
    }, 500);
  } catch(e) {
    alert('❌ Error: ' + e.message);
  }
}
</script>
</body>
</html>
