<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Store POS - Siomai Factory</title>
<style>
* {margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', Tahoma, sans-serif;}
body {background:#FFF8E1; padding:15px; min-height:100vh;}
.container { max-width:480px; margin:auto; background:white; border-radius:20px; padding:20px; box-shadow:0 6px 20px rgba(0,0,0,0.12); border-top:6px solid #D32F2F; }
h2 { color:#D32F2F; text-align:center; margin-bottom:8px; font-size:24px; }
.subtitle { text-align:center; color:#666; font-size:13px; margin-bottom:20px; }
.back-btn { background:#757575; color:white; border:none; padding:10px 18px; border-radius:8px; cursor:pointer; margin-bottom:15px; font-size:13px; font-weight:600; }
.cat-grid { display:grid; grid-template-columns:repeat(3, 1fr); gap:8px; margin-bottom:15px; }
.cat-btn { padding:12px 5px; border:none; border-radius:12px; background:linear-gradient(135deg, #FFCC80, #FFB74D); color:#B71C1C; font-weight:800; font-size:12px; cursor:pointer; text-align:center; }
.cat-btn:active {transform:scale(0.95);}
.cat-btn.active {background:#D32F2F; color:white;}
.prod-grid { display:grid; grid-template-columns:repeat(2, 1fr); gap:10px; margin-bottom:110px; }
.prod-card { background:#FFFDF7; border:2px solid #FFCC80; border-radius:12px; padding:12px; text-align:center; }
.prod-img { width:100%; height:70px; object-fit:cover; border-radius:8px; margin-bottom:6px; background:#f0f0f0; }
.prod-name { font-weight:800; font-size:13px; color:#D32F2F; margin-bottom:4px; height:32px; overflow:hidden; }
.prod-price { font-size:16px; font-weight:900; color:#2E7D32; margin-bottom:2px; }
.prod-stock { font-size:10px; color:#666; }
.cart-bar { position:fixed; bottom:0; left:0; right:0; background:white; border-top:3px solid #D32F2F; border-radius:20px 20px 0 0; padding:15px; box-shadow:0 -4px 15px rgba(0,0,0,0.2); max-width:480px; margin:auto; z-index:999; }
.cart-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.cart-title { font-weight:800; color:#D32F2F; font-size:15px; }
.cart-badge { background:#D32F2F; color:white; border-radius:50%; width:26px; height:26px; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:800; }
.cart-sum { font-size:22px; font-weight:900; color:#D32F2F; text-align:right; margin:10px 0; }
.checkout-btn { width:100%; padding:15px; background:#2E7D32; color:white; border:none; border-radius:12px; font-weight:800; font-size:16px; cursor:pointer; }
</style>
</head>
<body>
<div class="container">
<button class="back-btn" onclick="window.location='index.html'">← Back to Menu</button>
<h2>🛒 Store POS</h2>
<p class="subtitle">Tap product to add to cart</p>
<div class="cat-grid">
<button class="cat-btn active">All</button>
<button class="cat-btn">65's</button>
<button class="cat-btn">30's</button>
<button class="cat-btn">Big SIOMAI</button>
<button class="cat-btn">Dumplings</button>
<button class="cat-btn">SIOPAO</button>
<button class="cat-btn">Sauce</button>
<button class="cat-btn">Others</button>
</div>
<div class="prod-grid">
<div class="prod-card">
<div class="prod-img"></div>
<div class="prod-name">Sample Product</div>
<div class="prod-price">₱8.00</div>
<div class="prod-stock">Stock: 100</div>
</div>
<div class="prod-card">
<div class="prod-img"></div>
<div class="prod-name">Sample Product 2</div>
<div class="prod-price">₱10.00</div>
<div class="prod-stock">Stock: 50</div>
</div>
</div>
</div>

<div class="cart-bar">
<div class="cart-head">
<span class="cart-title">🛒 Cart</span>
<span class="cart-badge">0</span>
</div>
<div class="cart-sum">Total: ₱0</div>
<button class="checkout-btn">Checkout</button>
</div>
</body>
</html>
