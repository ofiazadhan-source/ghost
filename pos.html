<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS System</title>
<style>
* {margin:0; padding:0; box-sizing:border-box; font-family:Arial;}
body {background:#f5f5f5;}
.header {background:#2563eb; color:white; padding:15px; text-align:center; font-size:20px; font-weight:bold;}
.container {display:grid; grid-template-columns: 2fr 1fr; gap:15px; padding:15px; max-width:1200px; margin:0 auto;}
.products {background:white; padding:15px; border-radius:8px;}
.products-grid {display:grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap:10px; margin-top:10px;}
.product {border:1px solid #ddd; padding:10px; border-radius:6px; text-align:center; cursor:pointer; transition:0.2s;}
.product:hover {border-color:#2563eb; background:#eff6ff;}
.product img {width:100%; height:80px; object-fit:cover; border-radius:4px;}
.product-name {font-size:12px; margin-top:5px; font-weight:bold;}
.product-price {color:#2563eb; font-weight:bold; font-size:14px;}
.cart {background:white; padding:15px; border-radius:8px; position:sticky; top:15px;}
.cart-item {display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #eee; font-size:14px;}
.cart-total {margin-top:15px; padding-top:15px; border-top:2px solid #2563eb; font-size:18px; font-weight:bold;}
button {width:100%; padding:12px; background:#2563eb; color:white; border:none; border-radius:6px; margin-top:10px; cursor:pointer; font-weight:bold;}
button:hover {background:#1d4ed8;}
.modal {display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center;}
.modal.active {display:flex;}
.modal-content {background:white; padding:20px; border-radius:8px; width:90%; max-width:400px;}
input, select {width:100%; padding:10px; margin-top:5px; border:1px solid #ddd; border-radius:4px;}
.receipt {display:none; background:white; padding:20px; font-family:monospace; font-size:12px; max-width:300px; margin:20px auto;}
@media print {.header, .container, .modal {display:none;} .receipt {display:block !important;}}
</style>
</head>
<body>
<div class="header">🛒 POS SYSTEM</div>

<div class="container">
<div class="products">
<h3>Products</h3>
<div class="products-grid" id="productsGrid">Loading products...</div>
</div>

<div class="cart">
<h3>Cart</h3>
<div id="cartItems">Empty</div>
<div class="cart-total">Total: ₱<span id="cartTotal">0.00</span></div>
<button onclick="checkout()">Checkout</button>
</div>
</div>

<div class="modal" id="paymentModal">
<div class="modal-content">
<h3>Payment</h3>
<label>Payment Method</label>
<select id="paymentMethod" onchange="togglePayment()">
<option value="Cash">Cash</option>
<option value="GCash">GCash</option>
</select>
<div id="cashDiv">
<label>Cash Amount</label>
<input type="number" id="cashAmount" placeholder="0">
</div>
<div id="gcashDiv" style="display:none">
<label>Upload GCash Proof</label>
<input type="file" id="gcashProofInput" accept="image/*">
<div id="gcashStatus" style="margin-top:5px; color:green; font-size:12px;"></div>
</div>
<button onclick="placeOrder()">Place Order</button>
<button onclick="closeModal()" style="background:#6b7280; margin-top:5px;">Cancel</button>
</div>
</div>

<div class="receipt" id="receipt"></div>

<script>
let cart = [];
let products = [
{id:1, name:'Coke 1.5L', price:75, img:'https://via.placeholder.com/100'},
{id:2, name:'Pancit Canton', price:15, img:'https://via.placeholder.com/100'},
{id:3, name:'Skyflakes', price:12, img:'https://via.placeholder.com/100'},
{id:4, name:'Lucky Me', price:13, img:'https://via.placeholder.com/100'},
{id:5, name:'Bottled Water', price:20, img:'https://via.placeholder.com/100'},
{id:6, name:'Coffee', price:25, img:'https://via.placeholder.com/100'}
];
let gcashProofFile = '';

function loadProducts() {
let grid = document.getElementById('productsGrid');
grid.innerHTML = '';
products.forEach(p => {
grid.innerHTML += `
<div class="product" onclick="addToCart(${p.id})">
<img src="${p.img}">
<div class="product-name">${p.name}</div>
<div class="product-price">₱${p.price}</div>
</div>
`;
});
}

function addToCart(id) {
let item = cart.find(x => x.id == id);
if(item) item.qty++;
else cart.push({id, qty:1});
updateCart();
}

function updateCart() {
let cartDiv = document.getElementById('cartItems');
let total = 0;
if(cart.length == 0) {
cartDiv.innerHTML = 'Empty';
} else {
cartDiv.innerHTML = '';
cart.forEach(item => {
let prod = products.find(p => p.id == item.id);
let subtotal = prod.price * item.qty;
total += subtotal;
cartDiv.innerHTML += `<div class="cart-item"><span>${prod.name} x${item.qty}</span><span>₱${subtotal}</span></div>`;
});
}
document.getElementById('cartTotal').innerText = total.toFixed(2);
}

function checkout() {
if(cart.length == 0) { alert('Cart is empty!'); return; }
document.getElementById('paymentModal').classList.add('active');
}

function closeModal() {
document.getElementById('paymentModal').classList.remove('active');
}

function togglePayment() {
let method = document.getElementById('paymentMethod').value;
document.getElementById('cashDiv').style.display = method == 'Cash' ? 'block' : 'none';
document.getElementById('gcashDiv').style.display = method == 'GCash' ? 'block' : 'none';
}

// AUTO COMPRESS
async function compressImageAuto(file) {
return new Promise((resolve) => {
const reader = new FileReader();
reader.readAsDataURL(file);
reader.onload = (event) => {
const img = new Image();
img.src = event.target.result;
img.onload = () => {
let quality = 0.8;
let maxWidth = 600;
let canvas = document.createElement('canvas');
let ctx = canvas.getContext('2d');
function tryCompress() {
let width = img.width;
let height = img.height;
if(width > maxWidth) {
height = (maxWidth / width) * height;
width = maxWidth;
}
canvas.width = width;
canvas.height = height;
ctx.drawImage(img, 0, 0, width, height);
let base64 = canvas.toDataURL('image/jpeg', quality);
let sizeKB = Math.round(base64.length / 1024);
if(sizeKB > 900 && quality > 0.3) {
quality -= 0.1;
tryCompress();
} else if(sizeKB > 900 && maxWidth > 300) {
maxWidth -= 50;
quality = 0.8;
tryCompress();
} else {
resolve(base64);
}
tryCompress();
};
});
}

document.getElementById('gcashProofInput').addEventListener('change', async function(e) {
let file = e.target.files[0];
if(!file) return;
document.getElementById('gcashStatus').innerText = 'Compressing...';
gcashProofFile = await compressImageAuto(file);
document.getElementById('gcashStatus').innerText = 'Uploaded ✓ ' + Math.round(gcashProofFile.length/1024) + 'KB';
});

function placeOrder() {
let method = document.getElementById('paymentMethod').value;
if(method == 'GCash' && !gcashProofFile) { alert('Upload GCash proof first!'); return; }
if(method == 'Cash') {
let cash = parseFloat(document.getElementById('cashAmount').value);
let total = parseFloat(document.getElementById('cartTotal').innerText);
if(!cash || cash < total) { alert('Insufficient cash!'); return; }
}
generateReceipt();
closeModal();
cart = [];
updateCart();
}

function generateReceipt() {
let receiptHTML = `<div style="text-align:center; font-weight:bold; margin-bottom:10px;">RECEIPT</div>`;
let total = 0;
cart.forEach(item => {
let prod = products.find(p => p.id == item.id);
let subtotal = prod.price * item.qty;
total += subtotal;
receiptHTML += `<div>${prod.name} x${item.qty} = ₱${subtotal}</div>`;
});
receiptHTML += `<div style="border-top:1px dashed #000; margin-top:5px; padding-top:5px;">TOTAL: ₱${total}</div>`;
receiptHTML += `<div style="margin-top:5px;">Payment: ${document.getElementById('paymentMethod').value}</div>`;
if(document.getElementById('paymentMethod').value == 'GCash') {
receiptHTML += `<div>GCASH PROOF: UPLOADED ✓</div>`;
}
receiptHTML += `<div style="text-align:center; margin-top:10px;">Thank you!</div>`;
document.getElementById('receipt').innerHTML = receiptHTML;
document.getElementById('receipt').style.display = 'block';
printReceipt();
}

function printReceipt() {
setTimeout(() => {
window.print();
setTimeout(() => {
document.getElementById('receipt').style.display = 'none';
}, 1000);
}, 300);
}

loadProducts();
</script>
</body>
</html>
