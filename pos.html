<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Store POS - Siomai Factory</title>
<style>
* {margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', Tahoma, sans-serif;}
body {background:#FFF8E1; padding:10px;}
.container { max-width:500px; margin:auto; background:white; border-radius:20px; padding:15px; box-shadow:0 6px 20px rgba(0,0,0,0.12); border-top:6px solid #D32F2F; }
h2 { color:#D32F2F; text-align:center; margin-bottom:12px; font-size:22px; }
.back-btn { background:#757575; color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer; margin-bottom:12px; font-size:12px; }
.cat-grid { display:grid; grid-template-columns:repeat(3, 1fr); gap:6px; margin-bottom:12px; }
.cat-btn { padding:12px 5px; border:none; border-radius:10px; background:#FFCC80; color:#B71C1C; font-weight:700; font-size:12px; cursor:pointer; }
.cat-btn.active {background:#D32F2F; color:white;}
.prod-grid { display:grid; grid-template-columns:repeat(2, 1fr); gap:8px; margin-bottom:90px; }
.prod-card { background:#FFFDF7; border:2px solid #FFCC80; border-radius:12px; padding:8px; text-align:center; cursor:pointer; }
.prod-img { width:100%; height:60px; object-fit:cover; border-radius:8px; margin-bottom:4px; background:#f0f0f0; }
.prod-name { font-weight:700; font-size:11px; color:#D32F2F; margin-bottom:2px; height:28px; overflow:hidden; }
.prod-price { font-size:14px; font-weight:900; color:#2E7D32; }
.prod-stock { font-size:10px; color:#666; }
.cart-float { position:fixed; bottom:0; left:0; right:0; background:white; border-top:3px solid #D32F2F; border-radius:20px 20px 0 0; padding:12px 15px; box-shadow:0 -4px 15px rgba(0,0,0,0.2); max-width:500px; margin:auto; z-index:999; }
.cart-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.cart-title { font-weight:800; color:#D32F2F; font-size:14px; }
.cart-count { background:#D32F2F; color:white; border-radius:50%; width:24px; height:24px; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:800; }
.cart-items { max-height:180px; overflow-y:auto; margin-bottom:8px; }
.cart-item { display:grid; grid-template-columns:20px 1fr 80px 60px; gap:5px; align-items:center; font-size:12px; padding:6px 0; border-bottom:1px dashed #eee; }
.remove-btn { background:#C62828; color:white; border:none; border-radius:50%; width:18px; height:18px; font-size:14px; line-height:1; cursor:pointer; font-weight:800; }
.qty-control { display:flex; gap:3px; align-items:center; }
.qty-btn { width:24px; height:24px; border:none; background:#D32F2F; color:white; border-radius:4px; font-weight:800; cursor:pointer; font-size:14px; }
.qty-input { width:40px; height:24px; text-align:center; border:1px solid #ddd; border-radius:4px; font-size:12px; }
.item-name {font-size:11px; overflow:hidden;}
.item-total {text-align:right; font-weight:700; color:#2E7D32;}
.cart-total { font-size:20px; font-weight:900; color:#D32F2F; text-align:right; margin:8px 0; }
.modal { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center; }
.modal.active {display:flex;}
.modal-box { background:white; border-radius:15px; padding:20px; width:90%; max-width:380px; max-height:90vh; overflow-y:auto; }
.modal-box h3 { color:#D32F2F; text-align:center; margin-bottom:12px; }
.review-item { display:flex; justify-content:space-between; font-size:13px; padding:5px 0; border-bottom:1px solid #eee; }
.review-total { font-size:22px; font-weight:900; color:#D32F2F; text-align:right; margin:10px 0; border-top:2px solid #D32F2F; padding-top:8px; }
.cash-input { margin:12px 0; }
.cash-input input { width:100%; padding:12px; font-size:18px; font-weight:700; text-align:right; border:2px solid #FFCC80; border-radius:8px; }
.change { text-align:right; font-size:16px; font-weight:800; color:#2E7D32; margin-top:5px; }
.gcash-proof { margin:12px 0; display:none; }
.gcash-proof label { font-size:12px; color:#007BFF; font-weight:700; display:block; margin-bottom:5px; }
.gcash-proof input { width:100%; padding:8px; border:2px dashed #007BFF; border-radius:8px; cursor:pointer; }
.gcash-proof img { max-width:100px; margin-top:8px; border-radius:8px; border:2px solid #007BFF; display:none; }
.checkout-btn { width:100%; padding:14px; background:#2E7D32; color:white; border:none; border-radius:10px; font-weight:800; font-size:15px; cursor:pointer; }
.checkout-btn:disabled { background:#ccc; cursor:not-allowed; }
.cancel-btn { width:100%; padding:10px; margin-top:8px; background:#999; color:white; border:none; border-radius:8px; font-weight:700; cursor:pointer; }
.loading { text-align:center; padding:40px; color:#D32F2F; font-weight:700; }
.receipt { display:none; font-family:monospace; font-size:14px; color:black; background:white; padding:10px; width:100%; max-width:300px; margin:auto; line-height:1.6; text-align:left; }
@media print { @page {size: 80mm auto; margin: 0;} body * {visibility:hidden;}.receipt,.receipt * {visibility:visible;}.receipt { position:absolute; left:0; top:0; width:80mm; display:block!important; font-size:12px; } }
</style>
</head>
<body>
<div class="container">
<button class="back-btn" onclick="window.location='index.html'">← Back to Menu</button>
<h2>🛒 Store POS</h2>
<div class="cat-grid">
<button class="cat-btn active" onclick="filterCat('all', this)">All</button>
<button class="cat-btn" onclick="filterCat('65s', this)">65's</button>
<button class="cat-btn" onclick="filterCat('30s', this)">30's</button>
<button class="cat-btn" onclick="filterCat('big', this)">Big SIOMAI</button>
<button class="cat-btn" onclick="filterCat('dumplings', this)">Dumplings</button>
<button class="cat-btn" onclick="filterCat('siopao', this)">SIOPAO</button>
<button class="cat-btn" onclick="filterCat('sauce', this)">Sauce</button>
<button class="cat-btn" onclick="filterCat('others', this)">Others</button>
</div>
<div class="prod-grid" id="prodGrid"><div class="loading">Loading products...</div></div>
</div>

<div class="cart-float">
<div class="cart-header">
<span class="cart-title">🛒 Cart</span>
<span class="cart-count" id="cartCount">0</span>
</div>
<div class="cart-items" id="cartItems">
<p style="text-align:center; color:#999; font-size:12px; padding:20px 0;">No items</p>
</div>
<div class="cart-total" id="cartTotal">Total: ₱0</div>
<button class="checkout-btn" id="checkoutBtn" onclick="showPayment()" disabled>Checkout</button>
</div>

<!-- AYUS NA MODAL BOSS - ISA LANG CASH SECTION -->
<div class="modal" id="paymentModal">
<div class="modal-box">
<h3>📋 Review Order</h3>
<div id="reviewList"></div>
<div class="review-total" id="reviewTotal">Total: ₱0</div>

<div style="margin:12px 0;">
<label style="font-size:12px; color:#666; display:block; margin-bottom:5px;">Payment Method:</label>
<select id="paymentMethod" onchange="togglePayment()" style="width:100%; padding:12px; font-size:16px; border:2px solid #FFCC80; border-radius:8px; font-weight:700;">
<option value="Cash">Cash</option>
<option value="Gcash">GCash</option>
</select>
</div>

<div id="cashSection">
<div class="cash-input">
<label style="font-size:12px; color:#666;">Cash Tendered</label>
<input type="number" id="cashInput" placeholder="0" oninput="computeChange()">
</div>
<div class="change" id="change">Change: ₱0</div>
</div>

<div class="gcash-proof" id="gcashProof" style="display:none;">
<label>📱 Gcash Proof - Auto Compress</label>
<input type="file" id="gcashProofInput" accept="image/*">
<img id="proofPreview">
</div>

<button class="checkout-btn" onclick="placeOrder()">Place Order</button>
<button class="cancel-btn" onclick="closePayment()">Cancel</button>
</div>
</div>

<!-- Receipt for Print -->
<div class="receipt" id="receipt"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, updateDoc, doc, addDoc, serverTimestamp, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDk3ZbOXuw3PEfJzdt8AI2ueJq5yksfekE",
authDomain: "dhan-siomai-pos-fe1e5.firebaseapp.com",
projectId: "dhan-siomai-pos-fe1e5",
storageBucket: "dhan-siomai-pos-fe1e5.firebasestorage.app",
messagingSenderId: "305932123173",
appId: "1:305932123173:web:f27894a2d5e6e6ab8253cc"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let products = [];
let cart = [];
let currentCat = 'all';
let selectedPayment = 'Cash';
let gcashProofFile = ''; // AYUS NA NAME BOSS


// AUTO COMPRESS - AYUS NA VERSION BOSS
async function compressImageAuto(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = (event) => {
      const img = new Image();
      img.src = event.target.result;
      img.onload = () => {
        let quality = 0.8;
        let maxWidth = 600;
        let canvas = document.createElement('canvas');
        let ctx = canvas.getContext('2d');
        
        function tryCompress() {
          let width = img.width;
          let height = img.height;
          if(width > maxWidth) {
            height = (maxWidth / width) * height;
            width = maxWidth;
          }
          canvas.width = width;
          canvas.height = height;
          ctx.drawImage(img, 0, 0, width, height);
          let base64 = canvas.toDataURL('image/jpeg', quality);
          let sizeKB = Math.round(base64.length / 1024);
          if(sizeKB > 900 && quality > 0.3) {
            quality -= 0.1;
            tryCompress();
          } else if(sizeKB > 900 && maxWidth > 300) {
            maxWidth -= 50;
            quality = 0.8;
            tryCompress();
          } else {
            resolve(base64);
          }
        }
        tryCompress();
      };
    };
  });
}

let quality = 0.8;
let maxWidth = 600;
let canvas = document.createElement('canvas');
let ctx = canvas.getContext('2d');
function tryCompress() {
let width = img.width;
let height = img.height;
if(width > maxWidth) {
height = (maxWidth / width) * height;
width = maxWidth;
}
canvas.width = width;
canvas.height = height;
ctx.drawImage(img, 0, 0, width, height);
let base64 = canvas.toDataURL('image/jpeg', quality);
let sizeKB = Math.round(base64.length / 1024);
if(sizeKB > 900 && quality > 0.3) {
quality -= 0.1;
tryCompress();
} else if(sizeKB > 900 && maxWidth > 300) {
maxWidth -= 50;
quality = 0.8;
tryCompress();
} else {
resolve(base64);
}
tryCompress();
}
});
}

// AYUS NA EVENT LISTENER - GCASH PROOF
document.getElementById('gcashProofInput').addEventListener('change', async function(e) {
const file = e.target.files[0];
if(file) {
const btn = document.querySelector('.checkout-btn');
const oldText = btn.innerText;
btn.innerText = 'Compressing...';
btn.disabled = true;
gcashProofFile = await compressImageAuto(file);
document.getElementById('proofPreview').src = gcashProofFile; // AYUS NA VARIABLE
document.getElementById('proofPreview').style.display = 'block';
alert('Proof uploaded ✓');
btn.innerText = oldText;
btn.disabled = false;
}
});

async function loadProducts() {
const grid = document.getElementById('prodGrid');
grid.innerHTML = '<div class="loading">Loading products...</div>';
try {
let q = collection(db, "products");
if(currentCat!= 'all') {
q = query(collection(db, "products"), where("category", "==", currentCat));
}
const snap = await getDocs(q);
products = [];
snap.forEach(d => {
const data = d.data();
if(data.stock > 0) {
products.push({id: d.id,...data});
}
});
if(products.length === 0) {
grid.innerHTML = '<p style="grid-column:span 2; text-align:center; color:#999; padding:40px;">No products available</p>';
return;
}
let html = '';
products.forEach(prod => {
html += `
<div class="prod-card" onclick="addToCart('${prod.id}')">
${prod.image? `<img src="${prod.image}" class="prod-img">` : '<div class="prod-img" style="display:flex;align-items:center;justify-content:center;color:#ccc;font-size:10px;">No Image</div>'}
<div class="prod-name">${prod.name}</div>
<div class="prod-price">₱${prod.price}</div>
<div class="prod-stock">Stock: ${prod.stock}</div>
</div>
`;
});
grid.innerHTML = html;
} catch(error) {
console.error('Load Error:', error);
grid.innerHTML = '<p style="grid-column:span 2; text-align:center; color:#C62828; padding:40px;">Error loading products</p>';
}
}

window.filterCat = (cat, btn) => {
currentCat = cat;
document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
btn.classList.add('active');
loadProducts();
}

window.addToCart = (id) => {
const prod = products.find(p => p.id === id);
if(!prod) return;
const exist = cart.find(item => item.id === id);
if(exist) {
if(exist.qty < prod.stock) exist.qty++;
else alert('Out of stock!');
} else {
cart.push({id: prod.id, name: prod.name, price: prod.price, qty: 1, stock: prod.stock});
}
renderCart();
}

function renderCart() {
const items = document.getElementById('cartItems');
const count = document.getElementById('cartCount');
const total = document.getElementById('cartTotal');
const btn = document.getElementById('checkoutBtn');

if(cart.length === 0) {
items.innerHTML = '<p style="text-align:center; color:#999; font-size:12px; padding:20px 0;">No items</p>';
count.innerText = '0';
total.innerText = 'Total: ₱0';
btn.disabled = true;
return;
}

btn.disabled = false;
let html = '';
let sum = 0;
cart.forEach((item, idx) => {
const itemTotal = item.price * item.qty;
sum += itemTotal;
html += `
<div class="cart-item">
<button class="remove-btn" onclick="removeItem(${idx})">×</button>
<div class="item-name">${item.name}</div>
<div class="qty-control">
<button class="qty-btn" onclick="updateQty(${idx}, -1)">-</button>
<input class="qty-input" value="${item.qty}" readonly>
<button class="qty-btn" onclick="updateQty(${idx}, 1)">+</button>
</div>
<div class="item-total">₱${itemTotal.toFixed(2)}</div>
</div>
`;
});
items.innerHTML = html;
count.innerText = cart.reduce((s, i) => s + i.qty, 0);
total.innerText = 'Total: ₱' + sum.toFixed(2);
}

window.removeItem = (idx) => {
cart.splice(idx, 1);
renderCart();
}

window.updateQty = (idx, delta) => {
const item = cart[idx];
const newQty = item.qty + delta;
if(newQty < 1) return;
if(newQty > item.stock) {
alert('Max stock: ' + item.stock);
return;
}
item.qty = newQty;
renderCart();
}


window.addToCart = (prodId) => { 
const prod = products.find(p => p.id === prodId); 
if(!prod || prod.stock <= 0) { 
alert('Out of stock boss!'); 
return; 
} 
const existing = cart.find(item => item.id === prodId); 
if(existing) { 
if(existing.qty >= prod.stock) { 
alert('Kulang na stocks boss!'); 
return; 
} 
existing.qty++; 
} else { 
cart.push({id: prodId, name: prod.name, price: prod.price, qty: 1, stock: prod.stock}); 
} 
renderCart(); 
}

function renderCart() { 
const cartItems = document.getElementById('cartItems'); 
const cartCount = document.getElementById('cartCount'); 
const cartTotal = document.getElementById('cartTotal'); 
const checkoutBtn = document.getElementById('checkoutBtn'); 
let total = 0; 
let count = 0; 
if(cart.length === 0) { 
cartItems.innerHTML = '<p style="text-align:center; color:#999; font-size:12px; padding:20px 0;">No items</p>'; 
checkoutBtn.disabled = true; 
} else { 
let html = ''; 
cart.forEach((item, i) => { 
const subtotal = item.price * item.qty; 
total += subtotal; 
count += item.qty; 
html += ` 
<div class="cart-item"> 
<button class="remove-btn" onclick="removeItem(${i})">×</button> 
<span class="item-name">${item.name}</span> 
<div class="qty-control"> 
<button class="qty-btn" onclick="changeQty(${i}, -1)">-</button> 
<input type="number" class="qty-input" value="${item.qty}" min="1" oninput="setQty(${i}, this.value)"> 
<button class="qty-btn" onclick="changeQty(${i}, 1)">+</button> 
</div> 
<span class="item-total">₱${subtotal.toFixed(2)}</span> 
</div> 
`; 
}); 
cartItems.innerHTML = html; 
checkoutBtn.disabled = false; 
} 
cartCount.innerText = count; 
cartTotal.innerText = 'Total: ₱' + total.toFixed(2); 
}

window.removeItem = (index) => { 
cart.splice(index, 1); 
renderCart(); 
}

window.changeQty = (index, delta) => { 
cart[index].qty += delta; 
const prod = products.find(p => p.id === cart[index].id); 
if(cart[index].qty < 1) cart[index].qty = 1; 
if(prod && cart[index].qty > prod.stock) cart[index].qty = prod.stock; 
renderCart(); 
}

window.setQty = (index, value) => { 
let qty = parseInt(value) || 1; 
const prod = products.find(p => p.id === cart[index].id); 
if(qty < 1) qty = 1; 
if(prod && qty > prod.stock) { 
qty = prod.stock; 
alert('Max stock: ' + prod.stock + ' lang boss!'); 
} 
cart[index].qty = qty; 
renderCart(); 
}

window.showPayment = () => { 
if(cart.length === 0) return alert('Walang items sa cart boss!'); 
const modal = document.getElementById('paymentModal'); 
if(!modal) return alert('Wala kang paymentModal sa HTML boss!'); 

const reviewList = document.getElementById('reviewList'); 
const reviewTotal = document.getElementById('reviewTotal'); 
const total = cart.reduce((sum, item) => sum + item.price * item.qty, 0); 

let html = ''; 
cart.forEach(item => { 
html += `<div class="review-item"><span>${item.name} x${item.qty}</span><span>₱${(item.price * item.qty).toFixed(2)}</span></div>`; 
}); 
reviewList.innerHTML = html; 
reviewTotal.innerText = 'Total: ₱' + total.toFixed(2); 

// RESET PAG OPEN ULIT BOSS
document.getElementById('cashInput').value = ''; 
document.getElementById('gcashProofInput').value = ''; 
document.getElementById('proofPreview').style.display = 'none'; 
gcashProofFile = ''; 

modal.classList.add('active'); // para lumabas modal
togglePayment(); // para mag-set ng Cash/GCash display
}

window.closePayment = () => { 
document.getElementById('paymentModal').classList.remove('active'); 
selectedPayment = 'Cash'; 
gcashProofFile = ''; // AYUS NA VARIABLE
}

window.computeChange = () => { 
const total = cart.reduce((sum, item) => sum + item.price * item.qty, 0); 
const cash = parseFloat(document.getElementById('cashInput').value) || 0; 
const change = cash - total; 
document.getElementById('change').innerText = 'Change: ₱' + (change >= 0? change.toFixed(2) : '0.00'); 
document.getElementById('change').style.color = change >= 0? '#2E7D32' : '#C62828'; 
}

window.togglePayment = () => { 
const methodEl = document.getElementById('paymentMethod'); 
const cashSec = document.getElementById('cashSection'); 
const gcashDiv = document.getElementById('gcashProof'); 
if(!methodEl || !cashSec || !gcashDiv) return; 

const method = methodEl.value; 
if(method === 'Cash') { 
cashSec.style.display = 'block'; 
gcashDiv.style.display = 'none'; 
} else { 
cashSec.style.display = 'none'; 
gcashDiv.style.display = 'block'; 
} 
}

window.placeOrder = async () => { 
const method = document.getElementById('paymentMethod').value; 
const total = cart.reduce((sum, item) => sum + item.price * item.qty, 0); 

if(method === 'Cash') { 
const cash = parseFloat(document.getElementById('cashInput').value) || 0; 
if(cash < total) { 
alert('Kulang ang cash boss!'); 
return; 
} 
}

if(method === 'Gcash' && !gcashProofFile) { // AYUS NA VARIABLE
alert('Upload Gcash proof muna boss!'); 
return; 
} 

try { 
// Deduct stock
for(let item of cart) { 
const prod = products.find(p => p.id === item.id); 
if(prod) { 
await updateDoc(doc(db, "products", item.id), { 
stock: prod.stock - item.qty 
}); 
} 
}

// Save sales with proof
await addDoc(collection(db, "sales"), { 
datetime: serverTimestamp(), 
items: cart, 
total: total, 
payment: method, 
proof: gcashProofFile // AYUS NA VARIABLE
}); 

// Generate + Print Receipt
generateReceipt(method, total); 
printReceipt(); 

alert(`✓ SALE COMPLETE\nPayment: ${method}\nTotal: ₱${total.toFixed(2)}\n\nThank you! Come again! 🙏`); 
cart = []; 
renderCart(); 
closePayment(); 
loadProducts(); 
} catch(error) { 
alert('Checkout failed: ' + error.message); 
console.error(error); 
} 
}

function generateReceipt(paymentMethod, total) { 
const now = new Date(); 
let receiptHTML = ` 
<div style="text-align:center; font-weight:bold; border-bottom:1px dashed #000; padding-bottom:5px; margin-bottom:5px;"> 
ONE SIOMAI FACTORY<br> 
77 AMOIS SAN MATEO RIZAL<br> 
Tel: 09052733253<br> 
${now.toLocaleString('en-PH')}<br> 
Cashier: ADMIN 
</div> 
`; 

cart.forEach(item => { 
receiptHTML += ` 
<div style="margin-top:5px;"> 
<div style="font-weight:bold;">${item.name}</div> 
<div style="display:flex; justify-content:space-between;"> 
<span>${item.qty} x ₱${item.price}</span> 
<span>₱${(item.price * item.qty).toFixed(2)}</span> 
</div> 
</div> 
`; 
}); 

receiptHTML += ` 
<div style="border-top:1px dashed #000; margin-top:8px; padding-top:5px;"> 
<div style="display:flex; justify-content:space-between;"> 
<span>SUBTOTAL:</span> 
<span>₱${total.toFixed(2)}</span> 
</div> 
<div style="display:flex; justify-content:space-between; font-weight:bold; font-size:16px;"> 
<span>TOTAL:</span> 
<span>₱${total.toFixed(2)}</span> 
</div> 
<div>PAYMENT: ${paymentMethod}</div> 
`; 

if(paymentMethod === 'Cash') { 
const cash = parseFloat(document.getElementById('cashInput').value) || 0; 
receiptHTML += ` 
<div>CASH: ₱${cash.toFixed(2)}</div> 
<div>CHANGE: ₱${(cash - total).toFixed(2)}</div> 
`; 
} else { 
receiptHTML += `<div>GCASH PROOF: UPLOADED ✓</div>`; 
} 

receiptHTML += ` 
</div> 
<div style="text-align:center; border-top:1px dashed #000; margin-top:8px; padding-top:8px; font-weight:bold;"> 
Thank you! Come again! 🙏 
</div> 
`; 

document.getElementById('receipt').innerHTML = receiptHTML; 
document.getElementById('receipt').style.display = 'block'; 
}

function printReceipt() { 
setTimeout(() => { 
window.print(); 
setTimeout(() => { 
document.getElementById('receipt').style.display = 'none'; 
}, 1000); 
}, 300); 
}

loadProducts();
</script>
</body>
</html>
