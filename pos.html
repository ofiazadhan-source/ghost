<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS - Siomai Factory Tindahan</title>
<style>
* {margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', Tahoma, sans-serif;}
body {background:#FFF8E1; padding:15px; min-height:100vh;}
.container { max-width:480px; margin:auto; background:white; border-radius:20px; padding:20px; box-shadow:0 6px 20px rgba(0,0,0,0.12); border-top:6px solid #D32F2F; }
h2 { color:#D32F2F; text-align:center; margin-bottom:8px; font-size:24px; }
.back-btn { background:#757575; color:white; border:none; padding:10px 18px; border-radius:8px; cursor:pointer; margin-bottom:15px; font-size:13px; font-weight:600; }
.menu-grid { display:grid; grid-template-columns:repeat(2, 1fr); gap:12px; }
.menu-btn { padding:35px 10px; border:none; border-radius:15px; background:linear-gradient(135deg, #FFCC80, #FFB74D); color:#B71C1C; font-weight:800; font-size:15px; cursor:pointer; text-align:center; line-height:1.4; }
.menu-btn:active {transform:scale(0.95); background:#FFA726;}
.prod-list { display:grid; grid-template-columns:repeat(2, 1fr); gap:10px; }
.prod-card { background:#FFFDF7; border:2px solid #FFCC80; border-radius:12px; padding:12px; text-align:center; cursor:pointer; position:relative; }
.prod-card:active {background:#FFE0B2;}
.prod-img { width:100%; height:70px; object-fit:cover; border-radius:8px; margin-bottom:6px; background:#f0f0f0; }
.prod-name { font-weight:800; font-size:13px; color:#D32F2F; margin-bottom:4px; }
.prod-price { font-size:12px; color:#666; font-weight:700; }
.qty-badge { position:absolute; top:5px; left:5px; background:#2E7D32; color:white; border-radius:50%; width:24px; height:24px; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:bold; }
.cart-box { background:#FFF8E1; border:2px dashed #FFCC80; border-radius:12px; padding:15px; margin-top:20px; }
.cart-box h3 { color:#D32F2F; margin-bottom:10px; font-size:16px; }
.cart-item { display:flex; justify-content:space-between; align-items:center; padding:8px 0; font-size:13px; border-bottom:1px solid #FFE0B2; }
.cart-item button { width:24px; height:24px; padding:0; background:#C62828; border-radius:50%; font-size:14px; margin:0; }
.cart-total { margin-top:10px; padding-top:10px; border-top:2px solid #D32F2F; font-weight:800; font-size:18px; color:#D32F2F; display:flex; justify-content:space-between; }
button { width:100%; padding:14px; background:#2E7D32; color:white; border:none; border-radius:8px; font-weight:800; cursor:pointer; margin-top:10px; font-size:15px; }
button:disabled { background:#ccc; cursor:not-allowed; }
.modal {display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:999;}
.modal.active {display:flex;}
.modal-content {background:white; padding:20px; border-radius:15px; width:90%; max-width:400px;}
.modal-content h3 {color:#D32F2F; margin-bottom:15px; text-align:center;}
.input-group {margin-bottom:12px;}
.input-group label { font-size:12px; font-weight:700; color:#D32F2F; margin-bottom:4px; display:block; }
.input-group input,.input-group select { width:100%; padding:12px; border:2px solid #FFE0B2; border-radius:8px; font-size:14px; }
.receipt {display:none; background:white; padding:20px; font-family:monospace; font-size:12px; max-width:300px; margin:20px auto; border:1px dashed #000;}
@media print {.container,.modal {display:none;}.receipt {display:block!important;}}
.page {display:none;}.page.active {display:block;}
.loading { text-align:center; padding:20px; color:#D32F2F; font-weight:700; }
.empty-msg { grid-column:span 2; text-align:center; color:#999; padding:40px 0; font-size:13px; }
#gcashStatus { margin-top:5px; color:green; font-size:12px; font-weight:700; }
</style>
</head>
<body>
<div class="container">
<!-- PAGE 1: CATEGORIES -->
<div id="categoryPage" class="page active">
<button class="back-btn" onclick="window.location='index.html'">← Back to Menu</button>
<h2>🛒 Siomai Factory POS</h2>
<div class="menu-grid">
<button class="menu-btn" onclick="openCategory('65s')">65's</button>
<button class="menu-btn" onclick="openCategory('30s')">30's</button>
<button class="menu-btn" onclick="openCategory('big')">Big SIOMAI</button>
<button class="menu-btn" onclick="openCategory('dumplings')">Dumplings</button>
<button class="menu-btn" onclick="openCategory('siopao')">SIOPAO</button>
<button class="menu-btn" onclick="openCategory('sauce')">Sauce</button>
<button class="menu-btn" onclick="openCategory('others')">Others</button>
<button class="menu-btn" onclick="openCategory('all')">All</button>
</div>

<div class="cart-box">
<h3>🛒 Cart</h3>
<div id="cartItems"><p style="text-align:center; color:#999;">Empty</p></div>
<div class="cart-total"><span>TOTAL:</span><span>₱<span id="cartTotal">0.00</span></span></div>
<button onclick="checkout()">Checkout</button>
</div>
</div>

<!-- PAGE 2: PRODUCTS -->
<div id="productPage" class="page">
<button class="back-btn" onclick="showPage('categoryPage')">← Back to Categories</button>
<h2 id="catTitle">65's Siomai</h2>
<div class="prod-list" id="prodList">
<div class="loading">Loading products...</div>
</div>
</div>
</div>

<!-- PAYMENT MODAL -->
<div class="modal" id="paymentModal">
<div class="modal-content">
<h3>Payment</h3>
<div class="input-group">
<label>Payment Method</label>
<select id="paymentMethod" onchange="togglePayment()">
<option value="Cash">Cash</option>
<option value="GCash">GCash</option>
</select>
</div>
<div id="cashDiv">
<div class="input-group">
<label>Cash Amount</label>
<input type="number" id="cashAmount" placeholder="0" step="0.01">
</div>
</div>
<div id="gcashDiv" style="display:none">
<div class="input-group">
<label>Upload GCash Proof - Auto Compress</label>
<input type="file" id="gcashProofInput" accept="image/*">
<div id="gcashStatus"></div>
</div>
</div>
<button onclick="placeOrder()">Place Order</button>
<button onclick="closeModal()" style="background:#757575; margin-top:5px;">Cancel</button>
</div>
</div>

<!-- RECEIPT -->
<div class="receipt" id="receipt"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDk3ZbOXuw3PEfJzdt8AI2ueJq5yksfekE",
authDomain: "dhan-siomai-pos-fe1e5.firebaseapp.com",
projectId: "dhan-siomai-pos-fe1e5",
storageBucket: "dhan-siomai-pos-fe1e5.firebasestorage.app",
messagingSenderId: "305932123173",
appId: "1:305932123173:web:f27894a2d5e6e6ab8253cc"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentCat = '65s';
let products = [];
let cart = [];
let gcashProofFile = '';

function showPage(pageId) {
document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
document.getElementById(pageId).classList.add('active');
}

window.openCategory = async (cat) => {
currentCat = cat;
const catNames = {
'65s': "65's Siomai", '30s': "30's Siomai", 'big': 'Big SIOMAI',
'dumplings': 'Dumplings', 'siopao': 'SIOPAO', 'sauce': 'Sauce',
'others': 'Others', 'all': 'All Products'
};
document.getElementById('catTitle').innerText = catNames[cat];
showPage('productPage');
await loadProducts();
}

async function loadProducts() {
document.getElementById('prodList').innerHTML = '<div class="loading">Loading products...</div>';
try {
let q = collection(db, "products");
if(currentCat!= 'all') {
q = query(collection(db, "products"), where("category", "==", currentCat));
}
const snap = await getDocs(q);
products = [];
snap.forEach(d => products.push({id: d.id,...d.data()}));
renderProducts();
} catch(error) {
console.error('Load Error:', error);
document.getElementById('prodList').innerHTML = '<p class="empty-msg">Error loading. Check internet/Firestore Rules boss!</p>';
}
}

function renderProducts() {
const list = document.getElementById('prodList');
if(products.length === 0) {
list.innerHTML = '<p class="empty-msg">No products in this category</p>';
return;
}
let html = '';
products.forEach(prod => {
let cartItem = cart.find(x => x.id == prod.id);
let qtyBadge = cartItem? `<div class="qty-badge">${cartItem.qty}</div>` : '';
html += `
<div class="prod-card" onclick="addToCart('${prod.id}')">
${qtyBadge}
${prod.image? `<img src="${prod.image}" class="prod-img">` : '<div class="prod-img" style="display:flex;align-items:center;justify-content:center;color:#ccc;font-size:11px;">No Image</div>'}
<div class="prod-name">${prod.name}</div>
<div class="prod-price">₱${prod.price} | Stock: ${prod.stock || 0}</div>
</div>
`;
});
list.innerHTML = html;
}

window.addToCart = (prodId) => {
let prod = products.find(p => p.id == prodId);
if(!prod) return;
let item = cart.find(x => x.id == prodId);
if(item) {
item.qty++;
} else {
cart.push({id: prod.id, name: prod.name, price: prod.price, qty:1});
}
updateCart();
renderProducts();
}

function updateCart() {
let cartDiv = document.getElementById('cartItems');
let total = 0;
if(cart.length == 0) {
cartDiv.innerHTML = '<p style="text-align:center; color:#999;">Empty</p>';
} else {
cartDiv.innerHTML = '';
cart.forEach(item => {
let subtotal = item.price * item.qty;
total += subtotal;
cartDiv.innerHTML += `
<div class="cart-item">
<span>${item.name} x${item.qty}</span>
<div style="display:flex; align-items:center; gap:8px;">
<span>₱${subtotal}</span>
<button onclick="removeFromCart('${item.id}')">×</button>
</div>
</div>
`;
});
}
document.getElementById('cartTotal').innerText = total.toFixed(2);
}

window.removeFromCart = (prodId) => {
cart = cart.filter(x => x.id!= prodId);
updateCart();
renderProducts();
}

window.checkout = () => {
if(cart.length == 0) { alert('Cart is empty boss!'); return; }
document.getElementById('paymentModal').classList.add('active');
}

window.closeModal = () => {
document.getElementById('paymentModal').classList.remove('active');
}

window.togglePayment = () => {
let method = document.getElementById('paymentMethod').value;
document.getElementById('cashDiv').style.display = method == 'Cash'? 'block' : 'none';
document.getElementById('gcashDiv').style.display = method == 'GCash'? 'block' : 'none';
}

// AUTO COMPRESS - SAME SA PRODUCTS.HTML MO BOSS
async function compressImageAuto(file) {
return new Promise((resolve) => {
const reader = new FileReader();
reader.readAsDataURL(file);
reader.onload = (event) => {
const img = new Image();
img.src = event.target.result;
img.onload = () => {
let quality = 0.8;
let maxWidth = 600;
let canvas = document.createElement('canvas');
let ctx = canvas.getContext('2d');
function tryCompress() {
let width = img.width;
let height = img.height;
if(width > maxWidth) {
height = (maxWidth / width) * height;
width = maxWidth;
}
canvas.width = width;
canvas.height = height;
ctx.drawImage(img, 0, 0, width, height);
let base64 = canvas.toDataURL('image/jpeg', quality);
let sizeKB = Math.round(base64.length / 1024);
if(sizeKB > 900 && quality > 0.3) {
quality -= 0.1;
tryCompress();
} else if(sizeKB > 900 && maxWidth > 300) {
maxWidth -= 50;
quality = 0.8;
tryCompress();
} else {
resolve(base64);
}
tryCompress();
}
});
}

document.getElementById('gcashProofInput').addEventListener('change', async function(e) {
const file = e.target.files[0];
if(file) {
document.getElementById('gcashStatus').innerText = 'Compressing...';
gcashProofFile = await compressImageAuto(file);
document.getElementById('gcashStatus').innerText = 'Uploaded ✓ ' + Math.round(gcashProofFile.length/1024) + 'KB';
} else {
gcashProofFile = '';
document.getElementById('gcashStatus').innerText = '';
}
});

window.placeOrder = () => {
let method = document.getElementById('paymentMethod').value;
if(method == 'GCash' &&!gcashProofFile) { alert('Upload GCash proof first boss!'); return; }
if(method == 'Cash') {
let cash = parseFloat(document.getElementById('cashAmount').value);
let total = parseFloat(document.getElementById('cartTotal').innerText);
if(!cash || cash < total) { alert('Insufficient cash!'); return; }
}
generateReceipt();
closeModal();
cart = [];
updateCart();
gcashProofFile = '';
document.getElementById('gcashProofInput').value = '';
document.getElementById('gcashStatus').innerText = '';
}

function generateReceipt() {
let receiptHTML = `<div style="text-align:center; font-weight:bold; margin-bottom:10px;">SIOMAI FACTORY</div>`;
let total = 0;
cart.forEach(item => {
let subtotal = item.price * item.qty;
total += subtotal;
receiptHTML += `<div>${item.name} x${item.qty} = ₱${subtotal}</div>`;
});
receiptHTML += `<div style="border-top:1px dashed #000; margin-top:5px; padding-top:5px; font-weight:bold;">TOTAL: ₱${total}</div>`;
receiptHTML += `<div style="margin-top:5px;">Payment: ${document.getElementById('paymentMethod').value}</div>`;
if(document.getElementById('paymentMethod').value == 'GCash') {
receiptHTML += `<div>GCASH PROOF: UPLOADED ✓</div>`;
}
receiptHTML += `<div style="text-align:center; margin-top:10px;">Thank you!</div>`;
document.getElementById('receipt').innerHTML = receiptHTML;
document.getElementById('receipt').style.display = 'block';
printReceipt();
}

function printReceipt() {
setTimeout(() => {
window.print();
setTimeout(() => {
document.getElementById('receipt').style.display = 'none';
}, 1000);
}, 300);
}
</script>
</body>
</html>
