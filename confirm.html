<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orders - DHAN SIOMAI Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* {margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif;}
body {background:#FFF8E1;}
.header { 
  background: linear-gradient(135deg, #D32F2F, #B71C1C); 
  color:white; 
  padding:15px; 
  display:flex; 
  justify-content:space-between; 
  align-items:center; 
  position:sticky; 
  top:0; 
  z-index:10; 
}
.header h1 {font-size:18px; font-weight:700;}
.header a {color:#D32F2F; background:#fff; text-decoration:none; font-weight:600; padding:8px 14px; border-radius:8px;}
.container {padding:15px; max-width:1200px; margin:0 auto;}
.filter-bar { display:flex; gap:10px; margin-bottom:15px; flex-wrap:wrap; }
.filter-btn { 
  padding:8px 16px; 
  border:none; 
  border-radius:20px; 
  background:#fff; 
  border:2px solid #FFE0B2; 
  font-weight:600; 
  cursor:pointer; 
  font-size:14px; 
}
.filter-btn.active { background:#D32F2F; color:white; border-color:#D32F2F; }
.order-card { 
  background:white; 
  border-radius:16px; 
  padding:15px; 
  margin-bottom:15px; 
  box-shadow:0 3px 10px rgba(0,0,0,0.08); 
  border-left:5px solid #ccc; 
}
.order-card.pending {border-left-color:#FFC107;}
.order-card.completed {border-left-color:#4caf50;}
.order-card.rejected {border-left-color:#f44336;}
.order-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; flex-wrap:wrap; gap:10px; }
.order-id { font-weight:700; color:#D32F2F; font-size:14px; }
.status-badge { padding:5px 12px; border-radius:20px; font-size:12px; font-weight:700; }
.status-pending {background:#FFF3CD; color:#856404;}
.status-completed {background:#D4EDDA; color:#155724;}
.status-rejected {background:#F8D7DA; color:#721C24;}
.order-info { margin-bottom:10px; }
.order-info p { margin-bottom:5px; font-size:14px; color:#333; }
.order-info strong { color:#000; }
.items-list { background:#FFF8E1; padding:10px; border-radius:8px; margin:10px 0; }
.items-list h4 { font-size:13px; margin-bottom:5px; color:#D32F2F; }
.item-row { display:flex; justify-content:space-between; font-size:13px; margin-bottom:3px; }
.proof-img { max-width:100%; max-height:200px; border-radius:8px; margin-top:10px; cursor:pointer; }
.action-buttons { display:flex; gap:10px; margin-top:15px; }
.action-buttons button { 
  flex:1; 
  padding:10px; 
  border:none; 
  border-radius:10px; 
  font-weight:600; 
  cursor:pointer; 
  font-size:14px; 
}
.btn-approve { background:#4caf50; color:white; }
.btn-reject { background:#f44336; color:white; }
.loading { text-align:center; padding:40px; color:#666; }

/* Modal - Reject Reason */
.modal { 
  display:none; 
  position:fixed; 
  top:0; 
  left:0; 
  width:100%; 
  height:100%; 
  background:rgba(0,0,0,0.5); 
  z-index:100; 
  align-items:center; 
  justify-content:center; 
  padding:15px; 
}
.modal.active {display:flex;}
.modal-content { 
  background:white; 
  border-radius:16px; 
  padding:20px; 
  width:100%; 
  max-width:400px; 
}
.modal-content h3 { margin-bottom:15px; color:#D32F2F; }
.modal-content textarea { 
  width:100%; 
  padding:12px; 
  border:2px solid #FFE0B2; 
  border-radius:10px; 
  font-size:14px; 
  margin-bottom:15px; 
  resize:none;
  font-family:'Poppins', sans-serif;
}
.modal-actions { display:flex; gap:10px; }
.modal-actions button { 
  flex:1; 
  padding:12px; 
  border:none; 
  border-radius:10px; 
  font-weight:600; 
  cursor:pointer; 
  font-size:14px;
}
.btn-cancel-modal {background:#f5f5f5; color:#333;}
.btn-confirm-reject {background:#f44336; color:white;}
</style>
</head>
<body>

<div class="header">
  <h1>📋 Online Orders</h1>
  <a href="index.html">← Back</a>
</div>

<div class="container">
  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" data-status="all">All</button>
    <button class="filter-btn" data-status="pending">Pending</button>
    <button class="filter-btn" data-status="completed">Approved</button>
    <button class="filter-btn" data-status="rejected">Rejected</button>
  </div>
  <div id="ordersList">
    <div class="loading">Loading orders...</div>
  </div>
</div>

<!-- Reject Reason Modal -->
<div class="modal" id="rejectModal">
  <div class="modal-content">
    <h3>❌ Reject Order</h3>
    <p style="margin-bottom:10px; font-size:14px;">Message to customer - ito mababasa niya:</p>
    <textarea id="rejectReason" rows="3" placeholder="e.g. Invalid GCash proof of payment"></textarea>
    <div class="modal-actions">
      <button class="btn-cancel-modal" id="btnCancelModal">Cancel</button>
      <button class="btn-confirm-reject" id="btnConfirmReject">Confirm Reject</button>
    </div>
  </div>
</div>

<script type="module">
import { db } from './firebase-config.js';
import { collection, doc, updateDoc, onSnapshot, orderBy, query, increment, writeBatch } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

let allOrders = [];
let currentFilter = 'all';
let selectedRejectId = '';

// Load orders live
const q = query(collection(db, "dhan-sales"), orderBy("timestamp", "desc"));
onSnapshot(q, (snapshot) => {
  allOrders = [];
  snapshot.forEach(docSnap => {
    let order = docSnap.data();
    order.id = docSnap.id;
    allOrders.push(order);
  });
  renderOrders();
});

// Render orders
function renderOrders() {
  const container = document.getElementById('ordersList');
  let filtered = allOrders;
  if(currentFilter !== 'all') {
    filtered = allOrders.filter(o => o.status === currentFilter);
  }
  
  if(filtered.length === 0) {
    container.innerHTML = '<div class="loading">No orders found</div>';
    return;
  }
  
  container.innerHTML = '';
  filtered.forEach(order => {
    const statusClass = order.status || 'pending';
    const statusText = statusClass === 'completed' ? 'Approved' : statusClass.charAt(0).toUpperCase() + statusClass.slice(1);
    
    let itemsHtml = '';
    order.items.forEach(item => {
      itemsHtml += `
        <div class="item-row">
          <span>${item.name} x${item.qty}</span>
          <span>₱${item.price * item.qty}</span>
        </div>
      `;
    });
    
    container.innerHTML += `
      <div class="order-card ${statusClass}">
        <div class="order-header">
          <span class="order-id">Order ID: ${order.id.substring(0,8)}...</span>
          <span class="status-badge status-${statusClass}">${statusText}</span>
        </div>
        <div class="order-info">
          <p><strong>Customer:</strong> ${order.customer.name}</p>
          <p><strong>Phone:</strong> ${order.customer.phone}</p>
          <p><strong>Address:</strong> ${order.customer.address}</p>
          <p><strong>Date:</strong> ${order.date}</p>
          <p><strong>Total:</strong> ₱${order.total.toLocaleString()}</p>
          <p><strong>Delivery:</strong> ${order.delivery}</p>
        </div>
        <div class="items-list">
          <h4>Items:</h4>
          ${itemsHtml}
        </div>
        ${order.proofOfPayment ? `
          <div>
            <strong style="font-size:14px;">Proof of Payment:</strong>
            <img src="${order.proofOfPayment}" class="proof-img" onclick="window.open('${order.proofOfPayment}')">
          </div>
        ` : ''}
        ${order.status === 'rejected' && order.rejectReason ? `
          <div style="margin-top:10px; padding:10px; background:#F8D7DA; border-radius:8px; font-size:14px;">
            <strong>Reason:</strong> ${order.rejectReason}
          </div>
        ` : ''}
        ${order.status === 'pending' ? `
          <div class="action-buttons">
            <button class="btn-approve" data-id="${order.id}">✅ Approve</button>
            <button class="btn-reject" data-id="${order.id}">❌ Reject</button>
          </div>
        ` : ''}
      </div>
    `;
  });
  
  // Add event listeners after rendering
  addEventListeners();
}

// Add event listeners - eto fix sa "not defined" error
function addEventListeners() {
  // Filter buttons
  document.getElementById('filterBar').addEventListener('click', (e) => {
    if(e.target.classList.contains('filter-btn')) {
      const status = e.target.dataset.status;
      currentFilter = status;
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      e.target.classList.add('active');
      renderOrders();
    }
  });
  
  // Approve buttons
  document.querySelectorAll('.btn-approve').forEach(btn => {
    btn.addEventListener('click', () => approveOrder(btn.dataset.id));
  });
  
  // Reject buttons
  document.querySelectorAll('.btn-reject').forEach(btn => {
    btn.addEventListener('click', () => openRejectModal(btn.dataset.id));
  });
  
  // Modal buttons
  document.getElementById('btnCancelModal').addEventListener('click', closeRejectModal);
  document.getElementById('btnConfirmReject').addEventListener('click', confirmReject);
}

// Approve order
async function approveOrder(orderId) {
  if(!confirm('Approve this order?\n\nCustomer will see "Order Approved!"')) return;
  
  try {
    await updateDoc(doc(db, "dhan-sales", orderId), {
      status: 'completed',
      approvedAt: new Date()
    });
    alert('✅ Order Approved!\nCustomer will see "Order Approved!"');
  } catch(e) {
    alert('❌ Error: ' + e.message);
  }
}

// Open reject modal
function openRejectModal(orderId) {
  selectedRejectId = orderId;
  document.getElementById('rejectModal').classList.add('active');
  document.getElementById('rejectReason').value = '';
  document.getElementById('rejectReason').focus();
}

// Close reject modal
function closeRejectModal() {
  document.getElementById('rejectModal').classList.remove('active');
}

// Confirm reject - may stock return + message kay customer
async function confirmReject() {
  const reason = document.getElementById('rejectReason').value.trim();
  if(!reason) {
    alert('❌ Please enter a reason for rejection');
    return;
  }
  
  let order = allOrders.find(o => o.id === selectedRejectId);
  
  // Instant remove sa screen
  allOrders = allOrders.filter(o => o.id !== selectedRejectId);
  renderOrders();
  closeRejectModal();
  
  try {
    const batch = writeBatch(db);
    
    // 1. Ibalik stock
    order.items.forEach(item => {
      batch.update(doc(db, "products", item.id), {
        stock: increment(item.qty)
      });
    });
    
    // 2. Update order - eto mababasa ni customer
    batch.update(doc(db, "dhan-sales", selectedRejectId), {
      status: 'rejected',
      rejectReason: reason,
      rejectedAt: new Date()
    });
    
    await batch.commit();
    alert('❌ Order Rejected!\nStock returned.\nCustomer will see: "' + reason + '"');
    
  } catch(error) {
    alert('Error: ' + error.message);
    location.reload();
  }
}
</script>
</body>
</html>
