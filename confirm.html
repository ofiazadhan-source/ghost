<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirm Order - One Siomai Factory</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,sans-serif}
body{background:#FFF8E1;padding:15px;min-height:100vh}
.container{max-width:500px;margin:auto;background:white;border-radius:20px;padding:20px;box-shadow:0 6px 20px rgba(0,0,0,0.12);border-top:8px solid #D32F2F}
h2{color:#D32F2F;text-align:center;margin-bottom:20px;font-size:20px;font-weight:900}
.info-box{background:#FFFDF7;border:2px solid #FFCC80;border-radius:12px;padding:15px;margin-bottom:15px;font-size:13px}
.info-row{display:flex;justify-content:space-between;margin-bottom:8px}
.label{font-weight:700;color:#666}
.value{font-weight:800;color:#D32F2F;text-align:right}
.proof-img{width:100%;border-radius:10px;border:2px solid #ddd;margin-top:10px}
.items{margin:15px 0}
.item-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px dashed #ddd;font-size:12px}
.total-row{display:flex;justify-content:space-between;font-weight:900;font-size:16px;color:#D32F2F;margin-top:10px;padding-top:10px;border-top:2px solid #D32F2F}
.btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:20px}
.btn{padding:14px;border:none;border-radius:10px;font-weight:800;font-size:14px;cursor:pointer;color:white}
.btn-approve{background:#2E7D32}
.btn-cancel{background:#C62828}
.btn:active{transform:scale(0.95)}
.loading{text-align:center;padding:40px;color:#D32F2F;font-weight:700}
</style>
</head>
<body>
<div class="container">
  <h2>Review Order</h2>
  <div id="loading" class="loading">Loading order details...</div>
  <div id="orderDetails" style="display:none">
    <div class="info-box">
      <div class="info-row"><span class="label">Receipt No:</span><span class="value" id="receiptNo"></span></div>
      <div class="info-row"><span class="label">Date:</span><span class="value" id="orderDate"></span></div>
      <div class="info-row"><span class="label">Customer:</span><span class="value" id="custName"></span></div>
      <div class="info-row"><span class="label">Contact:</span><span class="value" id="custContact"></span></div>
      <div class="info-row"><span class="label">Address:</span><span class="value" id="custAddress"></span></div>
      <div class="info-row"><span class="label">Payment:</span><span class="value" id="payMethod"></span></div>
    </div>
    
    <div id="proofBox" class="info-box" style="display:none">
      <div style="font-weight:800;margin-bottom:8px">Proof of Payment:</div>
      <img id="proofImg" class="proof-img" src="">
    </div>
    
    <div class="info-box">
      <div style="font-weight:800;margin-bottom:8px">Items Ordered:</div>
      <div id="itemsList" class="items"></div>
      <div class="total-row">
        <span>TOTAL:</span>
        <span id="totalAmount"></span>
      </div>
    </div>
    
    <div class="btn-grid">
      <button class="btn btn-approve" onclick="approveOrder()">Confirm Order</button>
      <button class="btn btn-cancel" onclick="cancelOrder()">Cancel</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDk3Zb0Xuw3PEfJzdt8AI2ueJq5yksfekE",
  authDomain: "dhan-siomai-pos-fe1e5.firebaseapp.com",
  projectId: "dhan-siomai-pos-fe1e5",
  storageBucket: "dhan-siomai-pos-fe1e5.firebasestorage.app",
  messagingSenderId: "282406768467",
  appId: "1:282406768467:web:a749cfa596c2763e50d9be",
  measurementId: "G-31QJEN2MWT"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const urlParams = new URLSearchParams(window.location.search);
const orderId = urlParams.get('id');
let orderData = null;

async function loadOrder(){
  if(!orderId){
    alert('No order ID found!');
    window.close();
    return;
  }
  
  let snap = await getDoc(doc(db, "dhan-sales", orderId));
  if(!snap.exists()){
    alert('Order not found!');
    window.close();
    return;
  }
  
  orderData = snap.data();
  document.getElementById('loading').style.display = 'none';
  document.getElementById('orderDetails').style.display = 'block';
  
  document.getElementById('receiptNo').innerText = orderData.receiptNo;
  document.getElementById('orderDate').innerText = new Date(orderData.timestamp.seconds*1000).toLocaleString('en-PH');
  document.getElementById('custName').innerText = orderData.customerName;
  document.getElementById('custContact').innerText = orderData.customerContact;
  document.getElementById('custAddress').innerText = orderData.customerAddress;
  document.getElementById('payMethod').innerText = orderData.paymentMethod.toUpperCase();
  document.getElementById('totalAmount').innerText = '₱'+orderData.total.toFixed(2);
  
  if(orderData.proofImage){
    document.getElementById('proofBox').style.display = 'block';
    document.getElementById('proofImg').src = orderData.proofImage;
  }
  
  let itemsHtml = '';
  orderData.items.forEach(item=>{
    itemsHtml += `<div class="item-row">
      <span>${item.name} x${item.qty}</span>
      <span>₱${(item.price*item.qty).toFixed(2)}</span>
    </div>`;
  });
  document.getElementById('itemsList').innerHTML = itemsHtml;
}

window.approveOrder = async ()=>{
  if(confirm('Approve this order?')){
    await updateDoc(doc(db, "dhan-sales", orderId), {status: 'Approved'});
    alert('Order Approved! ✅');
    window.close();
  }
}

window.cancelOrder = async ()=>{
  let reason = prompt('Reason for cancellation:');
  if(reason){
    // Balik stock
    let promises = [];
    orderData.items.forEach(item=>{
      promises.push(updateDoc(doc(db, "products", item.id), {stock: increment(item.qty)}));
    });
    await Promise.all(promises);
    
    await updateDoc(doc(db, "dhan-sales", orderId), {
      status: 'Cancelled',
      cancelReason: reason
    });
    alert('Order Cancelled! Stock returned.');
    window.close();
  }
}

loadOrder();
</script>
</body>
        </html>
