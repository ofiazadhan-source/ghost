<!DOCTYPE html>
<htm lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One Siomai Factory - Online Store</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,sans-serif}
body{background:#FFF8E1;padding:15px;min-height:100vh;padding-right:280px}
.container{max-width:2000px;margin:auto;background:white;border-radius:20px;padding:20px;box-shadow:0 6px 20px rgba(0,0,0,0.12);border-top:6px solid #D32F2F}
h2{color:#D32F2F;text-align:center;margin-bottom:8px;font-size:24px}
.subtitle{text-align:center;color:#666;font-size:13px;margin-bottom:20px}
.back-btn{background:#757575;color:white;border:none;padding:10px 18px;border-radius:8px;cursor:pointer;margin-bottom:15px;font-size:13px;font-weight:600}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:15px}
.cat-btn{padding:12px 5px;border:none;border-radius:12px;background:linear-gradient(135deg,#FFCC80,#FFB74D);color:#B71C1C;font-weight:800;font-size:12px;cursor:pointer;text-align:center}
.cat-btn:active{transform:scale(0.95)}
.cat-btn.active{background:#D32F2F;color:white}
.prod-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.prod-card{background:#FFFDF7;border:2px solid #FFCC80;border-radius:12px;padding:10px;text-align:center;cursor:pointer;transition:0.2s}
.prod-card:active{transform:scale(0.95);background:#FFE0B2}
.prod-img{width:100%;height:120px;object-fit:cover;border-radius:8px;margin-bottom:6px;background:#f0f0f0}
.prod-name{font-weight:800;font-size:12px;color:#D32F2F;margin-bottom:4px;height:28px;overflow:hidden}
.prod-price{font-size:14px;font-weight:900;color:#2E7D32;margin-bottom:2px}
.prod-stock{font-size:9px;color:#666}
.prod-stock.low{color:#C62828;font-weight:800}
.cart-bar { position: fixed; bottom: 120px; right: 15px; width: 260px; max-height: 50vh; background: white; border: 3px solid #D32F2F; border-radius: 15px; padding: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 999; display: flex; flex-direction: column; overflow-y: auto; }
body { padding-bottom: 220px; }
.cart-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.cart-title{font-weight:800;color:#D32F2F;font-size:13px}
.cart-badge{background:#D32F2F;color:white;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800}
.cart-list{max-height:300px;overflow-y:auto;margin-bottom:8px;flex:1}
.cart-row{display:grid;grid-template-columns:18px 1fr 70px 55px;gap:4px;align-items:center;font-size:10px;padding:4px 0;border-bottom:1px dashed #eee}
.del-btn{background:#C62828;color:white;border:none;border-radius:50%;width:18px;height:18px;font-size:14px;line-height:1;cursor:pointer;font-weight:800}
.qty-box{display:flex;gap:3px;align-items:center}
.qty-btn{width:22px;height:22px;border:none;background:#D32F2F;color:white;border-radius:4px;font-weight:800;cursor:pointer;font-size:12px}
.qty-input{width:36px;height:22px;text-align:center;border:1px solid #ddd;border-radius:4px;font-size:10px}
.item-name{font-size:9px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.item-total{text-align:right;font-weight:700;color:#2E7D32;font-size:10px}
.cart-sum{font-size:18px;font-weight:900;color:#D32F2F;text-align:right;margin:8px 0}
.checkout-btn{width:100%;padding:10px;background:#2E7D32;color:white;border:none;border-radius:8px;font-weight:800;font-size:13px;cursor:pointer}
.checkout-btn:disabled{background:#ccc;cursor:not-allowed}
.loading{text-align:center;padding:40px;color:#D32F2F;font-weight:700}
#receipt{display:none;font-family:monospace;font-size:11px;color:black;background:white;padding:10px;width:100%;max-width:80mm;margin:20px auto 80px auto;line-height:1.4;text-align:left;border:2px dashed #D32F2F;border-radius:0;box-shadow:none}
@media print{.no-print{display:none!important}body *{visibility:hidden}#receipt,#receipt *{visibility:visible}#receipt{position:absolute;left:0;top:0;width:80mm;display:block!important;font-size:11px;margin:0!important;border:none!important;box-shadow:none!important;padding:3mm!important;line-height:1.4}@page{size:80mm auto;margin:0}}
@media (max-width:768px){ body{padding-right:15px}.cart-bar{top:auto;bottom:0;right:0;left:0;width:100%;border-radius:20px 20px 0 0;max-height:60vh}.prod-grid{grid-template-columns:repeat(2,1fr)} }
</style>

    <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, query, where, addDoc, doc, updateDoc, increment, getDoc, onSnapshot, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
const firebaseConfig = {
apiKey: "AIzaSyDk3ZbOXuw3PEfJzdt8AI2ueJq5yksfekE",
authDomain: "dhan-siomai-pos-fe1e5.firebaseapp.com",
projectId: "dhan-siomai-pos-fe1e5",
storageBucket: "dhan-siomai-pos-fe1e5.firebasestorage.app",
messagingSenderId: "305932123173",
appId: "1:305932123173:web:f27894a2d5e6e6ab8253cc"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
let products = [];
let cart = [];
let curCat = 'all';
let currentTotal = 0;
let proofImage = '';
let proofType = '';
let unsubscribeOrders = null;

// BULK PRICING FUNCTION - Parehas sa POS
function getPrice(p, qtyPacks) {
  if(!p) return 0;
  let cat = p.category || '';
  if(cat === '65s') return qtyPacks >= 50? 140 : 150;
  if(cat === '30s') return qtyPacks >= 100? 75 : 80;
  if(cat === '20s') return qtyPacks >= 100? 110 : 120;
  if(cat === 'big') return qtyPacks >= 110? 500 : 600;
  if(cat === 'dumplings') return qtyPacks >= 50? 170 : 180;
  return p.price || 0;
}

async function loadProducts() {
const grid = document.getElementById('prodGrid');
grid.innerHTML = '<div class="loading">Loading products...</div>';
try {
let q = collection(db,"products");
if(curCat!='all'){q = query(collection(db,"products"),where("category","==",curCat))}
const snap = await getDocs(q);
products = [];
snap.forEach(d=>products.push({id:d.id,...d.data()}));
renderProducts(products);
}catch(error){
console.error('Load Error:',error);
grid.innerHTML = '<p style="grid-column:span 2;text-align:center;color:#C62828;padding:40px">Error: '+error.message+'</p>';
}
}

function renderProducts(list){
const grid = document.getElementById('prodGrid');
if(list.length===0){
grid.innerHTML = '<p style="grid-column:span 2;text-align:center;color:#999;padding:40px">No products yet. Add muna sa Products page boss!</p>';
return;
}
let html = '';
list.forEach(prod=>{
let stockClass = prod.stock <= 10? 'low' : '';
let price = getPrice(prod, prod.stock || 1); // Default display price
let bulkText = '';
if(prod.category=='65s') bulkText = prod.stock>=50?'<span style="font-size:10px;color:#2E7D32;display:block">⚡BULK ₱140</span>':'<span style="font-size:10px;color:#FF6F00;display:block">Bulk ₱140@50</span>';
if(prod.category=='30s') bulkText = prod.stock>=100?'<span style="font-size:10px;color:#2E7D32;display:block">⚡BULK ₱75</span>':'<span style="font-size:10px;color:#FF6F00;display:block">Bulk ₱75@100</span>';
if(prod.category=='20s') bulkText = prod.stock>=100?'<span style="font-size:10px;color:#2E7D32;display:block">⚡BULK ₱110</span>':'<span style="font-size:10px;color:#FF6F00;display:block">Bulk ₱110@100</span>';
if(prod.category=='big') bulkText = prod.stock>=110?'<span style="font-size:10px;color:#2E7D32;display:block">⚡BULK ₱500</span>':'<span style="font-size:10px;color:#FF6F00;display:block">Bulk ₱500@110</span>';
if(prod.category=='dumplings') bulkText = prod.stock>=50?'<span style="font-size:10px;color:#2E7D32;display:block">⚡BULK ₱170</span>':'<span style="font-size:10px;color:#FF6F00;display:block">Bulk ₱170@50</span>';

html += `<div class="prod-card" onclick="addToCart('${prod.id}')">
${prod.image?`<img src="${prod.image}" class="prod-img">`:'<div class="prod-img" style="display:flex;align-items:center;justify-content:center;color:#ccc;font-size:11px">No Image</div>'}
<div class="prod-name">${prod.name}</div>
<div class="prod-price">₱${price} ${bulkText}</div>
<div class="prod-stock ${stockClass}">Stock: ${prod.stock}</div>
</div>`;
});
grid.innerHTML = html;
}

window.filterCat = function(cat, btn){
curCat = cat;
document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
loadProducts();
}

window.addToCart = (prodId)=>{
const prod = products.find(p=>p.id===prodId);
if(!prod||prod.stock<=0){alert('Out of stock boss!');return}
const existing = cart.find(item=>item.id===prodId);
if(existing){
if(existing.qty>=prod.stock){alert('Max stock reached boss!');return}
existing.qty++;
}else{
cart.push({id:prodId,name:prod.name,price:prod.price,category:prod.category,qty:1});
}
renderCart();
}

function renderCart(){
const cartList = document.getElementById('cartList');
const cartBadge = document.getElementById('cartBadge');
const cartSum = document.getElementById('cartSum');
const checkoutBtn = document.getElementById('checkoutBtn');
let total = 0;
let count = 0;
if(cart.length===0){
cartList.innerHTML = '<p style="text-align:center;color:#999;font-size:12px;padding:20px 0">No items yet</p>';
checkoutBtn.disabled = true;
}else{
let html = '';
cart.forEach((item,i)=>{
let price = getPrice(item, item.qty); // AUTO-BULK PRICE DITO
const subtotal = price*item.qty;
total += subtotal;
count += item.qty;
html += `<div class="cart-row">
<button class="del-btn" onclick="removeItem(${i})">×</button>
<span class="item-name">${item.name}</span>
<div class="qty-box">
<button class="qty-btn" onclick="changeQty(${i},-1)">-</button>
<input type="number" class="qty-input" value="${item.qty}" min="1" onchange="setQty(${i},this.value)">
<button class="qty-btn" onclick="changeQty(${i},1)">+</button>
</div>
<span class="item-total">₱${subtotal.toFixed(2)}<br><span style="font-size:8px;color:#666">₱${price}/pc</span></span>
</div>`;
});
cartList.innerHTML = html;
checkoutBtn.disabled = false;
}
cartBadge.innerText = count;
cartSum.innerText = 'Total: ₱'+total.toFixed(2);
updateBadge();
}
   window.removeItem = (index)=>{cart.splice(index,1);renderCart()}
window.changeQty = (index,delta)=>{
cart[index].qty += delta;
const prod = products.find(p=>p.id===cart[index].id);
if(cart[index].qty<1)cart[index].qty=1;
if(prod&&cart[index].qty>prod.stock)cart[index].qty=prod.stock;
renderCart();
}
window.setQty = (index,value)=>{
let qty = parseInt(value)||1;
const prod = products.find(p=>p.id===cart[index].id);
if(qty<1)qty=1;
if(prod&&qty>prod.stock){qty=prod.stock;alert('Max stock: '+prod.stock+' only boss!')}
cart[index].qty = qty;
renderCart();
}
window.openPayModal = ()=>{
if(cart.length===0){alert('Walang items sa cart boss!');return}
currentTotal = cart.reduce((sum,item)=>sum+(getPrice(item,item.qty)*item.qty),0); // BULK TOTAL DITO
document.getElementById('reviewTotal').innerHTML = 'Total: ₱'+currentTotal.toFixed(2);
document.getElementById('custName').value = '';
document.getElementById('custContact').value = '';
document.getElementById('custAddress').value = '';
document.getElementById('cashIn').value = '';
document.getElementById('change').innerText = 'Change: ₱0.00';
document.getElementById('change').style.color = '#2E7D32';
document.getElementById('gcashProof').value = '';
proofImage = '';
proofType = '';
document.getElementById('payModal').style.display = 'flex';
togglePay();
}
window.closePayModal = ()=>{
document.getElementById('payModal').style.display='none';
document.body.style.overflow = '';
}
window.togglePay = ()=>{
let method = document.getElementById('payMethod').value;
document.getElementById('cashSection').style.display = method==='Cash'?'block':'none';
document.getElementById('gcashBox').style.display = method==='Gcash'?'block':'none';
}
window.computeChange = ()=>{
let cash = parseFloat(document.getElementById('cashIn').value)||0;
let change = cash-currentTotal;
if(change<0){
document.getElementById('change').innerText = 'Kulang: ₱'+Math.abs(change).toFixed(2);
document.getElementById('change').style.color = '#C62828';
}else{
document.getElementById('change').innerText = 'Change: ₱'+change.toFixed(2);
document.getElementById('change').style.color = '#2E7D32';
}
}  
window.previewProof = (event, type)=>{
const file = event.target.files[0];
if(file){
const reader = new FileReader();
reader.onload = function(e){
proofImage = e.target.result;
proofType = type;
document.getElementById('proofPreview').src = proofImage;
document.getElementById('proofPreview').style.display = 'block';
};
reader.readAsDataURL(file);
}
}

window.confirmPay = async ()=>{
let name = document.getElementById('custName').value.trim();
let contact = document.getElementById('custContact').value.trim();
let address = document.getElementById('custAddress').value.trim();
let method = document.getElementById('payMethod').value;

if(!name||!contact||!address){
alert('Complete mo muna details boss!');
return;
}
if(method==='Gcash'&&!proofImage){
alert('Upload mo muna proof of payment boss!');
return;
}

// COMPUTE FINAL TOTAL WITH BULK PRICE
let finalItems = cart.map(item=>{
let price = getPrice(item, item.qty);
return {...item, price: price, subtotal: price*item.qty};
});
let finalTotal = finalItems.reduce((sum,i)=>sum+i.subtotal,0);

try{
await addDoc(collection(db,"orders"),{
customer: name,
contact: contact,
address: address,
items: finalItems, // MAY BULK PRICE NA DITO
total: finalTotal,
payment: method,
proof: proofImage,
status: 'pending',
timestamp: new Date(),
code: Math.floor(Math.random()*9000+1000)
});
localStorage.setItem('custName', name); // <-- LINE NA TO
// DEDUCT STOCK
for(let item of cart){
let prodRef = doc(db,"products",item.id);
await updateDoc(prodRef, {stock: increment(-item.qty)});
}

alert('Order confirmed boss! Wait mo lang call namin.');
cart = [];
renderCart();
closePayModal();
loadProducts();

}catch(e){
alert('Error: '+e.message);
}
}

function updateBadge(){
let pendingCount = cart.length;
let badge = document.getElementById('pendingBadge');
if(badge){
badge.style.display = pendingCount>0?'flex':'none';
badge.innerText = pendingCount;
}
}

// LISTEN TO ORDERS FOR NOTIFICATIONS
function listenOrders(){
let userName = localStorage.getItem('custName') || '';
if(!userName) return;
const q = query(collection(db,"orders"), where("customer","==",userName), orderBy("timestamp","desc"));
unsubscribeOrders = onSnapshot(q, (snap)=>{
let html = '';
let pendingCount = 0;
snap.forEach(d=>{
let o = d.data();
if(o.status=='pending') pendingCount++;
let statusColor = o.status=='approved'?'#2E7D32':o.status=='cancelled'?'#C62828':'#FF6F00';
html += `<div style="border:2px solid ${statusColor};border-radius:10px;padding:12px;margin-bottom:10px">
<div style="font-weight:800;color:${statusColor}">Status: ${o.status.toUpperCase()}</div>
<div style="font-size:12px;margin:5px 0">Code: #${o.code}</div>
<div style="font-size:12px">Total: ₱${o.total.toFixed(2)}</div>
<div style="font-size:11px;color:#666">${new Date(o.timestamp.toDate()).toLocaleString()}</div>
${o.adminNote?`<div style="margin-top:8px;padding:8px;background:#FFF3E0;border-radius:5px;font-size:12px"><b>Message ni Admin:</b><br>${o.adminNote}</div>`:''}
</div>`;
});
document.getElementById('pendingList').innerHTML = html || '<p style="text-align:center;color:#999">No orders yet</p>';
let badge = document.getElementById('pendingBadge');
if(badge){
badge.style.display = pendingCount>0?'flex':'none';
badge.innerText = pendingCount;
}
});
}

window.openPending = ()=>{document.getElementById('pendingModal').style.display='flex'}
window.closePending = ()=>{document.getElementById('pendingModal').style.display='none'}

// SAVE CUSTOMER NAME SA CONFIRMPAY MO
// Dagdag mo lang to sa confirmPay after ng addDoc:
// localStorage.setItem('custName', name);

listenOrders();
loadProducts();
    </script>      
<!-- MAIL ICON DITO ILAGAY BOSS -->
