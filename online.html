

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Order - DHAN SIOMAI</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#FFF8E1;padding:15px;}
.header{background:linear-gradient(135deg, #D32F2F, #B71C1C);color:white;padding:18px;border-radius:12px;margin-bottom:15px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 4px 10px rgba(211,47,47,0.3);}
.header a{color:white;text-decoration:none;font-weight:600;font-size:16px;}
.card{background:white;padding:15px;border-radius:12px;box-shadow:0 3px 8px rgba(0,0,0,0.1);margin-bottom:15px;}
.search-box{width:100%;padding:12px;margin-bottom:15px;border:2px solid #D32F2F;border-radius:10px;font-size:16px;}
.search-box:focus{outline:none;border-color:#FFC107;box-shadow:0 0 0 3px rgba(255,193,7,0.2);}
.section-header{background:linear-gradient(135deg, #FFC107, #FFA000);color:#333;padding:14px 15px;margin:15px 0 10px 0;border-radius:10px;font-weight:700;font-size:18px;text-align:center;}
.product{padding:15px;border:2px solid #FFE0B2;border-radius:12px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;gap:12px;background:#FFFDF9;}
.product strong{font-size:17px;color:#333;}
.product span{font-size:15px;color:#666;}
.product input{width:70px;padding:10px;border:2px solid #FFE0B2;border-radius:8px;text-align:center;font-size:16px;}
.product button{background:linear-gradient(135deg, #D32F2F, #B71C1C);color:white;padding:12px 25px;font-size:17px;border-radius:10px;border:none;font-weight:600;cursor:pointer;}
.cart-item{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #FFE0B2;font-size:16px;}
input,textarea{width:100%;padding:12px;margin:8px 0;border:2px solid #FFE0B2;border-radius:10px;font-size:16px;}
input:focus,textarea:focus{outline:none;border-color:#FFC107;}
.checkout-btn{background:linear-gradient(135deg, #D32F2F, #B71C1C);color:white;border:none;padding:14px;border-radius:10px;font-weight:600;font-size:17px;cursor:pointer;width:100%;margin-top:10px;}
.payment-label{background:#E8F5E9;color:#2E7D32;padding:12px;border-radius:10px;font-weight:600;text-align:center;margin:8px 0;}
.label{font-weight:600;color:#D32F2F;margin-top:10px;font-size:15px;}
#receiptModal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:none;justify-content:center;align-items:center;z-index:999;padding:15px;}
.receipt{background:white;padding:20px;width:100%;max-width:320px;font-size:13px;border-radius:12px;}
.receipt h3{text-align:center;margin-bottom:5px;color:#D32F2F;}
.receipt.line{border-top:1px dashed #000;margin:8px 0;}
.receipt-row{display:flex;justify-content:space-between;margin:3px 0;}
.btn-row{display:flex;gap:10px;margin-top:15px;}
.btn-row button{flex:1;padding:10px;border:none;border-radius:8px;font-weight:600;cursor:pointer;}
@media print{
body *{visibility:hidden;}
#printArea,#printArea *{visibility:visible;}
#printArea{position:absolute;left:0;top:0;width:58mm;}
}
</style>
</head>
<body>
<div class="header">
<h3>🛒 Online Order</h3>
<a href="index.html">← Back</a>
</div>

<div class="card">
<h4 style="margin-bottom:10px;font-size:18px;color:#D32F2F;">Products</h4>
<input type="text" id="searchBox" class="search-box" placeholder="🔍 Search product..." oninput="renderProducts()">
<div id="productList">Loading...</div>
</div>

<div class="card">
<h4 style="margin-bottom:10px;font-size:18px;color:#D32F2F;">Cart</h4>
<div id="cartList">Empty</div>
<h3 id="total" style="margin:10px 0;font-size:20px;color:#D32F2F;">Total: ₱0</h3>

<div class="label">📦 Delivery Details</div>
<input type="text" id="customerName" placeholder="Recipient Name" required>
<input type="tel" id="customerPhone" placeholder="Contact Number" required>
<textarea id="customerAddress" placeholder="Full Delivery Address" rows="3" required></textarea>

<div class="label">💳 Payment Method</div>
<div class="payment-label">GCash Only</div>

<div style="background:#FFF3E0;border:2px solid #FFC107;border-radius:10px;padding:12px;margin:10px 0;text-align:center;">
  <p style="font-size:14px;color:#666;margin-bottom:5px;">Send payment to:</p>
  <p style="font-size:18px;font-weight:700;color:#D32F2F;">DHAN STORE</p>
  <p style="font-size:20px;font-weight:700;color:#000;margin:5px 0;">09052733253</p>
  <p style="font-size:13px;color:#666;">GCash Name: DANTE [V.]</p>
</div>

<p style="font-size:13px;color:#D32F2F;margin:8px 0;">
 1. Send exact amount to the GCash number above<br>
 2. Copy the Reference No. from your GCash receipt<br>
 3. Paste it below
</p>

<input type="text" id="gcashRef" placeholder="Enter GCash Reference No." required>

<button class="checkout-btn" onclick="checkout()">Place Order</button>
</div>

<div id="receiptModal">
<div id="printArea" class="receipt"></div>
</div>

<script>
const firebaseConfig = {
apiKey: "AIzaSyDk3ZbOXuw3PEfJzdt8AI2ueJq5yksfekE",
authDomain: "dhan-siomai-pos-fe1e5.firebaseapp.com",
projectId: "dhan-siomai-pos-fe1e5",
storageBucket: "dhan-siomai-pos-fe1e5.firebasestorage.app",
messagingSenderId: "305932123173",
appId: "1:305932123173:web:f27894a2d5e6e6ab8253cc"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let cart = [];
let lastSale = null;
let allProducts = [];

window.onload = loadProducts;

async function loadProducts(){
const snap = await db.collection('dhan-pos-web').where('stock','>',0).get();
allProducts = [];
snap.forEach(doc=>{
let p = doc.data();
if(p.name && p.name.trim()!== '') {
allProducts.push({id: doc.id,...p});
}
});
renderProducts();
}

function renderProducts(){
let search = document.getElementById('searchBox').value.toLowerCase();
let filtered = allProducts.filter(p => p.name.toLowerCase().includes(search));

let grouped = {
"65's": [], "30's": [], "Big SIOMAI": [], "Dumplings": [], "Siopao": [], "Sauce": [], "Others": []
};

filtered.forEach(p=>{
let name = p.name.toLowerCase();
let cat = p.category? p.category.toLowerCase() : '';

if(cat === "65's" || cat === "65") {
grouped["65's"].push(p);
} else if(cat === "30's" || cat === "30") {
grouped["30's"].push(p);
} else if(cat === "siopao") {
grouped["Siopao"].push(p);
} else if(cat === "sauce") {
grouped["Sauce"].push(p);
} else if(name.includes("20's") || name.includes('20s')) {
grouped["Big SIOMAI"].push(p);
} else if(name.includes('dumpling') || name.includes('dumlings')) {
grouped["Dumplings"].push(p);
} else {
grouped["Others"].push(p);
}
});

let html = '';
let order = ["65's", "30's", "Big SIOMAI", "Dumplings", "Siopao", "Sauce", "Others"];
order.forEach(groupName=>{
if(grouped[groupName].length === 0) return;
html += `<div class="section-header">${groupName}</div>`;
grouped[groupName].forEach(p=>{
html += `<div class="product">
<div style="flex:1">
<strong>${p.name}</strong><br>
<span>₱${p.price} | Stock: ${p.stock}</span>
</div>
<div style="display:flex;gap:8px;align-items:center;">
<input type="number" id="qty-${p.id}" value="1" min="1" max="${p.stock}">
<button onclick="addToCart('${p.id}')">Add</button>
</div>
</div>`;
});
});
document.getElementById('productList').innerHTML = html || '<p style="text-align:center;padding:30px;font-size:16px;color:#666;">No products found</p>';
}

function addToCart(id){
let qtyInput = document.getElementById(`qty-${id}`);
let qty = parseInt(qtyInput.value) || 1;

db.collection('dhan-pos-web').doc(id).get().then(doc => {
if(!doc.exists) return;
let p = doc.data();
if(qty <= 0){alert('Quantity must be at least 1');return;}
if(qty > p.stock){alert('Not enough stock');return;}

let item = cart.find(i=>i.id===id);
if(item){
if(item.qty + qty > p.stock){alert('Not enough stock');return;}
item.qty += qty;
} else{
cart.push({id:id, name:p.name, price:p.price, qty:qty});
}
qtyInput.value = 1;
updateCart();
});
}

function updateCart(){
let html = '';
let total = 0;
cart.forEach(i=>{
html += `<div class="cart-item"><span>${i.name} x${i.qty}</span><span>₱${i.price*i.qty}</span></div>`;
total += i.price*i.qty;
});
document.getElementById('cartList').innerHTML = html || 'Empty';
document.getElementById('total').innerText = `Total: ₱${total}`;
}

async function checkout(){
if(cart.length===0){alert('Cart empty');return;}

let customerName = document.getElementById('customerName').value.trim();
let customerPhone = document.getElementById('customerPhone').value.trim();
let customerAddress = document.getElementById('customerAddress').value.trim();
let gcashRef = document.getElementById('gcashRef').value.trim();

if(!customerName ||!customerPhone ||!customerAddress){
alert('Please fill in all delivery details');
return;
}
if(!gcashRef){
alert('Please enter GCash Reference No.');
return;
}

let total = cart.reduce((sum,i)=>sum+i.price*i.qty,0);

let saleData = {
items:cart,
method: 'GCash',
gcashRef,
total,
customerName,
customerPhone,
customerAddress,
timestamp:firebase.firestore.FieldValue.serverTimestamp(),
orderType: 'Online',
status: 'Pending' // <--- Dito nagiging pending
};

await db.collection('dhan-sales').add(saleData);

// DITO TINANGGAL KO YUNG PAGBAWAS NG STOCK
// Stock mababawas lang pag confirmed na ni admin

alert('Order placed! Wait for confirmation. We will check your payment first.');

lastSale = {
items:[...cart],
method:'GCash',
gcashRef,
total,
customerName,
customerPhone,
customerAddress,
date:new Date(),
status: 'Pending'
};
showReceipt();

cart = [];
document.getElementById('gcashRef').value='';
document.getElementById('customerName').value='';
document.getElementById('customerPhone').value='';
document.getElementById('customerAddress').value='';
updateCart();
loadProducts();
}

function showReceipt(){
let html = `<h3>DHAN SIOMAI - ONLINE ORDER</h3>
<p style="text-align:center;">Thank you!</p>
<div class="line"></div>
<p>${lastSale.date.toLocaleString()}</p>
<div class="line"></div>
<p><strong>To:</strong> ${lastSale.customerName}</p>
<p><strong>Phone:</strong> ${lastSale.customerPhone}</p>
<p><strong>Address:</strong> ${lastSale.customerAddress}</p>
<div class="line"></div>`;

lastSale.items.forEach(i=>{
html += `<div class="receipt-row"><span>${i.name} x${i.qty}</span><span>₱${i.price*i.qty}</span></div>`;
});
html += `<div class="receipt-row"><span>Payment</span><span>GCash - PENDING</span></div>
<div class="receipt-row"><span>Ref No.</span><span>${lastSale.gcashRef}</span></div>
<div class="receipt-row" style="color:red;"><span>Status</span><span>WAIT FOR CONFIRMATION</span></div>`;
html += `<div class="line"></div>
<div class="receipt-row"><strong>Total</strong><strong>₱${lastSale.total}</strong></div>

<div class="line"></div>
<div class="btn-row">
<button onclick="window.print()" style="background:#D32F2F;color:white;">Print</button>
<button onclick="document.getElementById('receiptModal').style.display='none'" style="background:#666;color:white;">Close</button>
</div>`;

document.getElementById('printArea').innerHTML = html;
document.getElementById('receiptModal').style.display='flex';
}
</script>
</body>
</html>
