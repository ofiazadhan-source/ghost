<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Net Income Tracker</title>
<style>
body { font-family: Arial; background: #0f172a; color: #e2e8f0; padding: 15px; max-width: 500px; margin: auto; }
h2 { color: #38bdf8; text-align: center; font-size: 24px; margin-bottom: 5px; }
.date { text-align: center; color: #94a3b8; margin-bottom: 20px; font-size: 14px; }
.section { background: #1e293b; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
h3 { margin: 0 0 12px 0; font-size: 18px; }
.row { display: flex; gap: 8px; margin-bottom: 8px; }
input { flex: 1; padding: 12px; border-radius: 8px; border: none; background: #334155; color: white; font-size: 14px; }
input::placeholder { color: #64748b; }
button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #38bdf8; color: #0f172a; font-weight: bold; font-size: 15px; cursor: pointer; }
button:hover { background: #0ea5e9; }
.total { font-size: 16px; font-weight: bold; margin-top: 10px; }
.net { font-size: 20px; color: #4ade80; font-weight: bold; margin-bottom: 10px; }
.reset-btn { background: #ef4444; color: white; }
.reset-btn:hover { background: #dc2626; }
.item { display: flex; justify-content: space-between; background: #334155; padding: 8px 12px; border-radius: 6px; margin: 4px 0; font-size: 14px; }
.del { background: #ef4444; color: white; padding: 2px 8px; border-radius: 4px; cursor: pointer; font-size: 12px; margin-left: 8px; }
</style>
</head>
<body>

<h2>📊 Daily Net Income</h2>
<div class="date" id="dateToday"></div>

<div class="section">
  <h3>💰 Daily Sales</h3>
  <div class="row">
    <input type="text" id="saleName" placeholder="Item/Source">
    <input type="number" id="saleAmount" placeholder="Amount">
  </div>
  <button onclick="addSale()">+ Add Sale</button>
  <div id="salesList"></div>
  <div class="total">Total Sales: ₱<span id="totalSales">0.00</span></div>
</div>

<div class="section">
  <h3>💸 Daily Expenses</h3>
  <div class="row">
    <input type="text" id="expName" placeholder="Expense">
    <input type="number" id="expAmount" placeholder="Amount">
  </div>
  <button onclick="addExpense()">+ Add Expense</button>
  <div id="expensesList"></div>
  <div class="total">Total Expenses: ₱<span id="totalExp">0.00</span></div>
</div>

<div class="section">
  <h3>📈 Net Income</h3>
  <div class="net">Gross Sales - Expenses = ₱<span id="netIncome">0.00</span></div>
  <button class="reset-btn" onclick="resetDay()">Reset Day</button>
</div>

<script>
let sales = JSON.parse(localStorage.getItem('sales')) || [];
let expenses = JSON.parse(localStorage.getItem('expenses')) || [];

document.getElementById('dateToday').innerText = new Date().toLocaleDateString('en-US', {weekday:'long', year:'numeric', month:'long', day:'numeric'});

function addSale(){
  let name = document.getElementById('saleName').value.trim();
  let amount = parseFloat(document.getElementById('saleAmount').value);
  if(name && amount > 0){
    sales.push({name, amount});
    localStorage.setItem('sales', JSON.stringify(sales));
    document.getElementById('saleName').value = '';
    document.getElementById('saleAmount').value = '';
    render();
  }
}

function addExpense(){
  let name = document.getElementById('expName').value.trim();
  let amount = parseFloat(document.getElementById('expAmount').value);
  if(name && amount > 0){
    expenses.push({name, amount});
    localStorage.setItem('expenses', JSON.stringify(expenses));
    document.getElementById('expName').value = '';
    document.getElementById('expAmount').value = '';
    render();
  }
}

function deleteSale(i){
  sales.splice(i,1);
  localStorage.setItem('sales', JSON.stringify(sales));
  render();
}

function deleteExp(i){
  expenses.splice(i,1);
  localStorage.setItem('expenses', JSON.stringify(expenses));
  render();
}

function render(){
  let salesHTML = '';
  let totalSales = 0;
  sales.forEach((s,i)=>{
    salesHTML += `<div class="item">${s.name} <span>₱${s.amount.toFixed(2)}<span class="del" onclick="deleteSale(${i})">x</span></span></div>`;
    totalSales += s.amount;
  });
  document.getElementById('salesList').innerHTML = salesHTML;
  document.getElementById('totalSales').innerText = totalSales.toFixed(2);

  let expHTML = '';
  let totalExp = 0;
  expenses.forEach((e,i)=>{
    expHTML += `<div class="item">${e.name} <span>₱${e.amount.toFixed(2)}<span class="del" onclick="deleteExp(${i})">x</span></span></div>`;
    totalExp += e.amount;
  });
  document.getElementById('expensesList').innerHTML = expHTML;
  document.getElementById('totalExp').innerText = totalExp.toFixed(2);

  let net = totalSales - totalExp;
  document.getElementById('netIncome').innerText = net.toFixed(2);
  document.getElementById('netIncome').style.color = net >= 0 ? '#4ade80' : '#ef4444';
}

function resetDay(){
  if(confirm('Reset all sales & expenses for today?')){
    sales = [];
    expenses = [];
    localStorage.clear();
    render();
  }
}

render();
</script>
</body>
</html>
