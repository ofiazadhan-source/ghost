<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Store POS - Siomai Factory</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,sans-serif}
body{background:#FFF8E1;padding:15px;min-height:100vh;padding-right:280px}
.container{max-width:2000px;margin:auto;background:white;border-radius:20px;padding:20px;box-shadow:0 6px 20px rgba(0,0,0,0.12);border-top:6px solid #D32F2F}
h2{color:#D32F2F;text-align:center;margin-bottom:8px;font-size:24px}
.subtitle{text-align:center;color:#666;font-size:13px;margin-bottom:20px}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:15px}
.cat-btn{padding:12px 5px;border:none;border-radius:12px;background:linear-gradient(135deg,#FFCC80,#FFB74D);color:#B71C1C;font-weight:800;font-size:12px;cursor:pointer;text-align:center}
.cat-btn.active{background:#D32F2F;color:white}
.prod-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px}
.prod-card{background:#FFFDF7;border:2px solid #FFCC80;border-radius:12px;padding:10px;text-align:center;cursor:pointer}
.prod-card:active{transform:scale(0.95);background:#FFE0B2}
.prod-img{width:100%;height:80px;object-fit:cover;border-radius:10px;margin-bottom:8px;background:#f5f5f5}
.prod-name{font-weight:800;font-size:12px;color:#D32F2F;margin-bottom:4px;height:28px;overflow:hidden}
.prod-price{font-size:14px;font-weight:900;color:#2E7D32;margin-bottom:2px}
.prod-stock{font-size:9px;color:#666}
.cart-bar{position:fixed;top:15px;right:0;width:280px;max-height:95vh;background:white;border:3px solid #D32F2F;border-left:0;border-radius:15px 0 0 15px;padding:12px;box-shadow:-4px 4px 15px rgba(0,0,0,0.2);z-index:999;display:flex;flex-direction:column}
.cart-head{display:flex;justify-content:space-between;align-items:center}
.cart-title{font-weight:800;color:#D32F2F;font-size:13px}
.cart-badge{background:#D32F2F;color:white;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800}
.cart-list{max-height:300px;overflow-y:auto;margin-bottom:8px;flex:1}
.cart-row{display:grid;grid-template-columns:18px 1fr 70px 55px;gap:4px;align-items:center;font-size:10px;padding:4px 0;border-bottom:1px dashed #eee}
.del-btn{background:#C62828;color:white;border:none;border-radius:50%;width:18px;height:18px;font-size:14px;cursor:pointer;font-weight:800}
.qty-box{display:flex;gap:3px;align-items:center}
.qty-btn{width:22px;height:22px;border:none;background:#D32F2F;color:white;border-radius:4px;font-weight:800;cursor:pointer;font-size:12px}
.qty-input{width:36px;height:22px;text-align:center;border:1px solid #ddd;border-radius:4px;font-size:10px}
.item-total{text-align:right;font-weight:700;color:#2E7D32;font-size:10px}
.cart-sum{font-size:18px;font-weight:900;color:#D32F2F;text-align:right;margin:8px 0}
.checkout-btn{width:100%;padding:10px;background:#2E7D32;color:white;border:none;border-radius:8px;font-weight:800;font-size:13px;cursor:pointer}
.loading{text-align:center;padding:40px;color:#D32F2F;font-weight:700}
@media (max-width:768px) {body{padding-right:15px;padding-bottom:280px}.cart-bar{top:auto;bottom:0;right:0;left:0;width:100%;border-radius:20px 20px 0 0;max-height:60vh}}
</style>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#D32F2F">
</head>
<body>
<div class="container">
<h2>🛒 One Siomai POS</h2>
<p class="subtitle">Tap product to add to cart</p>
<div class="cat-grid">
<button class="cat-btn active" onclick="window.filterCat('all',this)">All</button>
<button class="cat-btn" onclick="window.filterCat('65s',this)">65's</button>
<button class="cat-btn" onclick="window.filterCat('30s',this)">30's</button>
<button class="cat-btn" onclick="window.filterCat('big',this)">Big SIOMAI</button>
<button class="cat-btn" onclick="window.filterCat('dumplings',this)">Dumplings</button>
<button class="cat-btn" onclick="window.filterCat('siopao',this)">SIOPAO</button>
<button class="cat-btn" onclick="window.filterCat('sauce',this)">Sauce</button>
<button class="cat-btn" onclick="window.filterCat('others',this)">Others</button>
</div>
<div class="prod-grid" id="prodGrid"><div class="loading">Loading products...</div></div>
</div>

<div class="cart-bar" id="cartBar">
<div class="cart-head">
<span class="cart-title">🛒 Cart</span>
<span class="cart-badge" id="cartBadge">0</span>
</div>
<div class="cart-list" id="cartList"><p style="text-align:center;color:#999;font-size:12px;padding:20px 0">No items yet</p></div>
<div style="margin:8px 0;padding:10px;background:#FFF3E0;border-radius:8px;border:2px solid #FFB74D;">
<label style="font-weight:800;color:#E65100;font-size:12px;display:flex;align-items:center;gap:6px;">
<input type="checkbox" id="vipCheck" onchange="renderCart()" style="width:18px;height:18px"> VIP Customer - Suki Price
</label>
</div>
<div class="cart-sum" id="cartSum">Total: ₱0</div>
<button class="checkout-btn" id="checkoutBtn" disabled onclick="window.openPayModal()">Checkout</button>
</div>

<div id="payModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);justify-content:center;align-items:center;z-index:9999">
<div style="background:white;padding:25px;border-radius:12px;width:90%;max-width:380px">
<span onclick="window.closePayModal()" style="float:right;cursor:pointer;font-size:28px">&times;</span>
<h2 style="margin-top:0;color:#D32F2F">Payment</h2>
<p id="reviewTotal" style="font-size:20px;font-weight:bold;margin:15px 0">Total: ₱0.00</p>
<div style="margin:15px 0">
<label style="font-size:13px;color:#666;font-weight:700">Payment Method:</label>
<select id="payMethod" onchange="window.togglePay()" style="width:100%;padding:12px;font-size:16px;border:2px solid #FFCC80;border-radius:8px;font-weight:700">
<option value="Cash">Cash</option>
<option value="Gcash">Gcash</option>
</select>
</div>
<div id="cashSection">
<input type="number" id="cashIn" placeholder="Cash Tendered" oninput="window.computeChange()" style="width:100%;padding:12px;font-size:18px;font-weight:700;text-align:right;border:2px solid #FFCC80;border-radius:8px;margin-top:5px">
<div style="text-align:right;font-size:18px;font-weight:800;color:#2E7D32;margin-top:5px" id="change">Change: ₱0.00</div>
</div>
<button onclick="window.confirmPay()" style="width:100%;padding:14px;background:#2E7D32;color:white;border:none;border-radius:8px;font-weight:700;margin-top:10px">Confirm Payment</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, query, where, addDoc, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {apiKey: "AIzaSyDk3ZbOXuw3PEfJzdt8AI2ueJq5yksfekE",authDomain: "dhan-siomai-pos-fe1e5.firebaseapp.com",projectId: "dhan-siomai-pos-fe1e5",storageBucket: "dhan-siomai-pos-fe1e5.firebasestorage.app",messagingSenderId: "305932123173",appId: "1:305932123173:web:f27894a2d5e6e6ab8253cc"};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let products = [];
let cart = [];
let curCat = 'all';
let currentTotal = 0;

function getKgPerPack(cat){if(cat==='65s')return 1;if(cat==='30s')return 0.5;return 1}
function getTotalCartKg(){return cart.reduce((sum,item)=>sum+Number(item.qty)*getKgPerPack(item.category),0)}
function getPrice(p,qty){const vipCheck=document.getElementById('vipCheck');const totalKg=getTotalCartKg();let price=Number(p.price)||0;if(vipCheck&&vipCheck.checked&&Number(p.vipPrice)>0)price=Number(p.vipPrice);else if(Number(p.bulkPrice)>0&&Number(p.bulkMinQty)>0&&totalKg>=Number(p.bulkMinQty))price=Number(p.bulkPrice);return price}

async function loadProducts(){
const grid=document.getElementById('prodGrid');
try{
let q=collection(db,"products");
if(curCat!='all')q=query(collection(db,"products"),where("category","==",curCat));
const snap=await getDocs(q);
products=[];
snap.forEach(d=>products.push({id:d.id,...d.data()}));
renderProducts(products);
}catch(error){
grid.innerHTML='<p style="grid-column:span 2;text-align:center;color:#C62828;padding:40px">Error: '+error.message+'</p>';
}
}

function renderProducts(list){
const grid=document.getElementById('prodGrid');
if(list.length===0){grid.innerHTML='<p style="grid-column:span 2;text-align:center;color:#999;padding:40px">No products yet</p>';return}
let html='';
list.forEach(prod=>{
let price=Number(prod.price)||0;
let kgLabel=prod.category==='65s'?'1kg':prod.category==='30s'?'0.5kg':'1kg';
html+='<div class="prod-card" onclick="window.addToCart(\''+prod.id+'\')">'+(prod.image?'<img src="'+prod.image+'" class="prod-img">':'<div class="prod-img" style="display:flex;align-items:center;justify-content:center;color:#ccc;font-size:11px">No Image</div>')+'<div class="prod-name">'+prod.name+'</div><div class="prod-price">₱'+price+' <span style="font-size:9px;color:#666">'+kgLabel+'</span></div><div class="prod-stock">Stock: '+(prod.stock||0)+' packs</div></div>';
});
grid.innerHTML=html;
}

window.filterCat=(cat,btn)=>{curCat=cat;document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');loadProducts()}
window.addToCart=(prodId)=>{const prod=products.find(p=>p.id===prodId);if(!prod||prod.stock<=0){alert('Out of stock!');return}const existing=cart.find(item=>item.id===prodId);if(existing){if(existing.qty>=prod.stock){alert('Max stock!');return}existing.qty++}else{cart.push({id:prodId,name:prod.name,price:prod.price,vipPrice:prod.vipPrice,bulkPrice:prod.bulkPrice,bulkMinQty:prod.bulkMinQty,stock:prod.stock,category:prod.category,qty:1})}renderCart()}
function renderCart(){const cartList=document.getElementById('cartList');const cartBadge=document.getElementById('cartBadge');const cartSum=document.getElementById('cartSum');const checkoutBtn=document.getElementById('checkoutBtn');let total=0;const totalKg=getTotalCartKg();if(cart.length===0){cartList.innerHTML='<p style="text-align:center;color:#999;font-size:12px;padding:20px 0">No items yet</p>';checkoutBtn.disabled=true}else{let html='';cart.forEach((item,i)=>{let price=getPrice(item,item.qty);const subtotal=price*item.qty;total+=subtotal;const kgPerPack=getKgPerPack(item.category);const itemKg=(item.qty*kgPerPack).toFixed(1);html+='<div class="cart-row"><button class="del-btn" onclick="window.removeItem('+i+')">×</button><span class="item-name">'+item.name+' '+itemKg+'kg</span><div class="qty-box"><button class="qty-btn" onclick="window.changeQty('+i+',-1)">-</button><input type="number" class="qty-input" value="'+item.qty+'" min="1" onchange="window.setQty('+i+',this.value)"><button class="qty-btn" onclick="window.changeQty('+i+',1)">+</button></div><span class="item-total">₱'+subtotal.toFixed(2)+'</span></div>'});cartList.innerHTML=html;checkoutBtn.disabled=false}cartBadge.innerText=cart.length;cartSum.innerText='Total: ₱'+total.toFixed(2)+' | '+totalKg.toFixed(1)+'kg';currentTotal=total}
window.removeItem=(index)=>{cart.splice(index,1);renderCart()}
window.changeQty=(index,delta)=>{cart[index].qty+=delta;const prod=products.find(p=>p.id===cart[index].id);if(cart[index].qty<1)cart[index].qty=1;if(prod&&cart[index].qty>prod.stock)cart[index].qty=prod.stock;renderCart()}
window.setQty=(i,val)=>{val=parseInt(val)||1;const prod=products.find(p=>p.id===cart[i].id);if(val<1)val=1;if(prod&&val>prod.stock)val=prod.stock;cart[i].qty=val;renderCart()}
window.computeChange=()=>{const cashIn=Number(document.getElementById('cashIn').value)||0;const change=cashIn-currentTotal;document.getElementById('change').textContent='Change: ₱'+change.toFixed(2)}
window.openPayModal=()=>{document.getElementById('reviewTotal').textContent='Total: ₱'+currentTotal.toFixed(2)+' | '+getTotalCartKg().toFixed(1)+'kg';document.getElementById('payModal').style.display='flex'}
window.closePayModal=()=>{document.getElementById('payModal').style.display='none'}
window.togglePay=()=>{const method=document.getElementById('payMethod').value;document.getElementById('cashSection').style.display=method==='Cash'?'block':'none'}
window.confirmPay=async()=>{const method=document.getElementById('payMethod').value;const cashIn=Number(document.getElementById('cashIn').value)||0;const change=cashIn-currentTotal;const totalKg=getTotalCartKg();const btn=event.target;btn.disabled=true;btn.textContent='Saving...';try{for(const item of cart){const prod=products.find(p=>p.id===item.id);if(prod){const prodRef=doc(db,'products',item.id);await updateDoc(prodRef,{stock:increment(-item.qty)})}}const saleData={items:cart.map(i=>{const price=getPrice(i,i.qty);const kgPerPack=getKgPerPack(i.category);return{id:i.id,name:i.name,qty:i.qty,kg:i.qty*kgPerPack,price:price,total:price*i.qty}}),total:currentTotal,totalKg:totalKg,cashIn:cashIn,change:change,method:method,timestamp:new Date(),status:change<0?'Partial':'Paid'};await addDoc(collection(db,'sales'),saleData);alert(`Payment Success!\nTotal: ₱${currentTotal.toFixed(2)}\nPaid: ₱${cashIn.toFixed(2)}\nChange: ₱${change.toFixed(2)}`);cart=[];closePayModal();renderCart();document.getElementById('cashIn').value='';loadProducts()}catch(err){alert('Error: '+err.message)}finally{btn.disabled=false;btn.textContent='Confirm Payment'}}
loadProducts();
</script>
</body>
</html>
