<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Production - DHAN SIOMAI</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#f5f5f5;padding:15px;}
.header{background:#ff6b35;color:white;padding:15px;border-radius:10px;margin-bottom:15px;display:flex;justify-content:space-between;align-items:center;}
.header a{color:white;text-decoration:none;font-weight:600;}
.card{background:white;padding:15px;border-radius:10px;box-shadow:0 2px 5px rgba(0,0,0,0.1);margin-bottom:15px;}
input{width:100%;padding:10px;margin-bottom:10px;border:1px solid #ddd;border-radius:8px;font-size:16px;}
button{background:#ff6b35;color:white;border:none;padding:10px 20px;border-radius:8px;font-weight:600;cursor:pointer;width:100%;}
</style>
</head>
<body>
<div class="header">
<h3>📊 Daily Production</h3>
<a href="index.html">← Back</a>
</div>
<div class="card">
<h4>Add Production</h4>
<input list="products" id="dProduct" placeholder="Type to search product...">
<datalist id="products"></datalist>
<input type="number" id="dQty" placeholder="Quantity Produced">
<input type="date" id="dDate">
<button onclick="addProduction()">Save Production</button>
</div>
<script>
const firebaseConfig = {
apiKey: "AIzaSyDk3ZbOXuw3PEfJzdt8AI2ueJq5yksfekE",
authDomain: "dhan-siomai-pos-fe1e5.firebaseapp.com",
projectId: "dhan-siomai-pos-fe1e5",
storageBucket: "dhan-siomai-pos-fe1e5.firebasestorage.app",
messagingSenderId: "305932123173",
appId: "1:305932123173:web:f27894a2d5e6e6ab8253cc"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let productsList = {}; // store id -> name for lookup

window.onload = loadProducts;

async function loadProducts(){
const snap = await db.collection('dhan-pos-web').get();
let datalistHTML = '';
snap.forEach(doc=>{
let p = doc.data();
productsList[p.name] = doc.id; // map name to id
datalistHTML += `<option value="${p.name}">`;
});
document.getElementById('products').innerHTML = datalistHTML;
document.getElementById('dDate').valueAsDate = new Date();
}

async function addProduction(){
const productName = document.getElementById('dProduct').value;
const qty = parseInt(document.getElementById('dQty').value);
const date = document.getElementById('dDate').value;

if(!productName ||!productsList[productName] || isNaN(qty)){
  alert('Please select a valid product from the list and enter quantity');
  return;
}

const productId = productsList[productName];

// Save to dhan-daily
await db.collection('dhan-daily').add({
  productId,
  productName,
  qty,
  date,
  timestamp:firebase.firestore.FieldValue.serverTimestamp()
});

// Update stock in dhan-pos-web
const prodRef = db.collection('dhan-pos-web').doc(productId);
const prodSnap = await prodRef.get();
const newStock = (prodSnap.data().stock || 0) + qty;
await prodRef.update({stock:newStock});

alert('Production saved! Stock updated.');
document.getElementById('dQty').value='';
document.getElementById('dProduct').value='';
}
</script>
</body>
</html>
