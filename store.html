<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Store - DHAN SIOMAI</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
    background: #fafafa;
  }
  h2 {
    text-align: center;
    margin-bottom: 20px;
  }
 .product {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px;
    background: white;
    border-bottom: 1px solid #eee;
  }
 .cart {
    margin-top: 30px;
    background: white;
    padding: 15px;
    border-radius: 10px;
  }
  button {
    padding: 8px 14px;
    background: #4caf50;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }
  button:hover {
    background: #45a049;
  }
</style>
</head>
<body>

<h2>Store</h2>
<div id="productList">Loading products...</div>

<div class="cart">
  <h3>Cart</h3>
  <div id="cartItems">Cart is empty</div>
  <h4>Total: ₱<span id="cartTotal">0</span></h4>
  <button onclick="checkout()">Checkout</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_AUTH_DOMAIN",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_STORAGE_BUCKET",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let cart = [];

  async function loadProducts(){
    const snap = await getDocs(query(collection(db, 'dhan-pos-web'), where('stock', '>', 0)));

    var grouped = {};
    snap.forEach(function(doc){
      var p = doc.data();
      var cat = (p.category || 'Uncategorized').trim();
      if(!grouped[cat]) grouped[cat] = [];
      grouped[cat].push({
        id: doc.id,
        name: p.name,
        price: p.price,
        stock: p.stock
      });
    });

    var html = '';
    Object.keys(grouped).sort().forEach(function(cat){
      html += '<div style="background:#f8f8f8;padding:10px;margin:10px 0;font-weight:600;border-radius:8px;">' + cat + '</div>';

      grouped[cat].forEach(function(p){
        html += '<div class="product">' +
          '<div style="flex:1">' +
            '<strong>' + p.name + '</strong><br>' +
            '₱' + p.price + ' | Stock: ' + p.stock +
          '</div>' +
          '<div style="display:flex;gap:5px;align-items:center;">' +
            '<input type="number" id="qty-' + p.id + '" value="1" min="1" max="' + p.stock + '" style="width:60px;padding:6px;border:1px solid #ddd;border-radius:8px;text-align:center;">' +
            '<button onclick="addToCart(\'' + p.id + '\')">Add</button>' +
          '</div>' +
        '</div>';
      });
    });

    document.getElementById('productList').innerHTML = html || '<p style="text-align:center;padding:20px;color:#888;">No products available</p>';
  }

  window.addToCart = function(productId){
    const qty = parseInt(document.getElementById('qty-' + productId).value);
    if(qty <= 0) return;

    // Hanapin yung product sa cart
    const existing = cart.find(item => item.id === productId);
    if(existing){
      existing.qty += qty;
    } else {
      cart.push({id: productId, qty: qty});
    }
    renderCart();
  }

  function renderCart(){
    if(cart.length === 0){
      document.getElementById('cartItems').innerHTML = 'Cart is empty';
      document.getElementById('cartTotal').innerText = '0';
      return;
    }

    let html = '';
    let total = 0;
    cart.forEach(function(item){
      html += '<div>' + item.id + ' x' + item.qty + '</div>';
      // Note: Need mo i-fetch price dito kung gusto mo accurate total
      total += item.qty * 0;
    });

    document.getElementById('cartItems').innerHTML = html;
    document.getElementById('cartTotal').innerText = total;
  }

  window.checkout = function(){
    alert('Checkout function dito');
  }

  loadProducts();
</script>

</body>
</html>
