<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Store - DHAN SIOMAI</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#f5f5f5;padding:15px;}
.header{background:#ff6b35;color:white;padding:15px;border-radius:10px;margin-bottom:15px;display:flex;justify-content:space-between;align-items:center;}
.header a{color:white;text-decoration:none;font-weight:600;}
.card{background:white;padding:15px;border-radius:10px;box-shadow:0 2px 5px rgba(0,0,0,0.1);margin-bottom:15px;}
.product-item{display:flex;justify-content:space-between;align-items:center;padding:12px;border:1px solid #eee;border-radius:8px;margin-bottom:8px;}
.product-item button{background:#ff6b35;color:white;border:none;padding:8px 15px;border-radius:8px;font-weight:600;cursor:pointer;}
.cart-item{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee;}
input,select,button{width:100%;padding:10px;margin:8px 0;border:1px solid #ddd;border-radius:8px;}
button.checkout{background:#2ed573;color:white;border:none;font-weight:600;cursor:pointer;}
button.checkout:disabled{background:#ccc;cursor:not-allowed;}
.category-title{background:#f8f8f8;padding:10px;margin:10px 0;font-weight:600;border-radius:8px;}
.loading{text-align:center;padding:20px;color:#666;}
</style>
</head>
<body>
<div class="header">
<h3>🏪 Store</h3>
<a href="index.html">← Back</a>
</div>

<div class="card">
<h4>Products</h4>
<div id="productList" class="loading">Loading products...</div>
</div>

<div class="card">
<h4>Cart</h4>
<div id="cartItems">Empty</div>
<h3 id="total">Total: ₱0</h3>
<select id="paymentMethod">
  <option value="Cash">Cash</option>
  <option value="GCash">GCash</option>
</select>
<input type="number" id="cashReceived" placeholder="Cash Received" oninput="calcChange()">
<p>Change: ₱<span id="change">0</span></p>
<button class="checkout" id="checkoutBtn" onclick="checkout()" disabled>Checkout</button>
</div>

<script>
const firebaseConfig = {
 apiKey: "AIzaSyDk3ZbOXuw3PEfJzdt8AI2ueJq5yksfekE",
 authDomain: "dhan-siomai-pos-fe1e5.firebaseapp.com",
 projectId: "dhan-siomai-pos-fe1e5",
 storageBucket: "dhan-siomai-pos-fe1e5.firebasestorage.app",
 messagingSenderId: "305932123173",
 appId: "1:305932123173:web:f27894a2d5e6e6ab8253cc"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let products = [];
let cart = [];

async function loadProducts(){
  try{
    const snapshot = await db.collection('dhan-pos-web').get();
    products = [];

    snapshot.forEach(doc=>{
      let data = doc.data();
      let stockNum = parseInt(data.stock) || 0;
      let priceNum = parseFloat(data.price) || 0;

      // Kunin lang yung may stock > 0
      if(stockNum > 0){
        products.push({
          id: doc.id,
          name: data.name || 'No Name',
          category: (data.category || 'Uncategorized').trim(),
          price: priceNum,
          stock: stockNum
        });
      }
    });

    renderProducts();
  }catch(err){
    console.error(err);
    document.getElementById('productList').innerHTML = '<p style="color:red;">Error loading products</p>';
  }
}

function renderProducts(){
  if(products.length === 0){
    document.getElementById('productList').innerHTML = '<p style="text-align:center;color:#666;">No products available</p>';
    return;
  }

  // Group by category
  let grouped = {};
  products.forEach(p=>{
    if(!grouped[p.category]) grouped[p.category] = [];
    grouped[p.category].push(p);
  });

  // Sort categories alphabetically
  let sortedCats = Object.keys(grouped).sort();

  let html = '';
  sortedCats.forEach(cat=>{
    html += `<div class="category-title">${cat} (${grouped[cat].length} items)</div>`;
    grouped[cat].forEach(p=>{
      html += `<div class="product-item">
        <div>
          <strong>${p.name}</strong><br>
          <small>₱${p.price} | Stock: ${p.stock}</small>
        </div>
        <button onclick="addToCart('${p.id}')">Add</button>
      </div>`;
    });
  });

  document.getElementById('productList').innerHTML = html;
}

function addToCart(id){
  let product = products.find(p=>p.id===id);
  if(!product) return;

  let cartItem = cart.find(c=>c.id===id);

  if(cartItem){
    if(cartItem.qty < product.stock){
      cartItem.qty++;
    }else{
      alert('Not enough stock');
      return;
    }
  }else{
    cart.push({...product, qty:1});
  }
  renderCart();
}

function renderCart(){
  if(cart.length===0){
    document.getElementById('cartItems').innerHTML='Empty';
    document.getElementById('total').innerText='Total: ₱0';
    document.getElementById('checkoutBtn').disabled=true;
    return;
  }

  let html='';
  let total=0;
  cart.forEach(item=>{
    let subtotal=item.price*item.qty;
    total+=subtotal;
    html+=`<div class="cart-item">
      <span>${item.name} x${item.qty}</span>
      <span>₱${subtotal}</span>
    </div>`;
  });

  document.getElementById('cartItems').innerHTML=html;
  document.getElementById('total').innerText='Total: ₱'+total;
  document.getElementById('checkoutBtn').disabled=false;
  calcChange();
}

function calcChange(){
  let total=cart.reduce((sum,item)=>sum+item.price*item.qty,0);
  let received=parseFloat(document.getElementById('cashReceived').value)||0;
  document.getElementById('change').innerText=Math.max(0,received-total);
}

async function checkout(){
  if(cart.length===0) return;

  let total=cart.reduce((sum,item)=>sum+item.price*item.qty,0);
  let payment=document.getElementById('paymentMethod').value;

  try{
    let batch=db.batch();

    // Save sale
    batch.set(db.collection('dhan-sales').doc(),{
      items:cart,
      total:total,
      payment:payment,
      timestamp:firebase.firestore.FieldValue.serverTimestamp()
    });

    // Update stock
    cart.forEach(item=>{
      batch.update(db.collection('dhan-pos-web').doc(item.id),{
        stock:firebase.firestore.FieldValue.increment(-item.qty)
      });
    });

    await batch.commit();
    alert('Sale completed!');
    cart=[];
    document.getElementById('cashReceived').value='';
    loadProducts();
    renderCart();
  }catch(err){
    alert('Error: '+err.message);
  }
}

loadProducts();
</script>
</body>
</html>
