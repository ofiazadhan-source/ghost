<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Store - DHAN SIOMAI</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#f5f5f5;padding:15px;}
.header{background:#ff6b35;color:white;padding:15px;border-radius:10px;margin-bottom:15px;display:flex;justify-content:space-between;align-items:center;}
.header a{color:white;text-decoration:none;font-weight:600;}
.card{background:white;padding:15px;border-radius:10px;box-shadow:0 2px 5px rgba(0,0,0,0.1);margin-bottom:15px;}
.product{padding:10px;border:1px solid #ddd;border-radius:8px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;gap:10px;}
button{background:#ff6b35;color:white;border:none;padding:8px 15px;border-radius:8px;font-weight:600;cursor:pointer;}
.cart-item{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee;}
select,input{width:100%;padding:10px;margin:8px 0;border:1px solid #ddd;border-radius:8px;}
.hidden{display:none;}
#receiptModal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:none;justify-content:center;align-items:center;z-index:999;}
.receipt{background:white;padding:20px;width:300px;font-size:13px;}
.receipt h3{text-align:center;margin-bottom:5px;}
.receipt.line{border-top:1px dashed #000;margin:8px 0;}
.receipt-row{display:flex;justify-content:space-between;margin:3px 0;}
.btn-row{display:flex;gap:10px;margin-top:15px;}
.btn-row button{flex:1;}
@media print{
 body *{visibility:hidden;}
 #printArea,#printArea *{visibility:visible;}
 #printArea{position:absolute;left:0;top:0;width:58mm;}
}
</style>
</head>
<body>
<div class="header">
<h3>🏪 Store</h3>
<a href="index.html">← Back</a>
</div>
<div class="card">
<h4>Products</h4>
<div id="productList">Loading...</div>
</div>
<div class="card">
<h4>Cart</h4>
<div id="cartList">Empty</div>
<h3 id="total">Total: ₱0</h3>
<select id="paymentMethod" onchange="togglePaymentFields()">
<option value="Cash">Cash</option>
<option value="GCash">GCash</option>
</select>
<div id="cashFields">
<input type="number" id="cashAmount" placeholder="Cash Received" oninput="computeChange()">
<div style="display:flex;gap:8px;flex-wrap:wrap;margin:8px 0;">
<button type="button" onclick="setCash(10)" style="flex:1;padding:8px;background:#eee;border:none;border-radius:8px;">₱10</button>
<button type="button" onclick="setCash(50)" style="flex:1;padding:8px;background:#eee;border:none;border-radius:8px;">₱50</button>
<button type="button" onclick="setCash(100)" style="flex:1;padding:8px;background:#eee;border:none;border-radius:8px;">₱100</button>
<button type="button" onclick="setCash(500)" style="flex:1;padding:8px;background:#eee;border:none;border-radius:8px;">₱500</button>
<button type="button" onclick="setCash(1000)" style="flex:1;padding:8px;background:#eee;border:none;border-radius:8px;">₱1000</button>
</div>
<p id="changeText">Change: ₱0</p>
</div>
<div id="gcashFields" class="hidden">
<input type="text" id="gcashRef" placeholder="GCash Reference No.">
</div>
<button onclick="checkout()">Checkout</button>
</div>
<div id="receiptModal">
<div id="printArea" class="receipt"></div>
</div>
<script>
const firebaseConfig = {
apiKey: "AIzaSyDk3ZbOXuw3PEfJzdt8AI2ueJq5yksfekE",
authDomain: "dhan-siomai-pos-fe1e5.firebaseapp.com",
projectId: "dhan-siomai-pos-fe1e5",
storageBucket: "dhan-siomai-pos-fe1e5.firebasestorage.app",
messagingSenderId: "305932123173",
appId: "1:305932123173:web:f27894a2d5e6e6ab8253cc"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
let cart = [];
let lastSale = null;

window.onload = function(){
loadProducts();
togglePaymentFields();
}

async function loadProducts(){
  const snap = await db.collection('dhan-pos-web').where('stock','>',0).get();

  let grouped = {
    "65's": [],
    "30's": [],
    "Big SIOMAI": [],
    "Dumplings": [],
    "Siopao": [],
    "Sauce": [],
    "Others": []
  };

  snap.forEach(doc=>{
    let p = doc.data();
    let name = p.name.toLowerCase();
    let price = p.price;

    if(price == 150) {
      grouped["65's"].push({id: doc.id,...p});
    } else if(price == 80) {
      grouped["30's"].push({id: doc.id,...p});
    } else if(name.includes('20\'s') || name.includes("20's")) {
      grouped["Big SIOMAI"].push({id: doc.id,...p});
    } else if(name.includes('dumpling') || name.includes('dumlings')) {
      grouped["Dumplings"].push({id: doc.id,...p});
    } else if(name.includes('siopao')) {
      grouped["Siopao"].push({id: doc.id,...p});
    } else if(name.includes('sauce')) {
      grouped["Sauce"].push({id: doc.id,...p});
    } else {
      grouped["Others"].push({id: doc.id,...p});
    }
  });

  let html = '';
  let order = ["65's", "30's", "Big SIOMAI", "Dumplings", "Siopao", "Sauce", "Others"];

  order.forEach(groupName=>{
    if(grouped[groupName].length === 0) return;

    html += `<div style="background:#ff6b35;color:white;padding:10px 12px;margin:15px 0 8px 0;border-radius:8px;font-weight:700;font-size:15px;">
      ${groupName}
    </div>`;

    grouped[groupName].forEach(p=>{
      html += `<div class="product">
        <div style="flex:1">
          <strong>${p.name}</strong><br>
          ₱${p.price} | Stock: ${p.stock}
        </div>
        <div style="display:flex;gap:5px;align-items:center;">
          <input type="number" id="qty-${p.id}" value="1" min="1" max="${p.stock}" style="width:60px;padding:6px;border:1px solid #ddd;border-radius:8px;text-align:center;">
          <button onclick="addToCart('${p.id}')">Add</button>
        </div>
      </div>`;
    });
  });

  document.getElementById('productList').innerHTML = html || 'No products available';
}

function addToCart(id){
let qtyInput = document.getElementById(`qty-${id}`);
let qty = parseInt(qtyInput.value) || 1;
db.collection('dhan-pos-web').doc(id).get().then(doc => {
if(!doc.exists) return;
let p = doc.data();
if(qty <= 0){
alert('Quantity must be at least 1');
return;
}
if(qty > p.stock){
alert('Not enough stock');
return;
}
let item = cart.find(i=>i.id===id);
if(item){
if(item.qty + qty > p.stock){
alert('Not enough stock');
return;
}
item.qty += qty;
} else{
cart.push({id:id, name:p.name, price:p.price, qty:qty});
}
qtyInput.value = 1;
updateCart();
});
}

function updateCart(){
let html = '';
let total = 0;
cart.forEach(i=>{
html += `<div class="cart-item"><span>${i.name} x${i.qty}</span><span>₱${i.price*i.qty}</span></div>`;
total += i.price*i.qty;
});
document.getElementById('cartList').innerHTML = html || 'Empty';
document.getElementById('total').innerText = `Total: ₱${total}`;
computeChange();
}

function togglePaymentFields(){
let method = document.getElementById('paymentMethod').value;
document.getElementById('cashFields').classList.toggle('hidden', method!== 'Cash');
document.getElementById('gcashFields').classList.toggle('hidden', method!== 'GCash');
computeChange();
}

function computeChange(){
let total = cart.reduce((sum,i)=>sum+i.price*i.qty,0);
let cash = parseFloat(document.getElementById('cashAmount').value) || 0;
let change = cash - total;
document.getElementById('changeText').innerText = `Change: ₱${change >= 0? change : 0}`;
}

function setCash(amount){
document.getElementById('cashAmount').value = amount;
computeChange();
}

async function checkout(){
if(cart.length===0){alert('Cart empty');return;}
let method = document.getElementById('paymentMethod').value;
let total = cart.reduce((sum,i)=>sum+i.price*i.qty,0);
let paymentData = {method,total};
if(method === 'Cash'){
let cash = parseFloat(document.getElementById('cashAmount').value) || 0;
if(cash < total){alert('Kulang ang cash. Need ₱'+total);return;}
paymentData.cashReceived = cash;
paymentData.change = cash - total;
}
if(method === 'GCash'){
let ref = document.getElementById('gcashRef').value.trim();
if(!ref){alert('Enter GCash Reference No.');return;}
paymentData.gcashRef = ref;
}
let saleData = { items:cart,...paymentData, timestamp:firebase.firestore.FieldValue.serverTimestamp() };
await db.collection('dhan-sales').add(saleData);
for(let i of cart){
let ref = db.collection('dhan-pos-web').doc(i.id);
let snap = await ref.get();
let newStock = snap.data().stock - i.qty;
await ref.update({stock:newStock});
}
lastSale = {items:[...cart],...paymentData,date:new Date()};
showReceipt();
cart = [];
document.getElementById('cashAmount').value='';
document.getElementById('gcashRef').value='';
updateCart();
loadProducts();
togglePaymentFields();
}

function showReceipt(){
let html = `<h3>DHAN SIOMAI</h3> <p style="text-align:center;">Thank you!</p> <div class="line"></div> <p>${lastSale.date.toLocaleString()}</p> <div class="line"></div>`;
lastSale.items.forEach(i=>{
html += `<div class="receipt-row"><span>${i.name} x${i.qty}</span><span>₱${i.price*i.qty}</span></div>`;
});
html += `<div class="line"></div> <div class="receipt-row"><strong>Total</strong><strong>₱${lastSale.total}</strong></div> <div class="receipt-row"><span>Payment</span><span>${lastSale.method}</span></div>`;
if(lastSale.method==='Cash'){
html += `<div class="receipt-row"><span>Cash</span><span>₱${lastSale.cashReceived}</span></div> <div class="receipt-row"><span>Change</span><span>₱${lastSale.change}</span></div>`;
}
if(lastSale.method==='GCash'){
html += `<div class="receipt-row"><span>Ref</span><span>${lastSale.gcashRef}</span></div>`;
}
html += `<div class="line"></div> <div class="btn-row"> <button onclick="window.print()">Print</button> <button onclick="document.getElementById('receiptModal').style.display='none'">Close</button> </div>`;
document.getElementById('printArea').innerHTML = html;
document.getElementById('receiptModal').style.display='flex';
}
</script>
</body>
</html>
