<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOSS PRODUCTION - DHAN SIOMAI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
body{background:#FFF8E1;padding:15px}
.header{background:#D32F2F;color:white;text-align:center;padding:20px;border-radius:12px;margin-bottom:15px}
.header h1{font-size:20px;margin-bottom:5px}
.header p{font-size:12px;opacity:0.9}
.card{background:white;padding:15px;border-radius:12px;margin-bottom:12px;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
.card h2{font-size:16px;color:#D32F2F;margin-bottom:12px;border-bottom:2px solid #FFEBEE;padding-bottom:8px}
.prod-row{padding:12px;border-bottom:1px solid #FFEBEE;font-size:14px}
.prod-row:last-child{border-bottom:none}
.prod-top{display:flex;justify-content:space-between;font-weight:800;color:#D32F2F;margin-bottom:5px;font-size:15px}
.prod-detail{font-size:12px;color:#666;line-height:1.6}
.total-good{background:#2E7D32;color:white;padding:12px;border-radius:8px;text-align:center;font-weight:800;font-size:16px;margin-top:10px}
.loading{text-align:center;padding:40px;color:#999;font-size:13px}
.badge-cat{font-size:10px;background:#FFEBEE;color:#D32F2F;padding:2px 6px;border-radius:4px;font-weight:700;margin-left:5px}
</style>
</head>
<body>
<div class="header">
<h1>📦 BOSS PRODUCTION VIEW</h1>
<p id="today-date">Loading...</p>
<p style="font-size:10px">READ ONLY</p>
</div>

<div class="card">
<h2>Today's Production</h2>
<div id="prod-list"><div class="loading">Loading...</div></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// DIRECT CONFIG - GAYA SA BOSS-VIEW
const firebaseConfig = {
apiKey: "AIzaSyDk3ZbOXuw3PEfJzdt8AI2ueJq5yksfekE",
authDomain: "dhan-siomai-pos-fe1e5.firebaseapp.com",
projectId: "dhan-siomai-pos-fe1e5",
storageBucket: "dhan-siomai-pos-fe1e5.firebasestorage.app",
messagingSenderId: "305932123173",
appId: "1:305932123173:web:f27894a2d5e6e6ab8253cc"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const today = new Date().toISOString().split('T')[0];
document.getElementById('today-date').textContent = 'Date: ' + new Date().toLocaleDateString('en-PH', {weekday:'long', month:'long', day:'numeric', year:'numeric'});

async function loadProd() {
const list = document.getElementById('prod-list');
try {
const q = query(collection(db, "production"), where("date", "==", today));
const snap = await getDocs(q);
if(snap.empty) {
list.innerHTML = '<div class="loading">Wala pang production today</div>';
return;
}

let html = '';
let grandTotal = 0;

snap.forEach(doc => {
const p = doc.data();
grandTotal += p.totalGood || 0;

if(p.items && p.items.length > 0) {
p.items.forEach(item => {
const catBadge = item.category? `<span class="badge-cat">${item.category.toUpperCase()}</span>` : '';
html += `<div class="prod-row">
<div class="prod-top">${item.productName} ${catBadge} <span>${item.good} pcs</span></div>
<div class="prod-detail">Produced: ${item.produced} pcs | Damaged: ${item.damaged} pcs | Good: ${item.good} pcs</div>
</div>`;
});
}
});

html += `<div class="total-good">TOTAL GOOD TODAY: ${grandTotal} pcs</div>`;
list.innerHTML = html;

} catch(e) {
console.error(e);
list.innerHTML = '<div class="loading" style="color:red">Error: '+e.message+'</div>';
}
}

loadProd();
setInterval(loadProd, 30000);
</script>
</body>
</html>
