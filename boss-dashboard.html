<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOSS DASHBOARD - DHAN SIOMAI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
body{background:#f5f5f5}
.header{background:linear-gradient(135deg, #2E7D32, #1B5E20);color:white;text-align:center;padding:20px}
.header h1{font-size:22px;margin-bottom:5px}
.header p{font-size:12px;opacity:0.9}

.tabs{display:flex;background:#2E7D32;position:sticky;top:0;z-index:10}
.tab-btn{flex:1;padding:15px;border:none;background:transparent;color:white;font-weight:700;font-size:14px;cursor:pointer;border-bottom:3px solid transparent}
.tab-btn.active{background:#1B5E20;border-bottom:3px solid #FFC107}

.tab-content{display:none;padding:15px}
.tab-content.active{display:block}

iframe{width:100%;border:none;background:white;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
#salesFrame{height:1800px}
#prodFrame{height:800px}

.badge{position:absolute;top:10px;right:15px;background:#FFC107;color:#000;padding:4px 8px;border-radius:20px;font-size:10px;font-weight:800}
.header{position:relative}
</style>
</head>
<body>
<div class="header">
<span class="badge">READ ONLY</span>
<h1>💰 BOSS DASHBOARD</h1>
<p id="today-date">Loading...</p>
</div>

<div class="tabs">
<button class="tab-btn active" onclick="openTab('sales')">💵 Sales + Expenses + Net</button>
<button class="tab-btn" onclick="openTab('prod')">📦 Production</button>
</div>

<div id="sales" class="tab-content active">
<iframe id="salesFrame" src="boss-view.html"></iframe>
</div>

<div id="prod" class="tab-content">
<iframe id="prodFrame" src="boss-production.html"></iframe>
</div>

<script>
const today = new Date().toLocaleDateString('en-PH', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
document.getElementById('today-date').textContent = today;

function openTab(tabName) {
const tabs = document.querySelectorAll('.tab-content');
const btns = document.querySelectorAll('.tab-btn');
tabs.forEach(t => t.classList.remove('active'));
btns.forEach(b => b.classList.remove('active'));
document.getElementById(tabName).classList.add('active');
event.target.classList.add('active');
}

// Auto refresh both frames every 30s
setInterval(() => {
document.getElementById('salesFrame').contentWindow.location.reload();
document.getElementById('prodFrame').contentWindow.location.reload();
}, 30000);
</script>
</body>
</html>
