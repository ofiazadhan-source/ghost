<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expenses - DHAN SIOMAI Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#f5f5f5;color:#333;padding-bottom:120px}
.header{background:linear-gradient(135deg,#ff6b6b,#ff8e8e);color:white;padding:15px 20px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 10px rgba(255,107,107,0.3);position:sticky;top:0;z-index:100}
.header h1{font-size:18px;font-weight:700}
.back-btn{padding:8px 14px;border:none;border-radius:8px;font-weight:600;cursor:pointer;background:#fff;color:#ff6b6b}
.container{padding:15px;max-width:700px;margin:0 auto}
.card{background:white;padding:15px;border-radius:12px;margin-bottom:15px;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.date-card{background:linear-gradient(135deg,#fff5f5,#ffe5e5);border:2px solid #ffcccc}
.date-card label{display:block;font-weight:700;color:#ff6b6b;margin-bottom:8px;text-align:center}
.date-card input{width:100%;padding:12px;border:2px solid #ff6b6b;border-radius:8px;font-size:16px;font-weight:700;text-align:center;color:#ff6b6b}
.item-card{border:2px solid #ffe5e5}
.item-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.item-num{font-weight:700;color:#ff6b6b;font-size:14px}
.del-btn{background:#ff4444;color:white;border:none;border-radius:50%;width:24px;height:24px;cursor:pointer;font-size:18px;font-weight:bold;line-height:1}
.row{display:flex;gap:8px;margin-bottom:8px}
.row input{border:2px solid #ffd4c4;border-radius:8px;padding:10px;font-size:14px;font-weight:600;outline:none}
.desc{width:60%;color:#ff6b6b}
.amt{width:25%;color:#28a745;text-align:center;font-size:15px;font-weight:700}
.del-row{width:15%;max-width:45px;background:#ff4444;color:white;border:none;border-radius:8px;height:42px;font-size:20px;font-weight:800;cursor:pointer}
.add-btn{width:100%;padding:14px;background:linear-gradient(135deg,#ff6b6b,#ff8e8e);color:white;border:none;border-radius:10px;font-weight:700;font-size:15px;cursor:pointer;margin:12px 0}
.total-box{background:linear-gradient(135deg,#ff6b6b,#ff8e8e);color:white;padding:25px;border-radius:12px;text-align:center;margin:15px 0}
.total-box h3{font-size:13px;font-weight:600;opacity:0.9;letter-spacing:1px}
.total-box h2{font-size:38px;font-weight:700;margin-top:5px}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:15px}
.btn{padding:14px;border:none;border-radius:10px;font-weight:700;font-size:15px;cursor:pointer}
.btn-save{background:#28a745;color:white}
.btn-print{background:#007bff;color:white}
</style>
</head>
<body>
<div class="header">
<h1>💸 Expenses</h1>
<button class="back-btn" onclick="window.location.href='index.html'">← Back</button>
</div>
<div class="container">
<div class="card date-card">
<label>📅 Date of Purchase</label>
<input type="date" id="date">
</div>
<div id="list"></div>
<button class="add-btn" id="add">+ Add Expense Item</button>
<div class="total-box">
<h3>TOTAL EXPENSES</h3>
<h2 id="total">₱0</h2>
</div>
<div class="actions">
<button class="btn btn-save" id="save">💾 Save to Database</button>
<button class="btn btn-print" id="print">🖨️ Print</button>
</div>
</div>
<script type="module">
import { db } from './firebase-config.js';
import { collection, addDoc, Timestamp } from "https://www.gstatic.com/db/firestore.js";

let no = 0;

// SET TODAY DATE - YYYY-MM-DD
window.addEventListener('DOMContentLoaded',()=>{
  const today=new Date();
  const y=today.getFullYear();
  const m=String(today.getMonth()+1).padStart(2,'0');
  const d=String(today.getDate()).padStart(2,'0');
  document.getElementById('date').value=`${y}-${m}-${d}`;
});

function add(){
  no++;
  const div=document.createElement('div');
  div.className='card item-card';
  div.id='i'+no;
  div.innerHTML=`<div class="item-head"><span class="item-num">Item #${no}</span><button class="del-btn" onclick="del(${no})">×</button></div><div class="row"><input class="desc" placeholder="Description e.g. Mantika 1L"><input type="number" class="amt" placeholder="0.00" step="0.01" inputmode="decimal" oninput="total()"><button class="del-row" onclick="del(${no})">×</button></row>`;
  document.getElementById('list').appendChild(div);
}
window.del=function(id){
  const el=document.getElementById('i'+id);
  if(el)el.remove();
  total();
}
function total(){
  let sum=0;
  document.querySelectorAll('.amt').forEach(inp=>{
    sum+=parseFloat(inp.value)||0;
  });
  document.getElementById('total').textContent='₱'+sum.toFixed(0);
}
// SAVE - EXACT SAME STYLE SA POS MO BOSS
async function save(){
  const date=document.getElementById('date').value;
  if(!date){alert('Select date first boss!');return;}
  const items=[];
  document.querySelectorAll('.item-card').forEach(card=>{
    const desc=card.querySelector('.desc').value.trim();
    const amt=parseFloat(card.querySelector('.amt').value)||0;
    if(desc&&amt>0){items.push({name:desc,qty:1,price:amt,receipt:''});}
  });
  if(items.length===0){alert('Add at least 1 item boss!');return;}
  const totalAmt=parseFloat(document.getElementById('total').textContent.replace('₱',''));
  const btn=document.getElementById('save');
  btn.disabled=true;btn.textContent='Saving...';
  try{
    await addDoc(collection(db,'dhen-expenses'),{
      date:date,
      timestamp:Timestamp.now(),
      total:totalAmt,
      items:items,
      receiptNo:'EXP-'+Date.now().toString().slice(-6)
    });
    alert('✅ Saved successfully boss!');
    btn.disabled=false;btn.textContent='💾 Save to Database';
    document.getElementById('list').innerHTML='';no=0;total();add();
  }catch(e){
    alert('❌ Error: '+e.message);console.error(e);
    btn.disabled=false;btn.textContent='💾 Save to Database';
  }
}
function print(){
  const date=document.getElementById('date').value;
  let w=window.open('','_blank','width=300,height=600');
  let html='<h3 style="text-align:center">DHEN SIOMAI</h3><div style="text-align:center;font-size:12px">Expenses Receipt</div><hr>Date:'+date+'<br>Time:'+new Date().toLocaleTimeString()+'<hr>';
  document.querySelectorAll('.item-card').forEach(card=>{
    const d=card.querySelector('.desc').value.trim();
    const a=parseFloat(card.querySelector('.amt').value)||0;
    if(d&&a>0){html+=d+' x1 ........ ₱'+a.toFixed(2)+'<br>';}
  });
  html+='<hr><b>TOTAL: ₱'+document.getElementById('total').textContent.replace('₱','')+'</b><br><center>Thank you boss!</center>';
  w.document.write(html);w.print();w.close();
}
document.getElementById('add').onclick=add;
document.getElementById('save').onclick=save;
document.getElementById('print').onclick=print;
add();
</script>
</body>
</html>
