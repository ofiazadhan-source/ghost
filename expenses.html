<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Expenses - DHAN SIOMAI</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins', sans-serif}
body{background:linear-gradient(135deg,#0f172a,#1e293b);padding:20px;min-height:100vh}
.box{max-width:500px;margin:auto;background:white;border-radius:20px;padding:25px;box-shadow:0 10px 30px rgba(0,0,0,0.3)}
h2{color:#3b82f6;text-align:center;margin-bottom:5px;font-size:26px;font-weight:800}
.sub{text-align:center;color:#666;font-size:13px;margin-bottom:20px}
.back{background:#475569;color:white;border:none;padding:10px 18px;border-radius:10px;cursor:pointer;margin-bottom:15px;font-weight:700;text-decoration:none;display:inline-block}
.datebox{background:linear-gradient(135deg,#dbeafe,#bfdbfe);border:3px solid #3b82f6;border-radius:15px;padding:15px;margin-bottom:20px}
.datebox label{display:block;color:#1e40af;font-weight:800;margin-bottom:8px;text-align:center}
.datebox input{width:100%;padding:14px;border:2px solid #3b82f6;border-radius:10px;font-size:16px;font-weight:700;text-align:center;color:#1e40af}
.item{background:#f8fafc;border:2px solid #cbd5e1;border-radius:15px;padding:15px;margin-bottom:12px}
.top{display:flex;justify-content:space-between;margin-bottom:10px}
.num{color:#3b82f6;font-weight:800;font-size:14px}
.del{background:#ef4444;color:white;border:none;border-radius:50%;width:26px;height:26px;cursor:pointer;font-weight:800}
.row{display:grid;grid-template-columns:2fr 1fr auto;gap:8px}
.row input{padding:12px;border:2px solid #94a3b8;border-radius:10px;font-weight:600;font-size:15px}
.desc{color:#1e293b}
.amt{color:#16a34a;text-align:center;font-weight:700;font-size:16px}
.add{width:100%;padding:16px;background:linear-gradient(135deg,#3b82f6,#2563eb);color:white;border:none;border-radius:15px;font-weight:800;font-size:16px;cursor:pointer;margin:15px 0}
.total{background:linear-gradient(135deg,#1e40af,#1e3a8a);color:white;padding:30px;border-radius:20px;text-align:center;margin:20px 0}
.total label{font-size:12px;opacity:0.8;font-weight:700;letter-spacing:2px}
.total div{font-size:46px;font-weight:900;margin-top:8px}
.btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{padding:15px;border:none;border-radius:15px;font-weight:800;font-size:15px;cursor:pointer;color:white}
.save{background:linear-gradient(135deg,#16a34a,#15803d)}
.print{background:linear-gradient(135deg,#2563eb,#1d4ed8)}
</style>
</head>
<body>
<div class="box">
<a href="index.html" class="back">← Back to Menu</a>
<h2>💸 Daily Expenses</h2>
<p class="sub">DHAN SIOMAI TRACKING</p>
<div class="datebox">
<label>📅 Date of Purchase</label>
<input type="date" id="date" required>
</div>
<div id="list"></div>
<button class="add" id="add">+ ADD EXPENSE ITEM</button>
<div class="total">
<label>TOTAL EXPENSES TODAY</label>
<div id="total">₱0.00</div>
</div>
<div class="btns">
<button class="btn save" id="save">💾 SAVE NOW</button>
<button class="btn print" id="print">🖨️ PRINT</button>
</div>
</div>
<script type="module">
import { db } from './firebase-config.js'; // 🔥 GAMIT YUNG FILE MO BOSS
import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

let no = 0;
document.getElementById('date').valueAsDate = new Date();

function add() {
no++;
const div = document.createElement('div');
div.className = 'item';
div.id = 'i' + no;
div.innerHTML = `
<div class="top">
<span class="num">ITEM #${no}</span>
<button class="del" onclick="del(${no})">×</button>
</div>
<div class="row">
<input class="desc" placeholder="Description ex: Mantika 1L">
<input type="number" class="amt" placeholder="0.00" step="0.01">
<button class="del" onclick="del(${no})">×</button>
</div>`;
document.getElementById('list').appendChild(div);
div.querySelector('.amt').oninput = total;
}

window.del = function(id) {
document.getElementById('i' + id).remove();
total();
}

function total() {
let sum = 0;
document.querySelectorAll('.amt').forEach(inp => {
sum += parseFloat(inp.value) || 0;
});
document.getElementById('total').innerText = '₱' + sum.toFixed(2);
}

// 🔥 100% TUGMA SA NET.HTML MO
async function save() {
const date = document.getElementById('date').value;
if(!date) {
alert('Pili ka muna date boss!');
return;
}

const items = [];
document.querySelectorAll('.item').forEach(card => {
const desc = card.querySelector('.desc').value.trim();
const amt = parseFloat(card.querySelector('.amt').value) || 0;
if(desc && amt > 0) {
items.push({
description: desc,  // NET.HTML: item.description
amount: amt         // NET.HTML: item.amount
});
}
});

if(items.length === 0) {
alert('Add at least 1 expense boss!');
return;
}

const totalAmount = parseFloat(document.getElementById('total').innerText.replace('₱',''));
const btn = document.getElementById('save');
btn.disabled = true;
btn.innerText = 'SAVING...';

try {
await addDoc(collection(db, "daily_expenses"), { // 🔥 TUGMA SA NET.HTML MO
date: date,
timestamp: serverTimestamp(),
total: totalAmount,
items: items,
receiptNo: 'EXP-' + Date.now().toString().slice(-6)
});

alert('✅ SAVED SUCCESSFULLY BOSS!');
btn.disabled = false;
btn.innerText = '💾 SAVE NOW';
document.getElementById('list').innerHTML = '';
no = 0;
total();
add();

} catch(e) {
alert('ERROR: ' + e.message);
console.error(e);
btn.disabled = false;
btn.innerText = '💾 SAVE NOW';
}
}

function print() {
const date = document.getElementById('date').value;
let w = window.open('', '', 'width=300,height=600');
let html = '<h3 style="text-align:center;color:#1e40af">DHAN SIOMAI</h3><div style="text-align:center;font-size:12px">EXPENSE RECEIPT</div><hr>Date: ' + date + '<br>Time: ' + new Date().toLocaleTimeString() + '<hr>';
document.querySelectorAll('.item').forEach(card => {
const d = card.querySelector('.desc').value.trim();
const a = parseFloat(card.querySelector('.amt').value) || 0;
if(d && a > 0) {
html += d + ' x1........ ₱' + a.toFixed(2) + '<br>';
}
});
html += '<hr><b style="color:#1e40af">TOTAL: ₱' + document.getElementById('total').innerText.replace('₱','') + '</b><br><center>Thank you!</center>';
w.document.write(html);
w.print();
w.close();
}

document.getElementById('add').onclick = add;
document.getElementById('save').onclick = save;
document.getElementById('print').onclick = print;
add();
</script>
</body>
</html>
