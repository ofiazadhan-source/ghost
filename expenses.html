<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Expenses - Siomai Factory</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,sans-serif}
body{background:#FFF8E1;padding:15px}
.box{max-width:500px;margin:auto;background:white;border-radius:20px;padding:20px;box-shadow:0 5px 20px rgba(0,0,0,.1);border-top:6px solid #D32F2F}
h2{color:#D32F2F;text-align:center;margin-bottom:5px}
.sub{text-align:center;color:#666;font-size:13px;margin-bottom:20px}
.back{background:#757575;color:white;border:none;padding:10px 15px;border-radius:8px;cursor:pointer;margin-bottom:15px}
.datebox{background:#FFF3E0;padding:15px;border-radius:12px;border:2px solid #FFCC80;margin-bottom:15px}
.datebox label{display:block;text-align:center;color:#D32F2F;font-weight:800;margin-bottom:8px}
.datebox input{width:100%;padding:12px;font-size:18px;font-weight:800;color:#D32F2F;border:2px solid #D32F2F;border-radius:10px;text-align:center}
.card{background:#FFFDF7;border:2px solid #FFB74D;border-radius:12px;padding:10px;margin-bottom:8px}
.r1{display:flex;gap:8px}
.r1 input{padding:12px;border:2px solid #FFB74D;border-radius:8px;font-size:15px;font-weight:700}
.desc{flex:1;color:#D32F2F}
.price{width:90px;color:#2E7D32;text-align:right}
.del{width:40px;background:#C62828;color:white;border:none;border-radius:8px;font-size:20px;font-weight:800;cursor:pointer}
.r2{display:flex;gap:8px;margin-top:8px;align-items:center}
.picbtn{flex:1;background:#1976D2;color:white;border:none;padding:8px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer}
.picbtn.ok{background:#2E7D32}
.picfile{display:none}
.picimg{width:38px;height:38px;border-radius:6px;border:2px solid #FFB74D;object-fit:cover;display:none}
.kb{font-size:10px;color:#2E7D32;font-weight:700}
.add{width:100%;padding:16px;background:#FF9800;color:white;border:none;border-radius:12px;font-weight:800;font-size:16px;cursor:pointer;margin:15px 0}
.total{background:linear-gradient(135deg,#C62828,#D32F2F);color:white;padding:25px;border-radius:12px;text-align:center;margin-bottom:15px}
.total label{font-size:13px;opacity:.9;font-weight:700}
.total div{font-size:40px;font-weight:900;margin-top:5px}
.btn{width:100%;padding:16px;border:none;border-radius:12px;font-weight:800;font-size:16px;cursor:pointer;margin-bottom:10px}
.save{background:#2E7D32;color:white}
.print{background:#1976D2;color:white}
#rec{display:none;font-family:monospace;font-size:12px;width:80mm;margin:0 auto;background:white;padding:10px;color:black;line-height:1.4}
@media print{body *{visibility:hidden}#rec,#rec *{visibility:visible}#rec{position:absolute;left:0;top:0;width:80mm;display:block}@page{size:80mm auto;margin:0}}
</style>
</head>
<body>
<div class="box">
<button class="back" onclick="location='index.html'">← Back to Menu</button>
<h2>💸 Daily Expenses</h2>
<p class="sub">Track mo gastos araw-araw boss</p>

<div class="datebox">
<label>Date</label>
<input type="date" id="d">
</div>

<div id="list"></div>

<button class="add" id="add">+ Add Expense</button>

<div class="total">
<label>TOTAL EXPENSES TODAY</label>
<div id="tot">₱0.00</div>
</div>

<button class="btn save" id="save">💾 Save Expenses</button>
<button class="btn print" id="print">🖨️ Print Report</button>

<div id="rec"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const cfg = {
apiKey: "AIzaSyDk3ZbOXuw3PEfJzdt8AI2ueJq5yksfekE",
authDomain: "dhan-siomai-pos-fe1e5.firebaseapp.com",
projectId: "dhan-siomai-pos-fe1e5",
storageBucket: "dhan-siomai-pos-fe1e5.firebasestorage.app",
messagingSenderId: "305932123173",
appId: "1:305932123173:web:f27894a2d5e6e6ab8253cc"
};

const app = initializeApp(cfg);
const db = getFirestore(app);
const st = getStorage(app);

let c = 0;
const imgs = {};

document.getElementById('d').valueAsDate = new Date();

function addRow(){
c++;
const div = document.createElement('div');
div.className = 'card';
div.id = 'x'+c;
div.innerHTML = '<div class="r1"><input class="desc" placeholder="Description"><input type="number" class="price" placeholder="0" step="0.01"><button class="del" onclick="del('+c+')">×</button></div><div class="r2"><button class="picbtn" onclick="document.getElementById(\'f'+c+'\').click()">📷 Resibo</button><input type="file" id="f'+c+'" class="picfile" accept="image/*" capture="environment"><img id="i'+c+'" class="picimg"><span id="k'+c+'" class="kb"></span></div>';
document.getElementById('list').appendChild(div);
document.getElementById('f'+c).onchange = function(e){compress(c,e.target.files[0])};
div.querySelector('.price').oninput = calc;
}

function compress(id,file){
if(!file)return;
const r=new FileReader();
r.onload=function(e){
const img=new Image();
img.onload=function(){
const cv=document.createElement('canvas');
const cx=cv.getContext('2d');
let w=img.width,h=img.height;
if(w>800){h=h*800/w;w=800}
cv.width=w;cv.height=h;
cx.drawImage(img,0,0,w,h);
cv.toBlob(function(b){
imgs[id]=b;
document.getElementById('i'+id).src=URL.createObjectURL(b);
document.getElementById('i'+id).style.display='block';
document.getElementById('k'+id).textContent=(b.size/1024).toFixed(1)+'KB';
document.querySelector('#x'+id+'.picbtn').className='picbtn ok';
document.querySelector('#x'+id+'.picbtn').textContent='✅ Attached';
},'image/jpeg',0.7);
};
img.src=e.target.result;
};
r.readAsDataURL(file);
}

window.del=function(id){
delete imgs[id];
document.getElementById('x'+id).remove();
calc();
}

function calc(){
let s=0;
const prices=document.querySelectorAll('.price');
for(let i=0;i<prices.length;i++){
s+=parseFloat(prices[i].value)||0;
}
document.getElementById('tot').textContent='₱'+s.toFixed(2);
}

async function saveExp(){
const date=document.getElementById('d').value;
if(!date){alert('Pili ka date boss!');return;}

const items=[];
const uploads=[];

const cards=document.querySelectorAll('.card');
for(let i=0;i<cards.length;i++){
const card=cards[i];
const id=card.id.slice(1);
const desc=card.querySelector('.desc').value.trim();
const price=parseFloat(card.querySelector('.price').value)||0;
if(desc&&price>0){
const obj={desc:desc,price:price,img:''};
items.push(obj);
if(imgs[id]){
const path='expenses/'+date+'/'+Date.now()+'_'+id+'.jpg';
const p=uploadBytes(ref(st,path),imgs[id]).then(function(snap){
return getDownloadURL(snap.ref).then(function(url){obj.img=url;});
uploads.push(p);
}
}

if(items.length===0){alert('Walang nilagay boss!');return;}

if(uploads.length>0){
alert('Uploading pics... wait lang');
await Promise.all(uploads);
}

await addDoc(collection(db,'expenses'),{
date:date,
items:items,
total:parseFloat(document.getElementById('tot').textContent.slice(1)),
created:new Date()
});
alert('Saved na ✅');
}

function printExp(){
const date=document.getElementById('d').value;
let h='<div style="text-align:center;font-weight:900">SIOMAI FACTORY</div><div style="text-align:center;font-size:9px">Daily Expenses</div><div style="border-bottom:1px dashed #000;margin:4px 0"></div><div>Date: '+date+'</div><div style="border-bottom:1px dashed #000;margin:4px 0"></div>';
let t=0;
const cards=document.querySelectorAll('.card');
for(let i=0;i<cards.length;i++){
const card=cards[i];
const d=card.querySelector('.desc').value.trim();
const p=parseFloat(card.querySelector('.price').value)||0;
if(d&&p>0){
h+='<div style="display:flex;justify-content:space-between"><span>'+d+'</span><span>₱'+p.toFixed(2)+'</span></div>';
t+=p;
}
h+='<div style="border-bottom:1px dashed #000;margin:4px 0"></div><div style="display:flex;justify-content:space-between;font-weight:900"><span>TOTAL:</span><span>₱'+t.toFixed(2)+'</span></div>';
document.getElementById('rec').innerHTML=h;
document.getElementById('rec').style.display='block';
setTimeout(function(){window.print();},300);
}

document.getElementById('add').onclick=addRow;
document.getElementById('save').onclick=saveExp;
document.getElementById('print').onclick=printExp;

addRow();
</script>
</body>
</html>
