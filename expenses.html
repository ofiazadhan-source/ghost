<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Expenses - DHAN SIOMAI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
body{background:#FFF8E1;padding:15px}
.header{background:#C62828;color:white;padding:15px;border-radius:12px;display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}
.header h1{font-size:18px}
.back-btn{color:#C62828;background:white;text-decoration:none;font-weight:600;padding:8px 14px;border-radius:8px;font-size:13px}
.card{background:white;border-radius:16px;padding:20px;margin-bottom:15px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
.card h3{color:#C62828;margin-bottom:15px;font-size:16px}
.input-group{margin-bottom:12px}
.input-group label{display:block;font-size:13px;color:#666;font-weight:600;margin-bottom:5px}
.input-group input,.input-group textarea{width:100%;padding:12px;border:2px solid #FFCDD2;border-radius:10px;font-size:15px}
.input-group input[type="file"]{padding:8px;border:2px dashed #C62828;cursor:pointer}
.preview-img{max-width:100%;max-height:150px;margin-top:8px;border-radius:8px;border:2px solid #C62828;display:none}
.btn-save{width:100%;padding:15px;background:#2E7D32;color:white;border:none;border-radius:12px;font-weight:800;font-size:16px;cursor:pointer}
.btn-save:disabled{background:#ccc;cursor:not-allowed}
.total-box{background:#FFEBEE;border:2px solid #C62828;border-radius:12px;padding:15px;text-align:center;margin-bottom:15px}
.total-box h4{color:#C62828;font-size:13px;margin-bottom:5px}
.total-box p{font-size:28px;font-weight:900;color:#C62828}
.exp-card{background:#FFF5F5;border:2px solid #FFCDD2;border-radius:12px;padding:12px;margin-bottom:10px}
.exp-head{display:flex;justify-content:space-between;margin-bottom:8px}
.exp-desc{font-weight:700;color:#C62828;font-size:14px}
.exp-amt{font-weight:800;color:#C62828;font-size:18px}
.exp-date{font-size:11px;color:#999;margin-bottom:5px}
.exp-receipt{margin-top:8px}
.exp-receipt img{width:100%;max-width:200px;border-radius:8px;border:2px solid #FFCDD2;cursor:pointer}
.loading{text-align:center;padding:40px;color:#666}
.size-info{font-size:11px;color:#2E7D32;margin-top:5px;font-weight:600}
</style>
</head>
<body>
<div class="header">
<h1>💸 Daily Expenses</h1>
<a href="index.html" class="back-btn">← Back</a>
</div>

<div class="card">
<h3>➕ Add Expense</h3>
<div class="input-group">
<label>Date</label>
<input type="date" id="expDate">
</div>
<div class="input-group">
<label>Description / Ginastos sa ano?</label>
<input type="text" id="expDesc" placeholder="Hal: Gas, Plastic, Rent...">
</div>
<div class="input-group">
<label>Amount ₱</label>
<input type="number" id="expAmount" placeholder="0">
</div>
<div class="input-group">
<label>Receipt Proof - Picture</label>
<input type="file" id="expReceipt" accept="image/*" onchange="compressAndPreview(event)">
<img id="receiptPreview" class="preview-img">
<div id="sizeInfo" class="size-info"></div>
</div>
<button class="btn-save" id="saveBtn" onclick="saveExpense()">Save Expense</button>
</div>

<div class="total-box">
<h4>Total Expenses Today</h4>
<p id="totalToday">₱0</p>
</div>

<div class="card">
<h3>📋 Expense List Today</h3>
<div id="expList" class="loading">Loading...</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDk3ZbOXuw3PEfJzdt8AI2ueJq5yksfekE",
authDomain: "dhan-siomai-pos-fe1e5.firebaseapp.com",
projectId: "dhan-siomai-pos-fe1e5",
storageBucket: "dhan-siomai-pos-fe1e5.firebasestorage.app",
messagingSenderId: "305932123173",
appId: "1:305932123173:web:f27894a2d5e6e6ab8253cc"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let receiptImage = '';

// Auto set today
let d = new Date();
let today = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
document.getElementById('expDate').value = today;

// 🔥 AUTO COMPRESS TO MAX 250KB
window.compressAndPreview = (event)=>{
const file = event.target.files[0];
if(!file) return;

const reader = new FileReader();
reader.onload = function(e){
const img = new Image();
img.onload = function(){
const canvas = document.createElement('canvas');
let width = img.width;
let height = img.height;
const maxWidth = 800; // max width 800px

if(width > maxWidth){
height = (maxWidth / width) * height;
width = maxWidth;
}

canvas.width = width;
canvas.height = height;
const ctx = canvas.getContext('2d');
ctx.drawImage(img, 0, 0, width, height);

// Compress loop hanggang <250KB
let quality = 0.8;
let compressedData = canvas.toDataURL('image/jpeg', quality);

while(compressedData.length > 250000 && quality > 0.1){
quality -= 0.05;
compressedData = canvas.toDataURL('image/jpeg', quality);
}

receiptImage = compressedData;
document.getElementById('receiptPreview').src = receiptImage;
document.getElementById('receiptPreview').style.display = 'block';

// Show size info
const sizeKB = Math.round(compressedData.length / 1024);
document.getElementById('sizeInfo').innerText = '✓ Compressed: ' + sizeKB + 'KB / Max 250KB';
if(sizeKB > 250){
document.getElementById('sizeInfo').style.color = '#C62828';
document.getElementById('sizeInfo').innerText += ' - Sobrang laki pa rin!';
}
};
img.src = e.target.result;
};
reader.readAsDataURL(file);
}

window.saveExpense = async ()=>{
const date = document.getElementById('expDate').value;
const desc = document.getElementById('expDesc').value.trim();
const amount = parseFloat(document.getElementById('expAmount').value);

if(!date ||!desc ||!amount || amount<=0){
alert('Kumpletuhin mo muna boss! Date, Description, at Amount required.');
return;
}

if(receiptImage && receiptImage.length > 1000000){
alert('Sobrang laki pa rin ng picture boss! 1MB max lang si Firebase. Try mo mas mababang quality.');
return;
}

const btn = document.getElementById('saveBtn');
btn.disabled = true;
btn.innerText = 'Saving...';

try{
await addDoc(collection(db,"daily_expenses"),{
date: date,
desc: desc,
amount: amount,
receipt: receiptImage,
timestamp: new Date()
});

alert('✓ Saved! Na-record na expense mo boss.');
document.getElementById('expDesc').value = '';
document.getElementById('expAmount').value = '';
document.getElementById('expReceipt').value = '';
document.getElementById('receiptPreview').style.display = 'none';
document.getElementById('sizeInfo').innerText = '';
receiptImage = '';

loadExpenses();

}catch(e){
alert('Error: '+e.message);
}finally{
btn.disabled = false;
btn.innerText = 'Save Expense';
}
}

async function loadExpenses(){
const expList = document.getElementById('expList');
expList.innerHTML = '<div class="loading">Loading...</div>';
let total = 0;

try{
const expQ = query(collection(db,"daily_expenses"), where("date","==",today));
const expSnap = await getDocs(expQ);

if(expSnap.empty){
expList.innerHTML = '<div class="loading">Wala pang expenses today boss</div>';
document.getElementById('totalToday').textContent = '₱0';
return;
}

let html = '';
expSnap.forEach(doc=>{
const exp = doc.data();
total += exp.amount || 0;
const receiptImg = exp.receipt? `<div class="exp-receipt"><img src="${exp.receipt}" onclick="window.open('${exp.receipt}')"></div>` : '';
html += `<div class="exp-card">
<div class="exp-date">${exp.date}</div>
<div class="exp-head">
<span class="exp-desc">${exp.desc}</span>
<span class="exp-amt">-₱${(exp.amount || 0).toLocaleString()}</span>
</div>
${receiptImg}
</div>`;
});
expList.innerHTML = html;
document.getElementById('totalToday').textContent = '₱' + total.toLocaleString();

}catch(e){
expList.innerHTML = '<div class="loading" style="color:red">Error: '+e.message+'</div>';
console.error(e);
}
}

loadExpenses();
</script>
</body>
</html>
