<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Expenses - DHAN SIOMAI</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#FFF8E1;padding:15px;min-height:100vh}
.box{max-width:500px;margin:auto;background:white;border-radius:20px;padding:20px;box-shadow:0 6px 20px rgba(0,0,0,0.12);border-top:6px solid #D32F2F}
h2{color:#D32F2F;text-align:center;margin-bottom:5px;font-size:22px;font-weight:800}
.sub{text-align:center;color:#666;font-size:12px;margin-bottom:18px}
.back{background:#757575;color:white;padding:8px 15px;border-radius:8px;text-decoration:none;font-weight:600;font-size:13px;display:inline-block;margin-bottom:15px}
.datecard{background:linear-gradient(135deg,#FFF3E0,#FFE0B2);border:2px solid #FFCC80;border-radius:12px;padding:12px;margin-bottom:18px}
.datecard label{display:block;color:#D32F2F;font-weight:800;text-align:center;font-size:13px;margin-bottom:6px}
.datecard input{width:100%;height:42px;border:2px solid #D32F2F;border-radius:8px;text-align:center;font-size:16px;font-weight:700;color:#D32F2F}
.item{background:#FFFDF7;border:2px solid #FFCC80;border-radius:12px;padding:10px;margin-bottom:10px}
.head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.num{color:#D32F2F;font-weight:800;font-size:12px}
.del{background:#C62828;color:white;border:none;width:22px;height:22px;border-radius:50%;font-size:16px;font-weight:bold;cursor:pointer}
.row{display:flex;gap:6px;margin-bottom:6px;align-items:center}
.row input{height:38px;border:2px solid #FFB74D;border-radius:8px;padding:6px 8px;font-size:13px;font-weight:600}
.desc{width:55%;color:#D32F2F}
.amt{width:25%;color:#2E7D32;text-align:center;font-size:14px;font-weight:700}
.delbtn{width:45px;height:38px;background:#C62828;color:white;border:none;border-radius:8px;font-size:18px;font-weight:800;cursor:pointer}
.cam{display:flex;gap:6px;align-items:center;border-top:1px dashed #FFCC80;padding-top:6px;margin-top:6px}
.cam button{flex:1;height:38px;background:#1976D2;color:white;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer}
.cam button.ok{background:#2E7D32}
.cam input{display:none}
.prev{width:38px;height:38px;border:2px solid #FFB74D;border-radius:6px;object-fit:cover;display:none}
.kb{font-size:10px;color:#2E7D32;font-weight:700;min-width:45px}
.addbtn{width:100%;padding:14px;background:linear-gradient(135deg,#FF9800,#F57C00);color:white;border:none;border-radius:12px;font-weight:800;font-size:15px;cursor:pointer;margin:12px 0}
.total{background:linear-gradient(135deg,#C62828,#B71C1C);color:white;border-radius:15px;padding:25px 20px;text-align:center;margin:18px 0}
.total label{font-size:12px;font-weight:700;letter-spacing:1px}
.total div{font-size:42px;font-weight:900;margin-top:6px}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn{padding:14px;border:none;border-radius:12px;font-weight:800;font-size:14px;cursor:pointer;color:white}
.save{background:#2E7D32}
.print{background:#1976D2}
</style>
</head>
<body>
<div class="box">
<a href="index.html" class="back">← Back to Menu</a>
<h2>💸 Daily Expenses</h2>
<p class="sub">DHAN SIOMAI</p>
<div class="datecard">
<label>📅 Date of Purchase</label>
<input type="date" id="date">
</div>
<div id="list"></div>
<button class="addbtn" id="add">+ Add Expense Item</button>
<div class="total">
<label>TOTAL EXPENSES TODAY</label>
<div id="total">₱0.00</div>
</div>
<div class="actions">
<button class="btn save" id="save">💾 Save to Database</button>
<button class="btn print" id="print">🖨️ Print Receipt</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig = {
apiKey: "AIzaSyDk3ZbOXuw3PEfJzdt8AI2ueJq5yksfekE",
authDomain: "dhan-siomai-pos-fe1e5.firebaseapp.com",
projectId: "dhan-siomai-pos-fe1e5",
storageBucket: "dhan-siomai-pos-fe1e5.firebasestorage.app",
messagingSenderId: "305932123173",
appId: "1:305932123173:web:f27894a2d5e6e6ab8253cc"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const st = getStorage(app);

let no = 0;
const files = {};
document.getElementById('date').valueAsDate = new Date();

function add() {
no++;
const div = document.createElement('div');
div.className = 'item';
div.id = 'i' + no;
div.innerHTML = `<div class="head"><span class="num">Item #${no}</span><button class="del" onclick="del(${no})">×</button></div><div class="row"><input class="desc" placeholder="Desc ex: Oil 1L"><input class="amt" type="number" placeholder="0.00" step="0.01"><button class="delbtn" onclick="del(${no})">×</button></div><div class="cam"><button onclick="document.getElementById('f${no}').click()">📷 Receipt</button><input type="file" id="f${no}" accept="image/*" capture="environment"><img id="p${no}" class="prev"><span id="s${no}" class="kb"></span></div>`;

document.getElementById('list').appendChild(div);

// 🔥 ULTRA COMPRESS FIXED - 500px + 0.4 quality
document.getElementById('f' + no).onchange = function(e) {
const file = e.target.files[0];
if(!file) return;
const btn = div.querySelector('.cam button');
btn.innerText = 'Compressing...';
btn.disabled = true;
const reader = new FileReader();
reader.onload = function(ev) {
const img = new Image();
img.onload = function() {
let w = img.width;
let h = img.height;
const max = 500;
if(w > h && w > max) {
h = h * max / w;
w = max;
} else if(h > max) {
w = w * max / h;
h = max;
}
const cv = document.createElement('canvas');
cv.width = w;
cv.height = h;
cv.getContext('2d').drawImage(img, 0, 0, w, h);
cv.toBlob(function(blob) {
files[no] = blob;
document.getElementById('p' + no).src = URL.createObjectURL(blob);
document.getElementById('p' + no).style.display = 'block';
document.getElementById('s' + no).innerText = Math.round(blob.size/1024) + 'KB';
btn.innerHTML = '✅ ' + Math.round(blob.size/1024) + 'KB';
btn.className = 'ok';
btn.disabled = false;
}, 'image/jpeg', 0.4);
};
img.src = ev.target.result;
};
reader.readAsDataURL(file);
};

div.querySelector('.amt').oninput = total;
}

window.del = function(id) {
delete files[id];
const el = document.getElementById('i' + id);
if(el) el.remove();
total();
};

function total() {
let sum = 0;
document.querySelectorAll('.amt').forEach(inp => {
sum += parseFloat(inp.value) || 0;
});
document.getElementById('total').innerText = '₱' + sum.toFixed(2);
}

async function save() {
const date = document.getElementById('date').value;
if(!date) {
alert('Pili ka muna date boss!');
return;
}

const items = [];
document.querySelectorAll('.item').forEach((card, idx) => {
const desc = card.querySelector('.desc').value.trim();
const amt = parseFloat(card.querySelector('.amt').value) || 0;
if(desc && amt > 0) {
items.push({description: desc, amount: amt, receipt: ''});
}
});

if(items.length === 0) {
alert('Add ka muna item boss!');
return;
}

const btn = document.getElementById('save');
btn.disabled = true;
btn.innerText = 'Saving...';

try {
for(let i = 0; i < items.length; i++) {
const card = document.querySelectorAll('.item')[i];
const id = card.id.slice(1);
if(files[id]) {
const path = 'receipts/' + date + '/' + Date.now() + '_' + id + '.jpg';
const snap = await uploadBytes(ref(st, path), files[id]);
items[i].receipt = await getDownloadURL(snap.ref);
}
}

await addDoc(collection(db, 'daily_expenses'), {
date: date,
items: items,
total: parseFloat(document.getElementById('total').innerText.slice(1)),
timestamp: serverTimestamp()
});

alert('✅ Saved! 15-25KB lang per image');
btn.disabled = false;
btn.innerText = '💾 Save to Database';
document.getElementById('list').innerHTML = '';
no = 0;
Object.keys(files).forEach(k => delete files[k]);
total();
add();

} catch(e) {
alert('Error: ' + e.message);
btn.disabled = false;
btn.innerText = '💾 Save to Database';
}
}

function print() {
const date = document.getElementById('date').value;
let w = window.open('', '', 'width=300');
let html = '<h3 style="text-align:center">DHAN SIOMAI</h3><div style="text-align:center;font-size:12px">Expenses</div><hr>Date: ' + date + '<hr>';
document.querySelectorAll('.item').forEach(card => {
const d = card.querySelector('.desc').value.trim();
const a = parseFloat(card.querySelector('.amt').value) || 0;
if(d && a > 0) html += d + '........ ₱' + a.toFixed(2) + '<br>';
});
html += '<hr><b>Total: ₱' + document.getElementById('total').innerText.slice(1) + '</b>';
w.document.write(html);
w.print();
w.close();
}

document.getElementById('add').onclick = add;
document.getElementById('save').onclick = save;
document.getElementById('print').onclick = print;
add();
</script>
</body>
  </html>
