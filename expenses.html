<!DOCTYPE html>
<html>
<head>
  <title>Expenses - DHAN SIOMAI</title>
  <style>
    body { font-family: Arial; padding: 15px; }
    .card { background:#fff3cd; padding:15px; border-radius:10px; margin-bottom:15px }
    .total-box { background:#c62828; color:white; padding:20px; border-radius:12px; text-align:center; margin-bottom:15px }
    input, select, button { width:100%; padding:8px; margin-top:5px; border-radius:8px; border:1px solid #ccc; box-sizing:border-box }
    button { background:#c62828; color:white; border:none; cursor:pointer }
    table { width:100%; border-collapse:collapse; margin-top:15px }
    th { background:#c62828; color:white; padding:8px }
    td { padding:8px; border-bottom:1px solid #ddd }
    td.amount { color:green; font-weight:bold }
  </style>
</head>
<body>

<h2 id="pageTitle">Monthly Expenses - DHAN SIOMAI</h2>

<!-- Dropdown Daily/Monthly -->
<div class="card">
  <label><b>Tipo ng Expense</b></label>
  <select id="expenseType" onchange="toggleType()">
    <option value="monthly">Monthly</option>
    <option value="daily">Daily</option>
  </select>

  <label><b>Select Month & Year</b></label>
  <select id="month"><option>June</option><option>July</option></select>
  <select id="year"><option>2026</option><option>2025</option></select>

  <label><b>Date</b></label>
  <input type="date" id="date">

  <label><b>Description</b></label>
  <input type="text" id="desc" placeholder="Hal: Pamasahe, Yelo">

  <label><b>Amount</b></label>
  <input type="number" id="amount" placeholder="0.00" step="0.01">

  <button onclick="addExpense()">Add Expense</button>
</div>

<!-- Total -->
<div class="total-box">
  <div id="totalLabel">TOTAL EXPENSES THIS MONTH</div>
  <h1 id="totalAmount">₱0.00</h1>
</div>

<!-- Table -->
<table>
  <thead>
    <tr>
      <th>Date</th>
      <th>Description</th>
      <th>Amount</th>
    </tr>
  </thead>
  <tbody id="expenseTable"></tbody>
</table>

<script>
// Store data sa browser lang muna. Pag refresh mawawala.
let dailyData = [];
let monthlyData = [];

document.getElementById('date').valueAsDate = new Date();

function toggleType() {
  let type = document.getElementById('expenseType').value;
  if(type === 'daily') {
    document.getElementById('pageTitle').innerText = 'Daily Expenses - DHAN SIOMAI';
    document.getElementById('totalLabel').innerText = 'TOTAL TODAY';
  } else {
    document.getElementById('pageTitle').innerText = 'Monthly Expenses - DHAN SIOMAI';
    document.getElementById('totalLabel').innerText = 'TOTAL EXPENSES THIS MONTH';
  }
  renderTable();
}

function addExpense() {
  let type = document.getElementById('expenseType').value;
  let date = document.getElementById('date').value;
  let desc = document.getElementById('desc').value;
  let amount = parseFloat(document.getElementById('amount').value);

  if(!date || !desc || isNaN(amount)) {
    alert('Pakilagay lahat: Date, Description, Amount');
    return;
  }

  let expense = {date, desc, amount};
  
  if(type === 'daily') dailyData.push(expense);
  else monthlyData.push(expense);

  // Clear inputs
  document.getElementById('desc').value = '';
  document.getElementById('amount').value = '';
  
  renderTable();
}

function renderTable() {
  let type = document.getElementById('expenseType').value;
  let data = type === 'daily' ? dailyData : monthlyData;
  let tbody = document.getElementById('expenseTable');
  tbody.innerHTML = '';
  
  let total = 0;
  data.forEach(item => {
    total += item.amount;
    tbody.innerHTML += `
      <tr>
        <td>${item.date}</td>
        <td>${item.desc}</td>
        <td class="amount">₱${item.amount.toFixed(2)}</td>
      </tr>
    `;
  });
  
  document.getElementById('totalAmount').innerText = '₱' + total.toFixed(2);
}
</script>

</body>
</html>
