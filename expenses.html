<!DOCTYPE html>
<html>
<head>
  <title>Dhan Siomai - Expenses</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; padding: 20px; background: #f5f5f5; }
   .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; }
    input, select, button { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; }
    button { background: #ff6b6b; color: white; border: none; cursor: pointer; font-weight: bold; }
    button:hover { background: #ff5252; }
    table { width: 100%; margin-top: 20px; border-collapse: collapse; }
    th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
    th { background: #ff6b6b; color: white; }
    img { max-width: 80px; border-radius: 5px; }
   .note { font-size: 12px; color: #666; margin-top: 5px; }
  </style>
</head>
<body>
  <div class="container">
    <h2>📝 Add Expense</h2>
    <form id="expenseForm">
      <input type="text" id="itemName" placeholder="Item name" required>
      <input type="number" id="amount" placeholder="Amount" step="0.01" required>
      <select id="category" required>
        <option value="">Select category</option>
        <option value="Ingredients">Ingredients</option>
        <option value="Supplies">Supplies</option>
        <option value="Utilities">Utilities</option>
        <option value="Other">Other</option>
      </select>
      <input type="file" id="receiptFile" accept="image/*" required>
      <div class="note">Max 500KB lang boss. I-compress mo muna kung malaki</div>
      <button type="submit">Save Expense</button>
    </form>

    <h2>📋 Expense List</h2>
    <table id="expenseTable">
      <thead>
        <tr>
          <th>Date</th>
          <th>Item</th>
          <th>Amount</th>
          <th>Category</th>
          <th>Receipt</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "dhan-siomai-pos-fe1e5.firebaseapp.com",
      projectId: "dhan-siomai-pos-fe1e5",
      storageBucket: "dhan-siomai-pos-fe1e5.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const form = document.getElementById('expenseForm');
    const itemName = document.getElementById('itemName');
    const amount = document.getElementById('amount');
    const category = document.getElementById('category');
    const receiptFile = document.getElementById('receiptFile');
    const tbody = document.querySelector('#expenseTable tbody');

    // SAVE EXPENSE - BASE64 VERSION
    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const file = receiptFile.files[0];
      if (!file) {
        alert('Pili ka muna ng receipt image boss');
        return;
      }

      if (file.size > 500000) {
        alert('Masyado malaki boss. 500KB max lang. Compress mo muna sa phone');
        return;
      }

      const reader = new FileReader();

      reader.onload = async function(e) {
        const base64String = e.target.result;

        await addDoc(collection(db, "expenses"), {
          item: itemName.value,
          amount: parseFloat(amount.value),
          category: category.value,
          date: new Date(),
          receipt: base64String,
          createdBy: auth.currentUser.uid
        });

        alert('✅ Saved! Walang CORS error to');
        form.reset();
        loadExpenses();
      };

      reader.readAsDataURL(file);
    });

    // LOAD EXPENSES
    async function loadExpenses() {
      tbody.innerHTML = '';
      const q = query(collection(db, "expenses"), orderBy("date", "desc"));
      const snapshot = await getDocs(q);

      snapshot.forEach(doc => {
        const data = doc.data();
        const date = data.date.toDate().toLocaleDateString();
        tbody.innerHTML += `
          <tr>
            <td>${date}</td>
            <td>${data.item}</td>
            <td>₱${data.amount.toFixed(2)}</td>
            <td>${data.category}</td>
            <td><img src="${data.receipt}" alt="receipt"></td>
          </tr>
        `;
      });
    }

    onAuthStateChanged(auth, user => {
      if (user) loadExpenses();
      else alert('Login ka muna boss');
    });
  </script>
</body>
</html>
