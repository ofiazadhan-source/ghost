<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Expenses - DHAN SIOMAI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,sans-serif}
body{background:#FFF8E1;padding:15px;min-height:100vh;padding-bottom:150px}
.box{max-width:500px;margin:auto;background:white;border-radius:20px;padding:20px 20px 120px 20px;box-shadow:0 6px 20px rgba(0,0,0,0.12);border-top:6px solid #D32F2F}
h2{color:#D32F2F;text-align:center;margin-bottom:5px;font-size:22px}
.sub{text-align:center;color:#666;font-size:12px;margin-bottom:18px}
.back{background:#757575;color:white;border:none;padding:8px 15px;border-radius:8px;cursor:pointer;margin-bottom:15px;font-weight:600;font-size:13px;text-decoration:none;display:inline-block}
.datecard{background:linear-gradient(135deg,#FFF3E0,#FFE0B2);border:2px solid #FFCC80;border-radius:12px;padding:12px;margin-bottom:18px}
.datecard label{display:block;font-weight:800;color:#D32F2F;margin-bottom:6px;text-align:center;font-size:13px}
.datecard input{font-size:16px;padding:10px;border:2px solid #2E7D32;border-radius:8px;font-weight:700;color:#D32F2F;text-align:center;width:100%;height:42px;background:#F1F8E9}
.item{background:#FFFDF7;border:2px solid #FFCC80;border-radius:12px;padding:10px;margin-bottom:10px}
.head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.num{font-weight:800;color:#D32F2F;font-size:12px}
.del{background:#C62828;color:white;border:none;border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:16px;font-weight:bold;line-height:1}
.row{display:flex;gap:6px;margin-bottom:6px;align-items:center}
.row input{border:2px solid #FFB74D;border-radius:8px;padding:6px 8px;font-size:13px;font-weight:600;outline:none;height:38px}
.desc{width:55%;color:#D32F2F}
.amt{width:25%;color:#2E7D32;text-align:center;font-size:14px;font-weight:700}
.delbtn{width:20%;max-width:45px;background:#C62828;color:white;border:none;border-radius:8px;height:38px;font-size:18px;font-weight:800;cursor:pointer}
.cam{display:flex;gap:6px;align-items:center;padding-top:6px;border-top:1px dashed #FFCC80;margin-top:6px}
.cam button{flex:1;background:#1976D2;color:white;border:none;padding:8px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer}
.cam button.ok{background:#2E7D32}
.cam input{display:none}
.prev{width:38px;height:38px;border-radius:6px;border:2px solid #FFB74D;object-fit:cover;display:none}
.kb{font-size:10px;color:#2E7D32;font-weight:700;min-width:45px}
.addbtn{width:100%;padding:14px;background:linear-gradient(135deg,#FF9800,#F57C00);color:white;border:none;border-radius:12px;font-weight:800;font-size:15px;cursor:pointer;margin:12px 0}
.total{background:linear-gradient(135deg,#C62828,#B71C1C);color:white;border-radius:15px;padding:25px 20px;text-align:center;margin:18px 0}
.total label{font-size:12px;opacity:0.9;font-weight:700;letter-spacing:1px}
.total div{font-size:42px;font-weight:900;margin-top:6px}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;position:relative;z-index:10;margin-bottom:30px}
.btn{padding:14px;border:none;border-radius:12px;font-weight:800;font-size:14px;cursor:pointer;position:relative;z-index:11}
.save{background:#2E7D32;color:white}
.print{background:#1976D2;color:white}
</style>
</head>
<body>
<div class="box">
<a href="index.html" class="back">← Back to Menu</a>
<h2>💸 Daily Expenses</h2>
<p class="sub">DHAN SIOMAI</p>
<div class="datecard">
<label>📅 Date of Purchase</label>
<input type="date" id="date" required>
</div>
<div id="list"></div>
<button class="addbtn" id="add">+ Add Expense Item</button>
<div class="total">
<label>TOTAL EXPENSES TODAY</label>
<div id="total">₱0.00</div>
</div>
<div class="actions">
<button class="btn save" id="save">💾 Save to Database</button>
<button class="btn print" id="print">🖨️ Print Receipt</button>
</div>
</div>
<script type="module">
import { db } from './firebase-config.js';
import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

let no = 0;
const files = {};

// 🔥 FORCE SET DATE - kahit di mag-load JS may date na
document.getElementById('date').valueAsDate = new Date();

// 🔥 AUTO COMPRESS
async function compressImageAuto(file) {
return new Promise((resolve) => {
const reader = new FileReader();
reader.readAsDataURL(file);
reader.onload = (event) => {
const img = new Image();
img.src = event.target.result;
img.onload = () => {
let quality = 0.8;
let maxWidth = 600;
let canvas = document.createElement('canvas');
let ctx = canvas.getContext('2d');
function tryCompress() {
let width = img.width;
let height = img.height;
if(width > maxWidth) {
height = (maxWidth / width) * height;
width = maxWidth;
}
canvas.width = width;
canvas.height = height;
ctx.drawImage(img, 0, 0, width, height);
let base64 = canvas.toDataURL('image/jpeg', quality);
let sizeKB = Math.round(base64.length / 1024);
if(sizeKB > 900 && quality > 0.3) {
quality -= 0.1;
tryCompress();
} else if(sizeKB > 900 && maxWidth > 300) {
maxWidth -= 50;
quality = 0.8;
tryCompress();
} else {
resolve(base64);
}
tryCompress();
}
});
});

function add() {
no++;
const div = document.createElement('div');
div.className = 'item';
div.id = 'i' + no;
div.innerHTML = `
<div class="head">
<span class="num">Item #${no}</span>
<button class="del" onclick="del(${no})">×</button>
</div>
<div class="row">
<input class="desc" placeholder="Desc ex: Mantika 1L">
<input type="number" class="amt" placeholder="0.00" step="0.01" inputmode="decimal">
<button class="delbtn" onclick="del(${no})">×</button>
</div>
<div class="cam">
<button onclick="document.getElementById('f${no}').click()">📷 Receipt</button>
<input type="file" id="f${no}" accept="image/*" capture="environment">
<img id="p${no}" class="prev">
<span id="s${no}" class="kb"></span>
</div>`;
document.getElementById('list').appendChild(div);

document.getElementById('f' + no).onchange = async function(e) {
const file = e.target.files[0];
if(!file) return;
const btn = div.querySelector('.cam button');
btn.innerText = 'Compressing...';
btn.disabled = true;
files[no] = await compressImageAuto(file);
document.getElementById('p' + no).src = files[no];
document.getElementById('p' + no).style.display = 'block';
document.getElementById('s' + no).innerText = Math.round(files[no].length/1024) + 'KB';
btn.innerHTML = '✅ Attached';
btn.className = 'ok';
btn.disabled = false;
};

div.querySelector('.amt').oninput = total;
}

window.del = function(id) {
delete files[id];
const el = document.getElementById('i' + id);
if(el) el.remove();
total();
}

function total() {
let sum = 0;
document.querySelectorAll('.amt').forEach(function(inp) {
sum += parseFloat(inp.value) || 0;
});
document.getElementById('total').innerText = '₱' + sum.toFixed(2);
}

async function save() {
const date = document.getElementById('date').value;
if(!date) {
alert('Pili ka muna date boss!');
return;
}

const items = [];
document.querySelectorAll('.item').forEach(card => {
const id = card.id.replace('i', '');
const desc = card.querySelector('.desc').value.trim();
const amt = parseFloat(card.querySelector('.amt').value) || 0;
if(desc && amt > 0) {
items.push({
description: desc,
amount: amt,
receipt: files[id] || ''
});
}
});

if(items.length === 0) {
alert('Add at least 1 expense item boss!');
return;
}

const totalAmount = parseFloat(document.getElementById('total').innerText.replace('₱',''));
const btn = document.getElementById('save');
btn.disabled = true;
btn.innerText = 'Saving...';

try {
await addDoc(collection(db, 'daily_expenses'), {
date: date,
timestamp: serverTimestamp(),
total: totalAmount,
items: items,
receiptNo: 'EXP-' + Date.now().toString().slice(-6)
});

alert('✅ Saved successfully boss!');
btn.disabled = false;
btn.innerText = '💾 Save to Database';
document.getElementById('list').innerHTML = '';
no = 0;
Object.keys(files).forEach(k => delete files[k]);
total();
add();

} catch(e) {
alert('SAVE ERROR: ' + e.message);
console.error('Error details:', e);
btn.disabled = false;
btn.innerText = '💾 Save to Database';
}
}

function print() {
const date = document.getElementById('date').value;
let w = window.open('', '', 'width=300,height=600');
let html = '<h3 style="text-align:center">DHAN SIOMAI</h3><div style="text-align:center;font-size:12px">Daily Expenses Receipt</div><hr>Date: ' + date + '<br>Time: ' + new Date().toLocaleTimeString() + '<hr>';
document.querySelectorAll('.item').forEach(function(card) {
const d = card.querySelector('.desc').value.trim();
const a = parseFloat(card.querySelector('.amt').value) || 0;
if(d && a > 0) {
html += d + ' x1........ ₱' + a.toFixed(2) + '<br>';
}
});
html += '<hr><b>TOTAL: ₱' + document.getElementById('total').innerText.replace('₱','') + '</b><br><center>Thank you boss!</center>';
w.document.write(html);
w.print();
w.close();
}

document.getElementById('add').onclick = add;
document.getElementById('save').onclick = save;
document.getElementById('print').onclick = print;
add();
</script>
</body>
</html>
