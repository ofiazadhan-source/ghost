<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tindahan ni Aling Gina - Menu</title>
<style>
* {margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', Tahoma, sans-serif;}
body {background:#FFF8E1; padding:15px; min-height:100vh;}
.container {
max-width:500px;
margin:50px auto;
background:white;
border-radius:20px;
padding:30px 20px;
box-shadow:0 6px 20px rgba(0,0,0,0.12);
border-top:6px solid #D32F2F;
}
h2 {
color:#D32F2F;
text-align:center;
margin-bottom:8px;
font-size:24px;
}
.subtitle {
text-align:center;
color:#666;
font-size:13px;
margin-bottom:30px;
}
.menu-grid {
display:grid;
grid-template-columns:1fr;
gap:20px;
}
.menu-btn {
padding:40px 10px;
border:none;
border-radius:15px;
background:linear-gradient(135deg, #FFCC80, #FFB74D);
color:#B71C1C;
font-weight:800;
font-size:18px;
cursor:pointer;
text-align:center;
line-height:1.5;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
.menu-btn:active {
transform:scale(0.95);
background:#FFA726;
}
.footer {
text-align:center;
color:#999;
font-size:11px;
margin-top:30px;
}
</style>
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#D32F2F">
  
</head>
<body>
<div class="container">
<h2>📋 Main Menu</h2>
<p class="subtitle">Welcome to Dhan's POS,</p>
<div class="menu-grid">
<button class="menu-btn" onclick="window.location='pos-alinggina.html'">
Tindahan ni<br>Aling Gina
</button>
</div>
<p class="footer">Property of Dhan Ofiaza Velasco</p>
</div>
</body>
</html>
