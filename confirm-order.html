<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirm Orders - DHAN SIOMAI</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body{font-family:'Poppins',sans-serif;background:#FFF8E1;padding:15px;}
.order{
background:white;padding:15px;border-radius:10px;margin-bottom:15px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);border-left:5px solid #FFA000;
}
.btn{
background:#D32F2F;color:white;border:none;padding:10px 20px;
border-radius:8px;font-weight:600;cursor:pointer;margin-top:10px;
}
</style>
</head>
<body>
<h3>Pending Orders</h3>
<div id="orders">Loading...</div>

<script>
const firebaseConfig = {
apiKey: "AIzaSyDk3ZbOXuw3PEfJzdt8AI2ueJq5yksfekE",
authDomain: "dhan-siomai-pos-fe1e5.firebaseapp.com",
projectId: "dhan-siomai-pos-fe1e5"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

loadPending();

async function loadPending(){
const snap = await db.collection('dhan-sales')
.where('status','==','Pending')
.orderBy('timestamp','desc').get();

let html='';
snap.forEach(doc=>{
let o = doc.data();
html += `<div class="order">
<strong>${o.customerName}</strong><br>
Phone: ${o.customerPhone}<br>
Address: ${o.customerAddress}<br>
Total: ₱${o.total}<br>
Ref No: ${o.gcashRef}<br>
<button class="btn" onclick="confirmOrder('${doc.id}')">Confirm Paid</button>
</div>`;
});
document.getElementById('orders').innerHTML = html || 'No pending orders';
}

async function confirmOrder(id){
if(!confirm('Confirm this payment? Stock will be deducted.')) return;

const orderRef = db.collection('dhan-sales').doc(id);
const orderSnap = await orderRef.get();
const order = orderSnap.data();

// Update status to Paid
await orderRef.update({status:'Paid', paidAt:firebase.firestore.FieldValue.serverTimestamp()});

// Now deduct stock
for(let i of order.items){
let ref = db.collection('dhan-pos-web').doc(i.id);
let snap = await ref.get();
let newStock = snap.data().stock - i.qty;
await ref.update({stock:newStock});
}

alert('Order confirmed! Stock updated.');
loadPending();
}
</script>
</body>
</html>
