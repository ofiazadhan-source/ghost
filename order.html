<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order - DHAN SIOMAI POS</title>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* {margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif;}
body {background:#f5f5f5; padding:10px;}
.header {text-align:center; margin-bottom:15px;}
.header h1 {color:#ff6b35; font-size:22px;}
.header a {color:#ff6b35; text-decoration:none; font-size:14px; margin:0 10px;}
.product-grid {display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:15px;}
.product {background:white; padding:10px; border-radius:10px; box-shadow:0 2px 5px rgba(0,0,0,0.1); text-align:center;}
.product img {width:100%; height:120px; object-fit:cover; border-radius:8px; margin-bottom:8px;}
.product-name {font-size:14px; font-weight:600; margin-bottom:5px;}
.product-price {color:#ff6b35; font-weight:700; margin-bottom:5px;}
.product-stock {font-size:12px; color:#666; margin-bottom:8px;}
.qty-input {width:100%; padding:8px; border:1px solid #ddd; border-radius:6px; font-size:16px; text-align:center;}
.cart-box {background:white; padding:15px; border-radius:10px; box-shadow:0 2px 5px rgba(0,0,0,0.1); position:sticky; bottom:10px;}
.cart-item {display:flex; justify-content:space-between; padding:5px 0; font-size:14px;}
.total {font-size:18px; font-weight:700; text-align:right; margin-top:10px;}
.btn-checkout {width:100%; background:#ff6b35; color:white; border:none; padding:12px; border-radius:8px; font-weight:700; font-size:16px; margin-top:10px;}
.modal {display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center;}
.modal.show {display:flex;}
.modal-content {background:white; padding:20px; border-radius:12px; width:90%; max-width:400px;}
.modal h3 {margin-bottom:15px; text-align:center;}
.payment-btn {width:100%; padding:12px; margin-bottom:10px; border:none; border-radius:8px; font-size:16px; font-weight:600; cursor:pointer;}
.btn-cash {background:#4CAF50; color:white;}
.btn-gcash {background:#007DFF; color:white;}
.btn-cod {background:#FF9800; color:white;}
.btn-close {width:100%; padding:10px; background:#666; color:white; border:none; border-radius:8px; margin-top:10px;}
.input-box {width:100%; padding:10px; margin:10px 0; border:1px solid #ddd; border-radius:8px; font-size:16px;}
.modal-section {display:none;}
.modal-section.active {display:block;}
.loading {text-align:center; padding:40px; color:#666;}
</style>
</head>
<body>

<div class="header">
  <h1>🔥 DHAN SIOMAI POS</h1>
  <a href="admin.html">⚙️ Admin</a>
  <a href="viewer.html">📋 Viewer</a>
</div>

<div id="productGrid" class="product-grid"><div class="loading">Loading products...</div></div>

<div class="cart-box">
  <h3>🛒 Cart</h3>
  <div id="cartList"></div>
  <div class="total" id="totalPrice">Total: ₱0</div>
  <button class="btn-checkout" onclick="openPaymentModal()">💳 Checkout</button>
</div>

<div class="modal" id="paymentModal">
  <div class="modal-content">
    <div class="modal-section active" id="step1">
      <h3>Piliin ang Payment Method</h3>
      <button class="payment-btn btn-cash" onclick="selectPayment('Cash')">💵 Cash</button>
      <button class="payment-btn btn-gcash" onclick="selectPayment('GCash')">📱 GCash</button>
      <button class="payment-btn btn-cod" onclick="selectPayment('COD')">🚚 COD</button>
      <button class="btn-close" onclick="closeModal()">Cancel</button>
    </div>

    <div class="modal-section" id="step2-cash">
      <h3>💵 Cash Payment</h3>
      <p>Total: <strong id="cashTotal">₱0</strong></p>
      <input type="number" id="cashAmount" class="input-box" placeholder="Enter Cash Amount">
      <button class="payment-btn btn-cash" onclick="proceedCash()">Confirm</button>
      <button class="btn-close" onclick="backToStep1()">Back</button>
    </div>

    <div class="modal-section" id="step2-gcash">
      <h3>📱 GCash Payment</h3>
      <input type="text" id="gcashName" class="input-box" placeholder="GCash Account Name">
      <input type="text" id="gcashNumber" class="input-box" placeholder="GCash Number">
      <button class="payment-btn btn-gcash" onclick="proceedGCash()">Confirm</button>
      <button class="btn-close" onclick="backToStep1()">Back</button>
    </div>

    <div class="modal-section" id="step2-cod">
      <h3>🚚 COD Payment</h3>
      <p>Customer will pay ₱<span id="codTotal">0</span> upon delivery</p>
      <input type="text" id="codName" class="input-box" placeholder="Customer Name">
      <input type="text" id="codAddress" class="input-box" placeholder="Delivery Address">
      <input type="text" id="codPhone" class="input-box" placeholder="Phone Number">
      <button class="payment-btn btn-cod" onclick="proceedCOD()">Confirm</button>
      <button class="btn-close" onclick="backToStep1()">Back</button>
    </div>
  </div>
</div>

<script>
// ========== PALITAN MO TO NG CONFIG MO ==========
const firebaseConfig = {
  apiKey: "PASTE_API_KEY_DITO",
  authDomain: "PASTE_AUTH_DOMAIN_DITO",
  projectId: "PASTE_PROJECT_ID_DITO",
  storageBucket: "PASTE_STORAGE_BUCKET_DITO",
  messagingSenderId: "PASTE_MESSAGING_SENDER_ID_DITO",
  appId: "PASTE_APP_ID_DITO"
};
// ================================================

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let products = {};
let productsArray = [];
let cart = {};
let totalAmount = 0;

window.onload = loadProducts;

async function loadProducts() {
  try {
    const snap = await db.collection("product").get();
    products = {};
    productsArray = [];

    snap.forEach(doc => {
      let p = doc.data();
      p.id = doc.id;
      productsArray.push(p);
      if (!products[p.category]) products[p.category] = [];
      products[p.category].push(p);
    });

    renderProducts();
  } catch (error) {
    console.error("Error loading products:", error);
    document.getElementById('productGrid').innerHTML = '<div class="loading">Error loading products.</div>';
  }
}

function renderProducts() {
  if (productsArray.length === 0) {
    document.getElementById('productGrid').innerHTML = '<div class="loading">No products yet.</div>';
    return;
  }

  let html = '';
  Object.keys(products).forEach(cat => {
    products[cat].forEach(prod => {
      if(prod.stock > 0) {
        let imgTag = prod.imageUrl? `<img src="${prod.imageUrl}" alt="${prod.name}" onerror="this.src='https://via.placeholder.com/300x300/ff6b35/ffffff?text=Siomai'">` : '';
        html += `
        <div class="product">
          ${imgTag}
          <div class="product-name">${prod.name}</div>
          <div class="product-price">₱${prod.price}</div>
          <div class="product-stock">Stock: ${prod.stock}</div>
          <input type="number" min="0" max="${prod.stock}" placeholder="Qty" class="qty-input" onchange="updateCart('${prod.id}', this.value)">
        </div>`;
      }
    });
  });
  document.getElementById('productGrid').innerHTML = html;
}

function updateCart(productId, qty) {
  qty = parseInt(qty) || 0;
  if(qty > 0) {
    cart[productId] = qty;
  } else {
    delete cart[productId];
  }
  renderCart();
}

function renderCart() {
  let html = '';
  totalAmount = 0;
  Object.keys(cart).forEach(productId => {
    let qty = cart[productId];
    let prod = productsArray.find(p => p.id === productId);
    if(prod) {
      let subtotal = prod.price * qty;
      totalAmount += subtotal;
      html += `<div class="cart-item"><span>${prod.name} x${qty}</span><span>₱${subtotal}</span></div>`;
    }
  });
  document.getElementById('cartList').innerHTML = html;
  document.getElementById('totalPrice').textContent = 'Total: ₱' + totalAmount;
}

function openPaymentModal() {
  if(Object.keys(cart).length === 0) {
    alert("Wala pang items sa cart!");
    return;
  }
  document.getElementById('paymentModal').classList.add('show');
  document.getElementById('cashTotal').textContent = '₱' + totalAmount;
  document.getElementById('codTotal').textContent = totalAmount;
}

function closeModal() {
  document.getElementById('paymentModal').classList.remove('show');
  backToStep1();
}

function backToStep1() {
  document.querySelectorAll('.modal-section').forEach(s => s.classList.remove('active'));
  document.getElementById('step1').classList.add('active');
}

function selectPayment(method) {
  document.querySelectorAll('.modal-section').forEach(s => s.classList.remove('active'));
  if(method === 'Cash') document.getElementById('step2-cash').classList.add('active');
  else if(method === 'GCash') document.getElementById('step2-gcash').classList.add('active');
  else if(method === 'COD') document.getElementById('step2-cod').classList.add('active');
}

function proceedCash() {
  let cash = parseInt(document.getElementById('cashAmount').value) || 0;
  if(cash < totalAmount) {
    alert("Kulang ang cash!");
    return;
  }
  let payment = {method: 'Cash', cash: cash, change: cash - totalAmount};
  saveTransaction(payment);
}

function proceedGCash() {
  let name = document.getElementById('gcashName').value;
  let number = document.getElementById('gcashNumber').value;
  if(!name ||!number) {
    alert("Kailangan ng GCash name at number");
    return;
  }
  let payment = {method: 'GCash', gcashName: name, gcashNumber: number};
  saveTransaction(payment);
}

function proceedCOD() {
  let name = document.getElementById('codName').value;
  let address = document.getElementById('codAddress').value;
  let phone = document.getElementById('codPhone').value;
  if(!name ||!address ||!phone) {
    alert("Kailangan ng name, address, at phone");
    return;
  }
  let payment = {method: 'COD', codName: name, codAddress: address, codPhone: phone};
  saveTransaction(payment);
}

async function saveTransaction(payment) {
  try {
    // Update stock in Firestore
    const batch = db.batch();
    Object.keys(cart).forEach(productId => {
      let qty = cart[productId];
      let prod = productsArray.find(p => p.id === productId);
      if(prod) {
        let newStock = prod.stock - qty;
        batch.update(db.collection("product").doc(productId), {stock: newStock});
      }
    });
    await batch.commit();

    // Save transaction to localStorage for receipt
    let transaction = {
      id: 'TXN' + Date.now(),
      date: new Date().toLocaleString('en-PH'),
      items: cart,
      payment: payment,
      total: totalAmount
    };
    let transactions = JSON.parse(localStorage.getItem('transactions') || '[]');
    transactions.unshift(transaction);
    localStorage.setItem('transactions', JSON.stringify(transactions));

    let cartData = encodeURIComponent(JSON.stringify(cart));
    let paymentData = encodeURIComponent(JSON.stringify(payment));
    window.location.href = `checkout.html?cart=${cartData}&payment=${paymentData}`;

  } catch (error) {
    console.error("Error saving transaction:", error);
    alert("Error processing order. Check console.");
  }
}
</script>
</body>
</html>
