<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Sales - DHAN SIOMAI</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#FFF8E1}
.header{background:linear-gradient(135deg,#2E7D32,#1B5E20);color:white;padding:15px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
.header h1{font-size:18px;font-weight:700}
.header a{color:#2E7D32;background:#fff;text-decoration:none;font-weight:600;padding:8px 14px;border-radius:8px}
.container{padding:15px;max-width:900px;margin:0 auto}
.card{background:white;border-radius:16px;padding:20px;box-shadow:0 3px 10px rgba(0,0,0,0.08);margin-bottom:15px}
.filter-row{display:flex;gap:10px;margin-bottom:15px;flex-wrap:wrap}
.filter-row input,.filter-row button{padding:12px;border:2px solid #C8E6C9;border-radius:10px;font-size:14px}
.filter-row input{flex:1}
.filter-row button{background:#2E7D32;color:white;border:none;font-weight:600;cursor:pointer}
.stat-card{background:linear-gradient(135deg,#E8F5E9,#C8E6C9);padding:25px;border-radius:16px;text-align:center;margin-bottom:15px}
.stat-card h4{font-size:14px;color:#2E7D32;margin-bottom:8px;font-weight:600}
.stat-card p{font-size:36px;font-weight:900;color:#1B5E20}
.table{width:100%;border-collapse:collapse;font-size:14px}
.table th{background:#C8E6C9;padding:12px;text-align:left;font-size:13px;font-weight:700;color:#1B5E20}
.table td{padding:12px;border-bottom:1px solid #C8E6C9}
.table td.desc{font-size:12px;color:#666}
.loading{text-align:center;padding:40px;color:#666}
.total-row{font-weight:800;background:#E8F5E9}
</style>
</head>
<body>
<div class="header">
  <h1>💰 Daily Sales</h1>
  <a href="index.html">← Back</a>
</div>

<div class="container">
  <div class="card">
    <h3 style="margin-bottom:15px;color:#2E7D32">📅 Filter Date</h3>
    <div class="filter-row">
      <input type="date" id="dateFrom">
      <input type="date" id="dateTo">
      <button onclick="loadSales()">Load</button>
    </div>
    <div class="stat-card">
      <h4>Total Sales</h4>
      <p id="totalSales">₱0.00</p>
    </div>
  </div>

  <div class="card">
    <h3 style="margin-bottom:15px;color:#2E7D32">📋 Sales Transactions</h3>
    <div id="salesTable">
      <div class="loading">Select date range and click Load</div>
    </div>
  </div>
</div>

<script type="module">
import { db } from './firebase-config.js';
import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// Auto set today
const today = new Date().toISOString().split('T')[0];
document.getElementById('dateFrom').value = today;
document.getElementById('dateTo').value = today;

window.loadSales = async function() {
  const dateFrom = document.getElementById('dateFrom').value;
  const dateTo = document.getElementById('dateTo').value;

  if(!dateFrom ||!dateTo) {
    alert('Pili ka muna date range boss');
    return;
  }

  document.getElementById('salesTable').innerHTML = '<div class="loading">Loading sales...</div>';

  try {
    // Pull from dhan-sales collection - galing pos.html checkout mo
    const salesSnap = await getDocs(query(
      collection(db, "dhan-sales"),
      where("date", ">=", dateFrom),
      where("date", "<=", dateTo)
    ));

    let totalSales = 0;
    let html = `<table class="table">
      <tr>
        <th>Time</th>
        <th>Items</th>
        <th>Payment</th>
        <th>Amount</th>
      </tr>`;

    if(salesSnap.empty) {
      html = '<div class="loading">Walang sales pa sa date na to boss. Mag-benta ka muna sa POS!</div>';
    } else {
      salesSnap.forEach(doc => {
        const sale = doc.data();
        totalSales += sale.total || 0;
        const itemsText = sale.items? sale.items.map(i => `${i.name} x${i.qty}`).join(', ') : 'N/A';
        const time = sale.timestamp? new Date(sale.timestamp.seconds * 1000).toLocaleTimeString('en-PH', {hour:'2-digit', minute:'2-digit'}) : sale.date;

        html += `<tr>
          <td>${time}</td>
          <td class="desc">${itemsText}</td>
          <td>${(sale.paymentMethod || 'cash').toUpperCase()}</td>
          <td style="font-weight:700;color:#2E7D32">₱${(sale.total || 0).toLocaleString()}</td>
        </tr>`;
      });

      html += `<tr class="total-row">
        <td colspan="3">TOTAL SALES</td>
        <td>₱${totalSales.toLocaleString()}</td>
      </tr>`;
      html += '</table>';
    }

    document.getElementById('totalSales').textContent = `₱${totalSales.toLocaleString()}`;
    document.getElementById('salesTable').innerHTML = html;

  } catch(e) {
    document.getElementById('salesTable').innerHTML = `<div class="loading">Error: ${e.message}<br><br>Note: Baka need mo create Firestore index. Click mo yung link sa console.</div>`;
    console.error(e);
  }
}

loadSales();
</script>
</body>
        </html>
