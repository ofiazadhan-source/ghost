<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Net Profit - DHAN SIOMAI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
body{background:#FFF8E1;padding:15px}
.header{background:#D32F2F;color:white;padding:15px;border-radius:12px;display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}
.header h1{font-size:18px}
.back-btn{color:#D32F2F;background:white;text-decoration:none;font-weight:600;padding:8px 14px;border-radius:8px;font-size:13px}
.card{background:white;border-radius:16px;padding:20px;margin-bottom:15px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
.card h3{color:#D32F2F;margin-bottom:15px;font-size:16px}
.filter-row{display:flex;gap:10px;margin-bottom:15px}
.filter-row input{flex:1;padding:10px;border:2px solid #FFE0B2;border-radius:10px;font-size:14px}
.filter-row button{padding:10px 20px;background:#D32F2F;color:white;border:none;border-radius:10px;font-weight:600;cursor:pointer}
.stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.stat-box{padding:15px;border-radius:12px;text-align:center}
.stat-box.green{background:#E8F5E9}
.stat-box.red{background:#FFEBEE}
.stat-box.blue{background:#E3F2FD}
.stat-box h4{font-size:12px;color:#666;margin-bottom:5px}
.stat-box p{font-size:22px;font-weight:700}
.green p{color:#2E7D32}
.red p{color:#C62828}
.blue p{color:#1565C0}
.sale-card{background:#FFFDF7;border:2px solid #FFCC80;border-radius:12px;padding:12px;margin-bottom:10px}
.sale-head{display:flex;justify-content:space-between;margin-bottom:8px}
.sale-date{font-weight:700;color:#D32F2F;font-size:13px}
.sale-total{font-weight:800;color:#2E7D32;font-size:16px}
.sale-items{font-size:12px;color:#555;line-height:1.6}
.exp-card{background:#FFF5F5;border:2px solid #FFCDD2;border-radius:12px;padding:12px;margin-bottom:10px}
.exp-head{display:flex;justify-content:space-between;margin-bottom:8px}
.exp-desc{font-weight:700;color:#C62828;font-size:13px}
.exp-amt{font-weight:800;color:#C62828;font-size:16px}
.loading{text-align:center;padding:40px;color:#666}
.formula{font-size:13px;color:#666;text-align:center;margin-top:10px}
</style>
</head>
<body>
<div class="header">
  <h1>💰 Net Profit Report</h1>
  <a href="index.html" class="back-btn">← Back</a>
</div>

<div class="card">
  <h3>📊 Auto Load Today</h3>
  <div class="filter-row">
    <input type="date" id="dateFrom">
    <input type="date" id="dateTo">
    <button id="loadBtn">Load</button>
  </div>
  <div class="stats-grid">
    <div class="stat-box green">
      <h4>Total Sales</h4>
      <p id="totalSales">₱0</p>
    </div>
    <div class="stat-box red">
      <h4>Total Expenses</h4>
      <p id="totalExpenses">₱0</p>
    </div>
    <div class="stat-box blue">
      <h4>Net Profit</h4>
      <p id="netProfit">₱0</p>
    </div>
  </div>
  <div class="formula">Formula: Sales - Expenses = Net Profit</div>
</div>

<div class="card">
  <h3>📋 Sales List</h3>
  <div id="salesList" class="loading">Loading today sales...</div>
</div>

<div class="card">
  <h3>💸 Expenses List</h3>
  <div id="expensesList" class="loading">Loading expenses...</div>
</div>

<script type="module">
import { db } from "./firebase-config.js";
import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// Set today yyyy-mm-dd
let d = new Date();
let today = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
document.getElementById('dateFrom').value = today;
document.getElementById('dateTo').value = today;

async function loadReport() {
  const from = document.getElementById('dateFrom').value;
  const to = document.getElementById('dateTo').value;
  const salesList = document.getElementById('salesList');
  const expList = document.getElementById('expensesList');

  salesList.innerHTML = '<div class="loading">Loading sales...</div>';
  expList.innerHTML = '<div class="loading">Loading expenses...</div>';

  let totalSales = 0;
  let totalExpenses = 0;

  try {
    // SALES - walang orderBy para di mag-error
    const salesQ = query(collection(db, "dhan-sales"), where("date", ">=", from), where("date", "<=", to));
    const salesSnap = await getDocs(salesQ);

    if(salesSnap.empty) {
      salesList.innerHTML = '<div class="loading">Wala pang sales ngayon boss</div>';
    } else {
      let html = '';
      salesSnap.forEach(doc => {
        const sale = doc.data();
        totalSales += sale.total || 0;
        const items = sale.items? sale.items.map(i => `${i.name} x${i.qty} = ₱${(i.price*i.qty).toLocaleString()}`).join('<br>') : 'No items';
        const time = sale.timestamp? new Date(sale.timestamp.seconds * 1000).toLocaleTimeString('en-PH', {hour:'2-digit', minute:'2-digit'}) : '';
        html += `<div class="sale-card"><div class="sale-head"><span class="sale-date">${sale.date} ${time}</span><span class="sale-total">₱${(sale.total || 0).toLocaleString()}</span></div><div class="sale-items">${items}</div></div>`;
      });
      salesList.innerHTML = html;
    }

    // EXPENSES - walang orderBy din
    const expQ = query(collection(db, "daily_expenses"), where("date", ">=", from), where("date", "<=", to));
    const expSnap = await getDocs(expQ);

    if(expSnap.empty) {
      expList.innerHTML = '<div class="loading">Wala pang expenses ngayon boss</div>';
    } else {
      let expHtml = '';
      expSnap.forEach(doc => {
        const exp = doc.data();
        totalExpenses += exp.amount || 0;
        expHtml += `<div class="exp-card"><div class="exp-head"><span class="exp-desc">${exp.date} - ${exp.desc}</span><span class="exp-amt">-₱${(exp.amount || 0).toLocaleString()}</span></div></div>`;
      });
      expList.innerHTML = expHtml;
    }

    const netProfit = totalSales - totalExpenses;
    document.getElementById('totalSales').textContent = '₱' + totalSales.toLocaleString();
    document.getElementById('totalExpenses').textContent = '₱' + totalExpenses.toLocaleString();
    document.getElementById('netProfit').textContent = '₱' + netProfit.toLocaleString();

  } catch(e) {
    salesList.innerHTML = '<div class="loading" style="color:red">Error: ' + e.message + '</div>';
    console.error(e);
  }
}

document.getElementById('loadBtn').addEventListener('click', loadReport);
loadReport();
</script>
</body>
</html>
