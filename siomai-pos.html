<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Siomai Factory POS v2</title>
<script src="https://cdn.tailwindcss.com"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, doc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

// Config mo para sa Siomai Factory - bago to boss
const firebaseConfig = {
  apiKey: "AIzaSyDk3ZbOXuw3PEfJzdt8AI2ueJq5yksfekE",
  authDomain: "dhan-siomai-pos-fe1e5.firebaseapp.com",
  projectId: "dhan-siomai-pos-fe1e5",
  storageBucket: "dhan-siomai-pos-fe1e5.firebasestorage.app",
  messagingSenderId: "305932123173",
  appId: "1:305932123173:web:f27894a2d5e6e6ab8253cc"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

let cart = [];
let products = [];

// Load products
async function loadProducts() {
  const q = query(collection(db, "products"), orderBy("name"));
  const snap = await getDocs(q);
  products = [];
  snap.forEach(d => products.push({id: d.id,...d.data()}));
  renderProducts();
}

function renderProducts() {
  document.getElementById('products').innerHTML = products.map(p => `
    <div class="bg-white p-4 rounded-xl shadow hover:shadow-lg">
      <div class="font-bold text-lg">${p.name}</div>
      <div class="text-sm text-gray-500">Stock: ${p.stock}</div>
      <div class="mt-2">Cost: ₱${p.cost} | Price: ₱${p.price}</div>
      <button onclick="addToCart('${p.id}')" class="mt-3 w-full bg-orange-500 text-white py-2 rounded-lg font-bold">ADD</button>
    </div>
  `).join('');
}

window.addToCart = (id) => {
  const p = products.find(x => x.id == id);
  if(p.stock <= 0) return alert('Out of stock boss!');
  const item = cart.find(x => x.id == id);
  if(item) item.qty++;
  else cart.push({...p, qty: 1});
  renderCart();
}

function renderCart() {
  let total = 0, cost = 0;
  document.getElementById('cart').innerHTML = cart.map(i => {
    total += i.price * i.qty;
    cost += i.cost * i.qty;
    return `<div class="flex justify-between py-1 border-b">${i.name} x${i.qty} <b>₱${i.price*i.qty}</b></div>`;
  }).join('');
  document.getElementById('total').innerText = total;
  document.getElementById('cost').innerText = cost;
  document.getElementById('profit').innerText = total - cost;
}

window.previewGcash = (e) => {
  const file = e.target.files[0];
  if(file) document.getElementById('preview').src = URL.createObjectURL(file);
}

window.checkout = async () => {
  if(cart.length == 0) return alert('Cart empty boss!');

  const payment = document.getElementById('payment').value;
  let gcashProof = null;

  if(payment == 'Gcash') {
    const file = document.getElementById('gcashFile').files[0];
    if(!file) return alert('Upload Gcash proof muna boss!');
    const fileRef = ref(storage, `gcash/${Date.now()}_${file.name}`);
    const snap = await uploadBytes(fileRef, file);
    gcashProof = await getDownloadURL(snap.ref);
  }

  let total = cart.reduce((s,i) => s + i.price*i.qty, 0);
  let cost = cart.reduce((s,i) => s + i.cost*i.qty, 0);

  await addDoc(collection(db, "sales"), {
    items: cart,
    total, cost, netProfit: total - cost,
    payment, gcashProof,
    createdAt: serverTimestamp()
  });

  // Auto minus stock
  for(let i of cart) {
    await updateDoc(doc(db, "products", i.id), {stock: i.stock - i.qty});
  }

  alert('Sale saved! Profit: ₱' + (total-cost));
  cart = [];
  document.getElementById('gcashFile').value = '';
  document.getElementById('preview').src = '';
  renderCart();
  loadProducts();
}

loadProducts();
</script>
</head>
<body class="bg-gray-100">
<div class="max-w-6xl mx-auto p-4">
  <h1 class="text-3xl font-bold mb-6 text-orange-600">🥟 Siomai Factory POS</h1>

  <div class="grid lg:grid-cols-3 gap-4">
    <div class="lg:col-span-2">
      <h2 class="font-bold text-xl mb-3">Products</h2>
      <div id="products" class="grid sm:grid-cols-2 md:grid-cols-3 gap-3"></div>
    </div>

    <div class="bg-white p-4 rounded-xl shadow">
      <h2 class="font-bold text-xl mb-3">Cart</h2>
      <div id="cart" class="mb-3 min-h-32"></div>

      <div class="border-t pt-3 space-y-1">
        <div class="flex justify-between">Total: <b>₱<span id="total">0</span></b></div>
        <div class="flex justify-between text-gray-600">Cost: ₱<span id="cost">0</span></div>
        <div class="flex justify-between text-green-600 font-bold text-lg">Net Profit: ₱<span id="profit">0</span></div>
      </div>

      <select id="payment" class="w-full mt-4 p-3 border-2 rounded-lg">
        <option value="Cash">Cash</option>
        <option value="Gcash">Gcash</option>
      </select>

      <input type="file" id="gcashFile" accept="image/*" onchange="previewGcash(event)" class="mt-3 w-full">
      <img id="preview" class="mt-2 max-h-40 rounded border mx-auto">

      <button onclick="checkout()" class="mt-4 w-full bg-green-500 hover:bg-green-600 text-white py-3 rounded-lg font-bold text-lg">CHECKOUT</button>
    </div>
  </div>
</div>
</body>
</html>
