<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products - DHAN SIOMAI</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#f5f5f5;padding:15px;}
.header{background:#ff6b35;color:white;padding:15px;border-radius:10px;margin-bottom:15px;display:flex;justify-content:space-between;align-items:center;}
.header a{color:white;text-decoration:none;font-weight:600;font-size:14px;}
.card{background:white;padding:15px;border-radius:10px;box-shadow:0 2px 5px rgba(0,0,0,0.1);margin-bottom:15px;}
input,button{width:100%;padding:10px;margin:8px 0;border:1px solid #ddd;border-radius:8px;}
button{background:#ff6b35;color:white;border:none;font-weight:600;cursor:pointer;}
button.edit{background:#3498db;font-size:12px;padding:5px 8px;width:auto;}
table{width:100%;border-collapse:collapse;font-size:14px;}
th,td{padding:8px;text-align:left;border-bottom:1px solid #eee;}
th{background:#f8f8f8;font-size:13px;}
.category-block{margin-bottom:10px;border:1px solid #eee;border-radius:8px;}
.category-header{background:#f8f8f8;padding:12px;font-weight:600;cursor:pointer;border-radius:8px;display:flex;justify-content:space-between;align-items:center;}
.category-items{padding:10px;}
#searchBox{margin-bottom:10px;}
.stock-low{color:red;font-weight:600;}
.stock-ok{color:green;}
</style>
</head>
<body>
<div class="header">
<h3>📦 Products</h3>
<a href="index.html">← Back</a>
</div>

<div class="card">
<h4>Add Product</h4>
<input type="text" id="productName" placeholder="Product Name">
<input type="text" id="productCategory" placeholder="Category">
<input type="number" id="productPrice" placeholder="Price">
<input type="number" id="productStock" placeholder="Initial Stock">
<button onclick="addProduct()">Add Product</button>
</div>

<div class="card">
<h4>Product List</h4>
<input type="text" id="searchBox" placeholder="🔍 Search product or category..." onkeyup="renderProducts()">
<div id="productList">Loading...</div>
</div>

<script>
const firebaseConfig = {
 apiKey: "AIzaSyDk3ZbOXuw3PEfJzdt8AI2ueJq5yksfekE",
 authDomain: "dhan-siomai-pos-fe1e5.firebaseapp.com",
 projectId: "dhan-siomai-pos-fe1e5",
 storageBucket: "dhan-siomai-pos-fe1e5.firebasestorage.app",
 messagingSenderId: "305932123173",
 appId: "1:305932123173:web:f27894a2d5e6e6ab8253cc"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let productsCache = [];

async function addProduct(){
  const name = document.getElementById('productName').value.trim();
  const category = document.getElementById('productCategory').value.trim();
  const price = document.getElementById('productPrice').value;
  const stock = document.getElementById('productStock').value;

  if(!name ||!category ||!price){alert('Fill all fields');return;}

  await db.collection('dhan-pos-web').add({
    name:name,
    category:category,
    price:parseFloat(price),
    stock:parseInt(stock) || 0
  });

  document.getElementById('productName').value='';
  document.getElementById('productCategory').value='';
  document.getElementById('productPrice').value='';
  document.getElementById('productStock').value='';

  loadProducts();
}

async function loadProducts(){
  const snapshot = await db.collection('dhan-pos-web').get();
  productsCache = [];
  snapshot.forEach(doc=>{
    productsCache.push({id:doc.id,...doc.data()});
  });
  renderProducts();
}

function renderProducts(){
  let search = document.getElementById('searchBox').value.toLowerCase();
  let filtered = productsCache.filter(p =>
    p.name.toLowerCase().includes(search) ||
    p.category.toLowerCase().includes(search)
  );

  filtered.sort((a,b)=> a.category.localeCompare(b.category) || a.name.localeCompare(b.name));

  let grouped = {};
  filtered.forEach(p=>{
    if(!grouped[p.category]) grouped[p.category] = [];
    grouped[p.category].push(p);
  });

  let html = '';
  for(let cat in grouped){
    html += `<div class="category-block">
      <div class="category-header" onclick="toggleCat('${cat}')">
        <span>${cat}</span>
        <span>${grouped[cat].length} items ▼</span>
      </div>
      <div class="category-items" id="cat-${cat}">
        <table>
        <tr><th>Name</th><th>Price</th><th>Stock</th><th></th></tr>`;
    grouped[cat].forEach(p=>{
      let stockClass = p.stock == 0? 'stock-low' : p.stock < 10? 'stock-low' : 'stock-ok';
      html += `<tr>
        <td>${p.name}</td>
        <td>₱${p.price}</td>
        <td class="${stockClass}">${p.stock}</td>
        <td><button class="edit" onclick="editProduct('${p.id}')">Edit</button></td>
      </tr>`;
    });
    html += `</table></div></div>`;
  }

  document.getElementById('productList').innerHTML = html || '<p style="text-align:center;color:#666;padding:20px;">No products found</p>';
}

function toggleCat(cat){
  let el = document.getElementById('cat-'+cat);
  el.style.display = el.style.display === 'none'? 'block' : 'none';
}

async function editProduct(id){
  let product = productsCache.find(p=>p.id===id);
  let newPrice = prompt(`Update price for ${product.name}`, product.price);
  let newStock = prompt(`Update stock for ${product.name}`, product.stock);

  if(newPrice!== null && newStock!== null){
    await db.collection('dhan-pos-web').doc(id).update({
      price:parseFloat(newPrice),
      stock:parseInt(newStock)
    });
    loadProducts();
  }
}

loadProducts();
</script>
</body>
</html>
