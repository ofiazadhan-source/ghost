<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products - DHAN SIOMAI</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* {margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif;}
body {background:linear-gradient(135deg, #FFF8E1, #FFE0B2);}
.header {
  background: linear-gradient(135deg, #D32F2F, #B71C1C);
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 4px 12px rgba(211,47,47,0.3);
}
.header h1 { font-size: 18px; font-weight:700; }
.header a { color:#D32F2F; background:#fff; text-decoration:none; font-weight:600; padding:8px 14px; border-radius:8px; }
.container {padding:15px; max-width:1100px; margin:0 auto;}
.card {
  background:white;
  padding:18px;
  border-radius:16px;
  box-shadow:0 4px 16px rgba(0,0,0,0.08);
  margin-bottom:15px;
}
input, button, select {
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  border:2px solid #FFE0B2;
  font-size:14px;
}
input:focus, select:focus {outline:none; border-color:#FFC107;}
button {
  background:linear-gradient(135deg, #D32F2F, #B71C1C);
  color:white;
  border:none;
  font-weight:700;
  cursor:pointer;
}
button:active {transform:scale(0.98);}
.btn-add-stock {background:linear-gradient(135deg, #4caf50, #66bb6a); padding:8px 14px; font-size:12px; width:auto;}
.btn-remove-stock {background:linear-gradient(135deg, #f44336, #ef5350); padding:8px 14px; font-size:12px; width:auto;}
.product-grid {display:grid; gap:12px; grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));}
.product-card {
  background:white;
  border-radius:14px;
  padding:12px;
  box-shadow:0 3px 10px rgba(0,0,0,0.08);
  border-left:4px solid #D32F2F;
}
.product-img {
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:10px;
  margin-bottom:8px;
  background:#f5f5f5;
}
.product-info h4 {margin-bottom:4px; font-size:16px; color:#333;}
.product-info p {font-size:13px; color:#666; margin-bottom:8px;}
.product-actions {display:flex; gap:6px; align-items:center; margin-top:8px;}
.qty-input {width:70px!important; padding:8px!important; margin:0!important;}
small {color:#666; font-size:12px;}
.img-preview {
  max-width:100%;
  max-height:150px;
  object-fit:contain;
  border-radius:10px;
  margin-bottom:10px;
  display:none;
}
</style>
</head>
<body>
<div class="header">
  <h1>📦 Products</h1>
  <a href="index.html">← Back</a>
</div>
<div class="container">
  <div class="card">
    <h3 style="margin-bottom:12px; color:#D32F2F;">➕ Add New Product</h3>
    <input type="text" id="prodName" placeholder="Product Name">
    <input type="number" id="prodPrice" placeholder="Price">
    <input type="number" id="prodStock" placeholder="Initial Stock">
    <select id="prodCat">
      <option value="65's">65's</option>
      <option value="30's">30's</option>
      <option value="Big SIOMAI">Big SIOMAI</option>
      <option value="Dumplings">Dumplings</option>
      <option value="Siopao">Siopao</option>
      <option value="Sauce">Sauce</option>
      <option value="Others">Others</option>
    </select>
    <div style="margin:10px 0;">
      <label style="font-weight:600;color:#D32F2F;">📸 Product Image</label>
      <input type="file" id="prodImage" accept="image/*">
      <img id="imgPreview" class="img-preview">
    </div>
    <button onclick="addProduct()">Add Product</button>
  </div>

  <div class="card">
    <h3 style="margin-bottom:12px; color:#D32F2F;">📋 Product List</h3>
    <div id="productList" class="product-grid">Loading...</div>
  </div>
</div>

<script type="module">
import { db } from './firebase-config.js';
import {
  collection, doc, addDoc, updateDoc, getDoc, getDocs,
  onSnapshot, increment, deleteField
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// Image preview + auto compress
document.getElementById('prodImage').onchange = async function(e){
  const file = e.target.files[0];
  if(file){
    const compressed = await compressImage(file, 800, 0.7);
    document.getElementById('imgPreview').src = compressed;
    document.getElementById('imgPreview').style.display = 'block';
    document.getElementById('prodImage').dataset.compressed = compressed;
  }
}

// Function para i-compress ang image bago i-save
async function compressImage(file, maxWidth, quality) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = (event) => {
      const img = new Image();
      img.src = event.target.result;
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let width = img.width;
        let height = img.height;

        if(width > maxWidth) {
          height = (maxWidth / width) * height;
          width = maxWidth;
        }

        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      }
    }
  });
}

// Live display ng products
onSnapshot(collection(db, "dhan-pos-web"), (snapshot) => {
  const list = document.getElementById("productList");
  if(snapshot.empty) {
    list.innerHTML = "<p style='text-align:center; color:#999;'>No products yet</p>";
    return;
  }

  list.innerHTML = '';
  snapshot.forEach(docSnap => {
    const p = docSnap.data();
    const imgUrl = p.image || 'https://via.placeholder.com/220x150?text=No+Image';
    list.innerHTML += `
    <div class="product-card">
      <img src="${imgUrl}" class="product-img" alt="${p.name}" onerror="this.src='https://via.placeholder.com/220x150?text=Image+Error'">
      <div class="product-info">
        <h4>${p.name}</h4>
        <p>₱${p.price || 0} | Stock: <strong style="color:#D32F2F;">${p.stock || 0}</strong></p>
        <small style="color:#999;">${p.category || 'Others'}</small>
      </div>
      <div class="product-actions">
        <input type="number" id="qty-${docSnap.id}" placeholder="Qty" class="qty-input" inputmode="numeric" min="1">
        <button class="btn-add-stock" onclick="quickAdjust('${docSnap.id}', 'add')">+ Add</button>
        <button class="btn-remove-stock" onclick="quickAdjust('${docSnap.id}', 'remove')">- Remove</button>
      </div>
    </div>`;
  });
});

// Add or remove stock
window.quickAdjust = async function(id, type) {
  const qtyInput = document.getElementById(`qty-${id}`);
  const qty = parseInt(qtyInput.value) || 0;

  if(!qty || qty <= 0) {
    alert("Lagay mo muna quantity boss");
    return;
  }

  const productRef = doc(db, "dhan-pos-web", id);

  try {
    if(type === 'add') {
      await updateDoc(productRef, { stock: increment(qty) });
      alert(`✅ Added ${qty} stock!`);
      qtyInput.value = '';
    } else {
      const snap = await getDoc(productRef);
      const currentStock = snap.data().stock || 0;

      if(currentStock < qty) {
        alert(`❌ Kulang sa stock. Current: ${currentStock}`);
        return;
      }

      const reason = prompt("Reason for removing stock:");
      if(!reason) return;

      await updateDoc(productRef, { stock: increment(-qty) });
      await addDoc(collection(db, "stockAdjustments"), {
        productId: id,
        productName: snap.data().name,
        type: 'remove',
        qty: qty,
        reason: reason,
        date: new Date()
      });
      alert(`✅ Removed ${qty} stock`);
      qtyInput.value = '';
    }
  } catch(e) {
    alert("Error: " + e.message);
  }
}

// Add product
window.addProduct = async function() {
  const name = document.getElementById('prodName').value.trim();
  const price = parseFloat(document.getElementById('prodPrice').value) || 0;
  const stock = parseInt(document.getElementById('prodStock').value) || 0;
  const category = document.getElementById('prodCat').value;
  const imageBase64 = document.getElementById('prodImage').dataset.compressed || '';

  if(!name ||!price) {
    alert("Fill up name and price boss");
    return;
  }

  try {
    // Check kung existing na yung product
    const snapshot = await getDocs(collection(db, "dhan-pos-web"));
    let existingProduct = null;

    snapshot.forEach(docSnap => {
      if(docSnap.data().name.toLowerCase() === name.toLowerCase()) {
        existingProduct = docSnap.id;
      }
    });

    if(existingProduct) {
      await updateDoc(doc(db, "dhan-pos-web", existingProduct), {
        stock: increment(stock),
        image: imageBase64 || deleteField()
      });
      alert(`✅ ${name} updated! Added ${stock} to existing stock.`);
    } else {
      await addDoc(collection(db, "dhan-pos-web"), {
        name,
        price,
        stock,
        category,
        image: imageBase64
      });
      alert("✅ Product added!");
    }

    // Reset form
    document.getElementById('prodName').value = '';
    document.getElementById('prodPrice').value = '';
    document.getElementById('prodStock').value = '';
    document.getElementById('prodImage').value = '';
    document.getElementById('prodImage').dataset.compressed = '';
    document.getElementById('imgPreview').style.display = 'none';

  } catch(e) {
    alert("Error: " + e.message);
  }
}
</script>
</body>
</html>
