<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products - Siomai Factory POS</title>
<style>
* {margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', Tahoma, sans-serif;}
body {background:#FFF8E1; padding:15px; min-height:100vh;}
.container { max-width:480px; margin:auto; background:white; border-radius:20px; padding:20px; box-shadow:0 6px 20px rgba(0,0,0,0.12); border-top:6px solid #D32F2F; }
h2 { color:#D32F2F; text-align:center; margin-bottom:8px; font-size:24px; }
.subtitle { text-align:center; color:#666; font-size:13px; margin-bottom:20px; }
.back-btn { background:#757575; color:white; border:none; padding:10px 18px; border-radius:8px; cursor:pointer; margin-bottom:15px; font-size:13px; font-weight:600; }
.menu-grid { display:grid; grid-template-columns:repeat(2, 1fr); gap:12px; }
.menu-btn { padding:35px 10px; border:none; border-radius:15px; background:linear-gradient(135deg, #FFCC80, #FFB74D); color:#B71C1C; font-weight:800; font-size:15px; cursor:pointer; text-align:center; line-height:1.4; }
.menu-btn:active {transform:scale(0.95); background:#FFA726;}
.product-form { background:#FFF8E1; border:2px dashed #FFCC80; border-radius:12px; padding:15px; margin-bottom:18px; }
.product-form h4 { color:#D32F2F; margin-bottom:10px; font-size:14px; }
.input-group {margin-bottom:12px;}
.input-group label { font-size:12px; font-weight:700; color:#D32F2F; margin-bottom:4px; display:block; }
.input-group input { width:100%; padding:12px; border:2px solid #FFE0B2; border-radius:8px; font-size:14px; background:white; }
.input-group input:focus {outline:none; border-color:#D32F2F;}
.add-prod-btn { width:100%; padding:14px; background:#2E7D32; color:white; border:none; border-radius:8px; font-weight:800; cursor:pointer; margin-top:8px; font-size:15px; }
.prod-list { display:grid; grid-template-columns:repeat(2, 1fr); gap:10px; }
.prod-card { background:#FFFDF7; border:2px solid #FFCC80; border-radius:12px; padding:12px; text-align:center; position:relative; }
.prod-img { width:100%; height:70px; object-fit:cover; border-radius:8px; margin-bottom:6px; background:#f0f0f0; }
.prod-name { font-weight:800; font-size:13px; color:#D32F2F; margin-bottom:8px; }
.prod-card.input-group { margin-bottom:8px; }
.prod-card.input-group label { font-size:10px; color:#666; font-weight:600; margin-bottom:2px; }
.prod-card input { padding:8px; text-align:center; border:1.5px solid #ddd; border-radius:6px; font-size:13px; }
.save-btn { width:100%; padding:8px; background:#1976D2; color:white; border:none; border-radius:6px; font-size:12px; font-weight:700; cursor:pointer; margin-top:6px; }
.delete-btn { position:absolute; top:6px; right:6px; background:#C62828; color:white; border:none; border-radius:50%; width:24px; height:24px; cursor:pointer; font-size:18px; line-height:1; font-weight:bold; }
.page {display:none;}.page.active {display:block;}
.empty-msg { grid-column:span 2; text-align:center; color:#999; padding:40px 0; font-size:13px; }
</style>
</head>
<body>
<div class="container">

<!-- PAGE 1: SELECT CATEGORY -->
<div id="categoryPage" class="page active">
<button class="back-btn" onclick="window.location='index.html'">← Back to Menu</button>
<h2>🛒 Select Category</h2>
<div class="menu-grid">
<button class="menu-btn" onclick="openCategory('65s')">65's</button>
<button class="menu-btn" onclick="openCategory('30s')">30's</button>
<button class="menu-btn" onclick="openCategory('big')">Big SIOMAI</button>
<button class="menu-btn" onclick="openCategory('dumplings')">Dumplings</button>
<button class="menu-btn" onclick="openCategory('siopao')">SIOPAO</button>
<button class="menu-btn" onclick="openCategory('sauce')">Sauce</button>
<button class="menu-btn" onclick="openCategory('others')">Others</button>
<button class="menu-btn" onclick="openCategory('all')">All</button>
</div>
</div>

<!-- PAGE 2: PRODUCT MANAGER -->
<div id="productPage" class="page">
<button class="back-btn" onclick="showPage('categoryPage')">← Back to Categories</button>
<h2 id="catTitle">65's Siomai</h2>

<div class="product-form">
<h4>+ Add Product to <span id="catName">65's Siomai</span></h4>
<div class="input-group">
<label>Product Name</label>
<input type="text" id="prodName" placeholder="ex: Pork Siomai">
</div>
<div class="input-group">
<label style="color:#D32F2F;">STOCK</label>
<input type="number" id="prodStocks" placeholder="100" value="100">
</div>
<div class="input-group">
<label style="color:#1976D2;">COST per piece</label>
<input type="number" id="prodCost" placeholder="2.00" step="0.01">
</div>
<div class="input-group">
<label style="color:#1976D2;">SELLING PRICE</label>
<input type="number" id="prodPrice" placeholder="5.00" value="8" step="0.01">
</div>
<button class="add-prod-btn" onclick="addProduct()">Add Product</button>
</div>

<div class="prod-list" id="prodList"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, doc, serverTimestamp, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDk3ZbOXuw3PEfJzdt8AI2ueJq5yksfekE",
  authDomain: "dhan-siomai-pos-fe1e5.firebaseapp.com",
  projectId: "dhan-siomai-pos-fe1e5",
  storageBucket: "dhan-siomai-pos-fe1e5.firebasestorage.app",
  messagingSenderId: "305932123173",
  appId: "1:305932123173:web:f27894a2d5e6e6ab8253cc"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentCat = '65s';
let products = [];

function showPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
}

window.openCategory = (cat) => {
  currentCat = cat;
  const catNames = {
    '65s': "65's Siomai",
    '30s': "30's Siomai",
    'big': 'Big SIOMAI',
    'dumplings': 'Dumplings',
    'siopao': 'SIOPAO',
    'sauce': 'Sauce',
    'others': 'Others',
    'all': 'All Products'
  };
  document.getElementById('catTitle').innerText = catNames[cat];
  document.getElementById('catName').innerText = catNames[cat];
  showPage('productPage');
  loadProducts();
}

async function loadProducts() {
  let q = collection(db, "products");
  if(currentCat!= 'all') {
    q = query(collection(db, "products"), where("category", "==", currentCat));
  }
  const snap = await getDocs(q);
  products = [];
  snap.forEach(d => products.push({id: d.id,...d.data()}));
  renderProducts();
}

function renderProducts() {
  const list = document.getElementById('prodList');
  if(products.length === 0) {
    list.innerHTML = '<p class="empty-msg">No products yet. Add muna boss!</p>';
    return;
  }
  let html = '';
  products.forEach(prod => {
    html += `
      <div class="prod-card">
        <button class="delete-btn" onclick="deleteProduct('${prod.id}')">×</button>
        ${prod.image? `<img src="${prod.image}" class="prod-img">` : '<div class="prod-img" style="display:flex;align-items:center;justify-content:center;color:#ccc;font-size:11px;">No Image</div>'}
        <div class="prod-name">${prod.name}</div>
        <div style="font-size:10px; color:#666">Cost: ₱${prod.cost || 0}</div>
        <div class="input-group">
          <input type="number" id="stocks${prod.id}" value="${prod.stock}">
          <label>Stocks</label>
        </div>
        <div class="input-group">
          <input type="number" id="price${prod.id}" value="${prod.price}" step="0.01">
          <label>Price</label>
        </div>
        <button class="save-btn" onclick="saveProduct('${prod.id}')">Save</button>
      </div>
    `;
  });
  list.innerHTML = html;
}

window.addProduct = async () => {
  const name = document.getElementById('prodName').value.trim();
  const stock = parseInt(document.getElementById('prodStocks').value) || 0;
  const cost = parseFloat(document.getElementById('prodCost').value) || 0;
  const price = parseFloat(document.getElementById('prodPrice').value) || 0;
  if(!name || price <= 0) {
    alert('Lagay ka name at price boss!');
    return;
  }
  await addDoc(collection(db, "products"), {
    name, stock, cost, price,
    category: currentCat === 'all'? '65s' : currentCat,
    image: '',
    createdAt: serverTimestamp()
  });
  document.getElementById('prodName').value = '';
  document.getElementById('prodStocks').value = '100';
  document.getElementById('prodCost').value = '';
  document.getElementById('prodPrice').value = '8';
  loadProducts();
}

window.saveProduct = async (prodId) => {
  const stock = parseInt(document.getElementById('stocks' + prodId).value) || 0;
  const price = parseFloat(document.getElementById('price' + prodId).value) || 0;
  await updateDoc(doc(db, "products", prodId), {stock, price});
  const btn = event.target;
  btn.innerText = '✓ Saved';
  btn.style.background = '#4CAF50';
  setTimeout(() => {
    btn.innerText = 'Save';
    btn.style.background = '#1976D2';
  }, 800);
  loadProducts();
}

window.deleteProduct = async (prodId) => {
  if(confirm('Delete this product?')) {
    await updateDoc(doc(db, "products", prodId), {stock: 0, name: '[DELETED]'});
    loadProducts();
  }
}

loadProducts();
</script>
</body>
</html>
