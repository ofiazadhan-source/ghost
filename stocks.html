<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOSS STOCKS - DHAN SIOMAI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
body{background:#FFF8E1;padding:15px}
.header{background:#FF6F00;color:white;text-align:center;padding:20px;border-radius:12px;margin-bottom:15px}
.header h1{font-size:20px;margin-bottom:5px}
.header p{font-size:12px;opacity:0.9}
.card{background:white;padding:15px;border-radius:12px;margin-bottom:12px;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
.card h2{font-size:16px;color:#FF6F00;margin-bottom:12px;border-bottom:2px solid #FFF3E0;padding-bottom:8px}
.cat-title{background:#FF6F00;color:white;padding:10px;border-radius:8px;font-weight:800;font-size:14px;margin-bottom:10px;text-align:center}
.stock-row{padding:10px;border-bottom:1px solid #FFF3E0;font-size:13px;display:flex;justify-content:space-between;align-items:center}
.stock-row:last-child{border-bottom:none}
.stock-name{font-weight:700;color:#D32F2F}
.stock-count{font-weight:800;font-size:16px}
.stock-ok{color:#2E7D32}
.stock-low{color:#F57C00}
.stock-critical{color:#C62828;background:#FFEBEE;padding:4px 8px;border-radius:6px}
.prod-img{width:40px;height:40px;object-fit:cover;border-radius:6px;margin-right:8px;border:2px solid #FFCC80}
.stock-left{display:flex;align-items:center}
.loading{text-align:center;padding:40px;color:#999}
.note{font-size:11px;color:#666;text-align:center;margin-top:10px}
</style>
</head>
<body>
<div class="header">
<h1>📦 BOSS STOCKS VIEW</h1>
<p id="today-date">Loading...</p>
<p style="font-size:10px">READ ONLY - Auto refresh 30s</p>
</div>

<div class="card">
<h2>Current Inventory</h2>
<div id="stock-list"><div class="loading">Loading stocks...</div></div>
<p class="note">🟢 OK | 🟠 Low <20 pcs | 🔴 Critical <5 pcs</p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDk3ZbOXuw3PEfJzdt8AI2ueJq5yksfekE",
authDomain: "dhan-siomai-pos-fe1e5.firebaseapp.com",
projectId: "dhan-siomai-pos-fe1e5",
storageBucket: "dhan-siomai-pos-fe1e5.firebasestorage.app",
messagingSenderId: "305932123173",
appId: "1:305932123173:web:f27894a2d5e6e6ab8253cc"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const today = new Date().toLocaleDateString('en-PH', {weekday:'long', month:'long', day:'numeric', year:'numeric'});
document.getElementById('today-date').textContent = 'Date: ' + today;

async function loadStocks() {
const list = document.getElementById('stock-list');
try {
const q = query(collection(db, "products"), orderBy("category"));
const snap = await getDocs(q);
if(snap.empty) {
list.innerHTML = '<div class="loading">Wala pang products boss</div>';
return;
}

let html = '';
let cats = ['65s','30s','big','dumplings','siopao','sauce','others'];
let catNames = {'65s':'65\'s SIOMAI','30s':'30\'s SIOMAI','big':'BIG SIOMAI','dumplings':'DUMPLINGS','siopao':'SIOPAO','sauce':'SAUCE','others':'OTHERS'};

cats.forEach(cat => {
let catProds = [];
snap.forEach(doc => {
const p = doc.data();
if(p.category === cat) catProds.push({id: doc.id, ...p});
});

if(catProds.length > 0) {
html += `<div class="cat-title">${catNames[cat]}</div>`;
catProds.forEach(prod => {
const stock = prod.stock || 0;
let stockClass = 'stock-ok';
let stockText = stock + ' pcs';

if(stock < 5) {
stockClass = 'stock-critical';
stockText = 'CRITICAL: ' + stock + ' pcs';
} else if(stock < 20) {
stockClass = 'stock-low';
stockText = 'LOW: ' + stock + ' pcs';
}

const img = prod.image? `<img src="${prod.image}" class="prod-img">` : '<div class="prod-img" style="background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:9px;color:#ccc;">No Img</div>';

html += `<div class="stock-row">
<div class="stock-left">${img}<span class="stock-name">${prod.name}</span></div>
<span class="stock-count ${stockClass}">${stockText}</span>
</div>`;
});
}
});

list.innerHTML = html;
} catch(e) {
console.error(e);
list.innerHTML = '<div class="loading" style="color:red">Error: '+e.message+'</div>';
}
}

loadStocks();
setInterval(loadStocks, 30000);
</script>
</body>
</html>
