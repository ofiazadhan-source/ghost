
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Siomai Factory POS</title>
<style>
* {margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', Tahoma, sans-serif;}
body {background:#FFF8E1; padding:15px; min-height:100vh;}
.container { max-width:2000px; margin:auto; background:white; border-radius:20px; padding:20px; box-shadow:0 6px 20px rgba(0,0,0,0.12); border-top:6px solid #D32F2F; }
h2 { color:#D32F2F; text-align:center; margin-bottom:8px; font-size:24px; }
.subtitle { text-align:center; color:#666; font-size:13px; margin-bottom:20px; }
.menu-grid { display:grid; grid-template-columns:repeat(2, 1fr); gap:12px; }
.menu-btn { padding:35px 10px; border:none; border-radius:15px; background:linear-gradient(135deg, #FFCC80, #FFB74D); color:#B71C1C; font-weight:800; font-size:15px; cursor:pointer; text-align:center; line-height:1.4; }
.menu-btn:active {transform:scale(0.95); background:#FFA726;}
</style>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#D32F2F">
</head>
<body>
<div class="container">
<h2>📋 Main Menu</h2>
<p class="subtitle">Welcome to Dhan's POS, </p>

<div class="menu-grid">
<button class="menu-btn" onclick="window.location='pos.html'">Pos<br>Dhan</button>
<button class="menu-btn" onclick="window.location='products.html'">🛒 Products<br>add & edit</button>
<button class="menu-btn" onclick="window.location='monthly-sales.html'">💰 Monthly<br>Sales</button>
<button class="menu-btn" onclick="window.location='daily-production.html'">📦 Daily<br>Production</button>
<button class="menu-btn" onclick="window.location='expenses.html'">💸 Daily<br>Expenses</button>
<button class="menu-btn" onclick="window.location='daily-sales.html'">💰 Daily<br>Sales</button>
<button class="menu-btn" onclick="window.location='monthly-expenses.html'">📊 Monthly<br>Expenses</button>
<button class="menu-btn" onclick="window.location='net.html'">📈 Net<br>Profit</button>
  <button class="menu-btn" onclick="window.location='pos-wholesale.html'">📦 Wholesale<br></button>
  <button class="menu-btn" onclick="window.location='reset.html'">⚡Reset<br></button>
</div>
</div>
</div>
</body>
</html>
