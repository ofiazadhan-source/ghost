
<!-- WELCOME POPUP - ADD THIS AT TOP OF BODY -->
<div id="welcomeModal">
  <div class="welcome-content">
 <img src="attachment://1745087593146342" alt="Welcome">
    <h1>Welcome to DHAN SIOMAI!</h1>
    <p>Salamat sa pagbisita 🥟</p>
    <button class="enter-btn" onclick="closeWelcome()">Enter Store</button>
  </div>
</div>

<style>
#welcomeModal{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.85);
  display:flex;justify-content:center;align-items:center;
  z-index:9999;
  animation:fadeOut 1s ease 3.5s forwards;
}
.welcome-content{
  text-align:center;
  color:white;
  animation:scaleIn 0.5s ease;
}
.welcome-content img{
  width:200px;
  height:auto;
  border-radius:20px;
  margin-bottom:20px;
}
.welcome-content h1{
  font-size:32px;
  margin-bottom:10px;
}
.welcome-content p{
  font-size:18px;
  opacity:0.9;
}
.enter-btn{
  margin-top:20px;
  padding:12px 40px;
  background:#FFC107;
  color:#333;
  border:none;
  border-radius:10px;
  font-size:18px;
  font-weight:700;
  cursor:pointer;
  animation:bounce 1s infinite;
}
@keyframes fadeOut{
  to{opacity:0;visibility:hidden;}
}
@keyframes scaleIn{
  from{transform:scale(0.5);opacity:0;}
  to{transform:scale(1);opacity:1;}
}
@keyframes bounce{
 0%,100%{transform:translateY(0);}
 50%{transform:translateY(-10px);}
}
</style>

<script>
function closeWelcome(){
  document.getElementById('welcomeModal').style.display='none';
}
// Auto close after 4 seconds
setTimeout(closeWelcome, 4000);
</script>
<!-- END WELCOME POPUP --> html>
