<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DHAN SIOMAI Viewer</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff6b35">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DHAN POS">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* {margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif;}
body {background:#f5f5f5;}
.login-container {display:flex; align-items:center; justify-content:center; height:100vh;}
.login-box {background:white; padding:30px; border-radius:12px; box-shadow:0 4px 15px rgba(0,0,0,0.1); width:90%; max-width:400px;}
.login-box h2 {color:#ff6b35; margin-bottom:20px; text-align:center;}
.login-box input {width:100%; padding:12px; margin-bottom:15px; border:1px solid #ddd; border-radius:8px;}
.login-btn {width:100%; padding:12px; background:#ff6b35; color:white; border:none; border-radius:8px; font-weight:700; cursor:pointer;}
.viewer-container {display:none; padding:15px; max-width:1200px; margin:0 auto;}
.header {background:white; padding:15px; border-radius:10px; margin-bottom:15px; display:flex; justify-content:space-between; align-items:center;}
.tab-buttons {display:flex; gap:10px; margin-bottom:15px;}
.tab-btn {flex:1; padding:12px; background:white; border:none; border-radius:8px; cursor:pointer; font-weight:600;}
.tab-btn.active {background:#ff6b35; color:white;}
.tab-content {display:none; background:white; padding:20px; border-radius:10px;}
.tab-content.active {display:block;}
.prod-item {display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #eee;}
.logout-btn {padding:8px 15px; background:#f44336; color:white; border:none; border-radius:6px; cursor:pointer;}
table {width:100%; border-collapse:collapse;}
th, td {padding:12px; text-align:left; border-bottom:1px solid #eee;}
th {background:#fff3cd; color:#856404;}
</style>
</head>
<body>

<div class="login-container" id="loginContainer">
  <div class="login-box">
    <h2>👁️ Viewer Login</h2>
    <input type="password" id="password" placeholder="Enter password">
    <button class="login-btn" onclick="login()">Login</button>
  </div>
</div>

<div class="viewer-container" id="viewerContainer">
  <div class="header">
    <h2>🍢 DHAN SIOMAI Viewer</h2>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <div class="tab-buttons">
    <button class="tab-btn active" onclick="switchTab('stocks')">📦 Stocks</button>
    <button class="tab-btn" onclick="switchTab('transactions')">📋 Transactions</button>
  </div>

  <div class="tab-content active" id="stocksTab">
    <div id="stocksList"></div>
  </div>

  <div class="tab-content" id="transactionsTab">
    <div id="transactionsList"></div>
  </div>
</div>

<script>
const VIEWER_PASSWORD = 'viewer123';
let products = {};

window.onload = function() {
  if(sessionStorage.getItem('viewerLoggedIn') === 'true') {
    showViewer();
  }
}

function login() {
  let pass = document.getElementById('password').value;
  if(pass === VIEWER_PASSWORD) {
    sessionStorage.setItem('viewerLoggedIn', 'true');
    showViewer();
  } else {
    alert('Wrong password!');
  }
}

function logout() {
  sessionStorage.removeItem('viewerLoggedIn');
  location.reload();
}

function showViewer() {
  document.getElementById('loginContainer').style.display = 'none';
  document.getElementById('viewerContainer').style.display = 'block';
  loadData();
  renderStocks();
  renderTransactions();
}

function loadData() {
  products = JSON.parse(localStorage.getItem('products') || '{}');
}

function renderStocks() {
  let html = '';
  Object.keys(products).forEach(cat => {
    html += `<h3 style="margin:15px 0 10px;">${cat}</h3>`;
    products[cat].forEach(prod => {
      html += `<div class="prod-item">
        <span>${prod.name}</span>
        <span style="font-weight:700; color:${prod.stock < 10? 'red' : '#4caf50'};">${prod.stock} pcs</span>
      </div>`;
    });
  });
  document.getElementById('stocksList').innerHTML = html;
}

function renderTransactions() {
  let transactions = JSON.parse(localStorage.getItem('transactions') || '[]');
  let html = '<table><tr><th>ID</th><th>Date</th><th>Items</th><th>Total</th><th>Payment</th></tr>';

  transactions.reverse().forEach(txn => {
    let itemsStr = Object.keys(txn.items).map(k => `${k} x${txn.items[k]}`).join(', ');
    html += `<tr>
      <td>${txn.id}</td>
      <td>${txn.date}</td>
      <td>${itemsStr}</td>
      <td>₱${txn.total}</td>
      <td>${txn.payment.method}</td>
    </tr>`;
  });

  html += '</table>';
  document.getElementById('transactionsList').innerHTML = html;
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById(tab + 'Tab').classList.add('active');
}
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
     .then(reg => console.log('SW registered'))
     .catch(err => console.log('SW failed:', err));
  });
}
</script>
</body>
</html>
