<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viewer - DHAN SIOMAI POS</title>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* {margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif;}
body {background:#f5f5f5; padding:20px;}
.container {max-width:1200px; margin:0 auto;}
.header {display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:10px;}
.header h1 {color:#ff6b35; font-size:22px;}
.header a {color:#ff6b35; text-decoration:none; font-weight:600;}
.tabs {display:flex; gap:10px; margin-bottom:20px; overflow-x:auto;}
.tab {flex:1; padding:12px; background:white; border:none; border-radius:8px; cursor:pointer; font-weight:600; white-space:nowrap; box-shadow:0 2px 5px rgba(0,0,0,0.1);}
.tab.active {background:#ff6b35; color:white;}
.tab-content {display:none;}
.tab-content.active {display:block;}
.card {background:white; padding:15px; border-radius:10px; box-shadow:0 2px 5px rgba(0,0,0,0.1); margin-bottom:15px;}
.card h3 {margin-bottom:10px; color:#333;}
table {width:100%; border-collapse:collapse;}
th, td {padding:10px; text-align:left; border-bottom:1px solid #eee;}
th {background:#f8f8f8; font-weight:600;}
.loading {text-align:center; padding:40px; color:#666;}
.stats-grid {display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:15px; margin-bottom:20px;}
.stat-card {background:white; padding:20px; border-radius:10px; box-shadow:0 2px 5px rgba(0,0,0,0.1); text-align:center;}
.stat-card h4 {color:#666; font-size:14px; margin-bottom:5px;}
.stat-card .value {font-size:28px; font-weight:700; color:#ff6b35;}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>📋 Sales Viewer</h1>
    <a href="index.html">← Back to POS</a>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('dashboard')">📊 Dashboard</button>
    <button class="tab" onclick="switchTab('transactions')">🧾 Transactions</button>
    <button class="tab" onclick="switchTab('products')">📦 Products</button>
  </div>

  <div id="tab-dashboard" class="tab-content active">
    <div class="stats-grid">
      <div class="stat-card">
        <h4>Total Sales Today</h4>
        <div class="value" id="todaySales">₱0</div>
      </div>
      <div class="stat-card">
        <h4>Total Transactions</h4>
        <div class="value" id="totalTxns">0</div>
      </div>
      <div class="stat-card">
        <h4>Total Products</h4>
        <div class="value" id="totalProducts">0</div>
      </div>
    </div>
    <div class="card">
      <h3>Recent Transactions</h3>
      <div id="recentTxns"><div class="loading">Loading...</div></div>
    </div>
  </div>

  <div id="tab-transactions" class="tab-content">
    <div class="card">
      <h3>All Transactions</h3>
      <div id="allTxns"><div class="loading">Loading...</div></div>
    </div>
  </div>

  <div id="tab-products" class="tab-content">
    <div class="card">
      <h3>Product Stocks</h3>
      <div id="productStocks"><div class="loading">Loading...</div></div>
    </div>
  </div>
</div>

<script>
// ========== PALITAN MO TO NG CONFIG MO ==========
const firebaseConfig = {
  apiKey: "PASTE_API_KEY_DITO",
  authDomain: "PASTE_AUTH_DOMAIN_DITO",
  projectId: "PASTE_PROJECT_ID_DITO",
  storageBucket: "PASTE_STORAGE_BUCKET_DITO",
  messagingSenderId: "PASTE_MESSAGING_SENDER_ID_DITO",
  appId: "PASTE_APP_ID_DITO"
};
// ================================================

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let transactions = [];
let products = [];

window.onload = function() {
  loadTransactions();
  loadProducts();
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
}

function loadTransactions() {
  transactions = JSON.parse(localStorage.getItem('transactions') || '[]');
  renderTransactions();
  updateDashboard();
}

function loadProducts() {
  db.collection("product").get().then(snap => {
    products = [];
    snap.forEach(doc => {
      let p = doc.data();
      p.id = doc.id;
      products.push(p);
    });
    renderProducts();
    document.getElementById('totalProducts').textContent = products.length;
  }).catch(err => {
    console.error("Error loading products:", err);
  });
}

function updateDashboard() {
  const today = new Date().toDateString();
  let todayTotal = 0;
  let todayCount = 0;

  transactions.forEach(txn => {
    if(new Date(txn.date).toDateString() === today) {
      todayTotal += txn.total;
      todayCount++;
    }
  });

  document.getElementById('todaySales').textContent = '₱' + todayTotal;
  document.getElementById('totalTxns').textContent = transactions.length;

  // Recent 5 transactions
  let recent = transactions.slice(0, 5);
  let html = '<table><tr><th>Date</th><th>Items</th><th>Total</th><th>Payment</th></tr>';
  recent.forEach(txn => {
    let items = Object.keys(txn.items).length + ' items';
    html += `<tr>
      <td>${txn.date}</td>
      <td>${items}</td>
      <td>₱${txn.total}</td>
      <td>${txn.payment.method}</td>
    </tr>`;
  });
  html += '</table>';
  document.getElementById('recentTxns').innerHTML = html || '<p>No transactions yet</p>';
}

function renderTransactions() {
  let html = '<table><tr><th>ID</th><th>Date</th><th>Items</th><th>Total</th><th>Payment</th></tr>';
  transactions.forEach(txn => {
    let items = Object.entries(txn.items).map(([name, qty]) => `${name} x${qty}`).join(', ');
    html += `<tr>
      <td>${txn.id}</td>
      <td>${txn.date}</td>
      <td>${items}</td>
      <td>₱${txn.total}</td>
      <td>${txn.payment.method}</td>
    </tr>`;
  });
  html += '</table>';
  document.getElementById('allTxns').innerHTML = html || '<p>No transactions yet</p>';
}

function renderProducts() {
  let html = '<table><tr><th>Category</th><th>Product</th><th>Price</th><th>Stock</th></tr>';
  products.forEach(p => {
    html += `<tr>
      <td>${p.category}</td>
      <td>${p.name}</td>
      <td>₱${p.price}</td>
      <td>${p.stock}</td>
    </tr>`;
  });
  html += '</table>';
  document.getElementById('productStocks').innerHTML = html || '<p>No products yet</p>';
}
</script>
</body>
</html>
