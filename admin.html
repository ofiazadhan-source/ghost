<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DHAN SIOMAI Admin</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff6b35">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DHAN POS">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* {margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif;}
body {background:#f5f5f5;}
.login-container {display:flex; align-items:center; justify-content:center; height:100vh;}
.login-box {background:white; padding:30px; border-radius:12px; box-shadow:0 4px 15px rgba(0,0,0,0.1); width:90%; max-width:400px;}
.login-box h2 {color:#ff6b35; margin-bottom:20px; text-align:center;}
.login-box input {width:100%; padding:12px; margin-bottom:15px; border:1px solid #ddd; border-radius:8px;}
.login-btn {width:100%; padding:12px; background:#ff6b35; color:white; border:none; border-radius:8px; font-weight:700; cursor:pointer;}
.admin-container {display:none; padding:15px; max-width:1200px; margin:0 auto;}
.header {background:white; padding:15px; border-radius:10px; margin-bottom:15px; display:flex; justify-content:space-between; align-items:center;}
.tab-buttons {display:flex; gap:10px; margin-bottom:15px; flex-wrap:wrap;}
.tab-btn {padding:12px 20px; background:white; border:none; border-radius:8px; cursor:pointer; font-weight:600;}
.tab-btn.active {background:#ff6b35; color:white;}
.tab-content {display:none; background:white; padding:20px; border-radius:10px;}
.tab-content.active {display:block;}
.prod-section {margin-bottom:25px; border-bottom:2px solid #eee; padding-bottom:15px;}
.prod-section h3 {margin-bottom:10px; color:#333; display:flex; justify-content:space-between; align-items:center;}
.prod-item {display:flex; justify-content:space-between; align-items:center; padding:12px 10px; border-bottom:1px solid #eee; gap:10px;}
.prod-item span {flex:1;}
.prod-item input {width:80px; padding:6px; border:1px solid #ddd; border-radius:6px;}
.input-group {display:flex; gap:8px; align-items:center;}
.save-btn {padding:12px 24px; background:#4caf50; color:white; border:none; border-radius:8px; font-weight:700; cursor:pointer; margin-top:15px;}
.add-btn {padding:8px 16px; background:#2196f3; color:white; border:none; border-radius:6px; font-weight:600; cursor:pointer;}
.delete-btn {padding:6px 12px; background:#f44336; color:white; border:none; border-radius:6px; cursor:pointer; font-size:12px;}
.logout-btn {padding:8px 15px; background:#f44336; color:white; border:none; border-radius:6px; cursor:pointer;}
table {width:100%; border-collapse:collapse;}
th, td {padding:12px; text-align:left; border-bottom:1px solid #eee;}
th {background:#fff3cd; color:#856404;}
.label {font-size:12px; color:#666; margin-bottom:4px;}
.add-product-form {background:#f9f9f9; padding:15px; border-radius:8px; margin-top:10px; display:none;}
.add-product-form input {width:100%; padding:8px; margin-bottom:10px; border:1px solid #ddd; border-radius:6px;}
.modal {display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center;}
.modal.active {display:flex;}
.modal-content {background:white; padding:25px; border-radius:12px; width:90%; max-width:400px;}
.modal-buttons {display:flex; gap:10px; margin-top:15px;}
</style>
</head>
<body>

<div class="login-container" id="loginContainer">
  <div class="login-box">
    <h2>🔐 Admin Login</h2>
    <input type="password" id="password" placeholder="Enter password">
    <button class="login-btn" onclick="login()">Login</button>
  </div>
</div>

<div class="admin-container" id="adminContainer">
  <div class="header">
    <h2>🍢 DHAN SIOMAI Admin</h2>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <div class="tab-buttons">
    <button class="tab-btn active" onclick="switchTab('products')">📦 Products</button>
    <button class="tab-btn" onclick="switchTab('production')">🏭 Production</button>
    <button class="tab-btn" onclick="switchTab('transactions')">📋 Transactions</button>
  </div>

  <div class="tab-content active" id="productsTab">
    <div id="productsList"></div>
    <button class="save-btn" onclick="saveProducts()">Save Changes</button>
  </div>

  <div class="tab-content" id="productionTab">
    <h3>Production Run</h3>
    <input type="date" id="prodDate" style="padding:10px; margin-bottom:15px; border:1px solid #ddd; border-radius:6px;">
    <div id="productionList"></div>
    <button class="save-btn" onclick="saveProduction()">Save Production</button>
  </div>

  <div class="tab-content" id="transactionsTab">
    <h3>Transaction History</h3>
    <div id="transactionsList"></div>
  </div>
</div>

<!-- Delete Confirmation Modal -->
<div class="modal" id="deleteModal">
  <div class="modal-content">
    <h3>Delete Product?</h3>
    <p id="deleteText">Are you sure?</p>
    <div class="modal-buttons">
      <button class="delete-btn" onclick="confirmDelete()">Delete</button>
      <button class="save-btn" onclick="closeModal()" style="background:#666;">Cancel</button>
    </div>
  </div>
</div>

<script>
const ADMIN_PASSWORD = 'admin123';
let products = {};
let deleteTarget = null;

window.onload = function() {
  if(sessionStorage.getItem('adminLoggedIn') === 'true') {
    showAdmin();
  }
}

function login() {
  let pass = document.getElementById('password').value;
  if(pass === ADMIN_PASSWORD) {
    sessionStorage.setItem('adminLoggedIn', 'true');
    showAdmin();
  } else {
    alert('Wrong password!');
  }
}

function logout() {
  sessionStorage.removeItem('adminLoggedIn');
  location.reload();
}

function showAdmin() {
  document.getElementById('loginContainer').style.display = 'none';
  document.getElementById('adminContainer').style.display = 'block';
  loadProducts();
  renderProducts();
  renderProduction();
  renderTransactions();
}

function loadProducts() {
  products = JSON.parse(localStorage.getItem('products') || '{}');
}

function renderProducts() {
  let html = '';
  Object.keys(products).forEach(cat => {
    html += `<div class="prod-section">
      <h3>${cat}
        <button class="add-btn" onclick="toggleAddForm('${cat}')">+ Add</button>
      </h3>

      <div class="add-product-form" id="addForm-${cat}">
        <input type="text" id="newName-${cat}" placeholder="Product Name">
        <input type="number" id="newPrice-${cat}" placeholder="Price" min="0" step="1">
        <input type="number" id="newStock-${cat}" placeholder="Initial Stock" min="0">
        <button class="add-btn" onclick="addProduct('${cat}')">Add Product</button>
      </div>
    `;

    products[cat].forEach((prod, idx) => {
      html += `<div class="prod-item">
        <span>${prod.name}</span>
        <div class="input-group">
          <div>
            <div class="label">Price</div>
            <input type="number" id="price-${cat}-${idx}" value="${prod.price}" min="0" step="1">
          </div>
          <div>
            <div class="label">Stock</div>
            <input type="number" id="stock-${cat}-${idx}" value="${prod.stock}" min="0">
          </div>
          <button class="delete-btn" onclick="deleteProduct('${cat}', ${idx})">Delete</button>
        </div>
      </div>`;
    });
    html += '</div>';
  });
  document.getElementById('productsList').innerHTML = html;
}

function toggleAddForm(cat) {
  let form = document.getElementById(`addForm-${cat}`);
  form.style.display = form.style.display === 'block'? 'none' : 'block';
}

function addProduct(cat) {
  let name = document.getElementById(`newName-${cat}`).value.trim();
  let price = parseFloat(document.getElementById(`newPrice-${cat}`).value) || 0;
  let stock = parseInt(document.getElementById(`newStock-${cat}`).value) || 0;

  if(!name) {
    alert('Please enter product name!');
    return;
  }

  products[cat].push({name: name, price: price, stock: stock});
  localStorage.setItem('products', JSON.stringify(products));

  document.getElementById(`newName-${cat}`).value = '';
  document.getElementById(`newPrice-${cat}`).value = '';
  document.getElementById(`newStock-${cat}`).value = '';

  renderProducts();
  alert('✅ Product added!');
}

function deleteProduct(cat, idx) {
  deleteTarget = {cat: cat, idx: idx};
  document.getElementById('deleteText').textContent = `Delete "${products[cat][idx].name}"?`;
  document.getElementById('deleteModal').classList.add('active');
}

function confirmDelete() {
  if(deleteTarget) {
    products[deleteTarget.cat].splice(deleteTarget.idx, 1);
    localStorage.setItem('products', JSON.stringify(products));
    deleteTarget = null;
    closeModal();
    renderProducts();
    alert('✅ Product deleted!');
  }
}

function closeModal() {
  document.getElementById('deleteModal').classList.remove('active');
  deleteTarget = null;
}

function saveProducts() {
  Object.keys(products).forEach(cat => {
    products[cat].forEach((prod, idx) => {
      prod.price = parseFloat(document.getElementById(`price-${cat}-${idx}`).value) || 0;
      prod.stock = parseInt(document.getElementById(`stock-${cat}-${idx}`).value) || 0;
    });
  });
  localStorage.setItem('products', JSON.stringify(products));
  alert('✅ Products updated!');
  loadProducts();
}

function renderProduction() {
  let html = '';
  Object.keys(products).forEach(cat => {
    html += `<div class="prod-section"><h3>${cat}</h3>`;
    products[cat].forEach((prod, idx) => {
      html += `<div class="prod-item">
        <span>${prod.name}</span>
        <input type="number" id="prod-${cat}-${idx}" value="0" min="0">
      </div>`;
    });
    html += '</div>';
  });
  document.getElementById('productionList').innerHTML = html;
  document.getElementById('prodDate').value = new Date().toISOString().split('T')[0];
}

function saveProduction() {
  let date = document.getElementById('prodDate').value;
  let totalProduced = 0;

  Object.keys(products).forEach(cat => {
    products[cat].forEach((prod, idx) => {
      let qty = parseInt(document.getElementById(`prod-${cat}-${idx}`).value) || 0;
      prod.stock += qty;
      totalProduced += qty;
    });
  });

  localStorage.setItem('products', JSON.stringify(products));
  localStorage.setItem('lastProductionDate', date);
  alert(`✅ Production saved! ${totalProduced} items added.`);
  renderProducts();
}

function renderTransactions() {
  let transactions = JSON.parse(localStorage.getItem('transactions') || '[]');
  let html = '<table><tr><th>ID</th><th>Date</th><th>Items</th><th>Total</th><th>Payment</th></tr>';

  transactions.reverse().forEach(txn => {
    let itemsStr = Object.keys(txn.items).map(k => `${k} x${txn.items[k]}`).join(', ');
    html += `<tr>
      <td>${txn.id}</td>
      <td>${txn.date}</td>
      <td>${itemsStr}</td>
      <td>₱${txn.total}</td>
      <td>${txn.payment.method}</td>
    </tr>`;
  });

  html += '</table>';
  document.getElementById('transactionsList').innerHTML = html;
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById(tab + 'Tab').classList.add('active');
}
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
   .then(reg => console.log('SW registered'))
   .catch(err => console.log('SW failed:', err));
  });
}
</script>
</body>
</html>
